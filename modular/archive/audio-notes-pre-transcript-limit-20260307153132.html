<!DOCTYPE html>
<!-- ============================================================
     audio-notes/audio-notes.html — Academic Allies Audio Notes
     Updated: 2026-03-05 by Claude
       - Android beep suppression via AudioContext silence buffer trick:
         play near-silent 50ms buffer before each recognition.start()
         to prevent Android Chrome's system chime on SR re-acquisition.
         Non-nuclear — Speech Recognition stays enabled.
       - Pre-warm AudioContext in startRecording() (user gesture context)
         so mobile browsers don't auto-suspend it.
       - aaAudioCtx closed in stopSpeechRecognition() for cleanup.
     ============================================================ -->

  <style>

  <script>
  (function() {
    'use strict';

    // ── Constants ──────────────────────────────────────────────────────────────
    var CAT_LABELS = { genealogy: '🌳 Genealogy', medical: '🏥 Medical', ideas: '💡 Ideas', academic: '📚 Academic', personal: '🔒 Personal', other: '📎 Other' };

    // ── State ──────────────────────────────────────────────────────────────────
    var writeUid = null;        // always the logged-in user
    var readUid = null;         // mirror-aware uid for reading
    var isMirror = false;       // true if viewing another user's data
    var mediaRecorder = null;
    var audioChunks = [];
    var recognition = null;
    var transcript = '';
    var interimText = '';
    var noteTitle = '';         // Claude: 2026-03-05 — optional title set before/during recording
    var recordingGps = null;
    var recordingAddress = null;
    var recordStartTime = null;
    var timerInterval = null;
    var allNotes = [];          // cached notes from Firestore listener
    var unsubNotes = null;      // Firestore listener unsubscribe

    // ── DOM refs ───────────────────────────────────────────────────────────────
    var noteTitleInput = document.getElementById('noteTitleInput'); // Claude: 2026-03-05
    var recordBtn      = document.getElementById('recordBtn');
    var recordStatus   = document.getElementById('recordStatus');
    var gpsStatusEl    = document.getElementById('gpsStatus');
    var speechWarning  = document.getElementById('speechWarning');
    var liveTranscript = document.getElementById('liveTranscript');
    var catModal       = document.getElementById('catModal');
    var notesList      = document.getElementById('notesList');
    var emptyState     = document.getElementById('emptyState');
    var searchInput    = document.getElementById('searchInput');
    var categoryFilter = document.getElementById('categoryFilter');
    var mirrorBanner   = document.getElementById('mirrorBanner');
    var toastEl        = document.getElementById('toast');

    // ── Helpers ────────────────────────────────────────────────────────────────
    // Claude: duration param — errors stay visible longer (10s) than success (3s)
    function showToast(msg, duration) {
      toastEl.textContent = msg;
      toastEl.style.display = 'block';
      setTimeout(function() { toastEl.style.display = 'none'; }, duration || 3000);
    }

    function fmtTime(d) {
      if (!d) return '';
      if (d.toDate) d = d.toDate();
      return d.toLocaleString(undefined, { month: 'short', day: 'numeric', year: 'numeric', hour: 'numeric', minute: '2-digit' });
    }

    function fmtDuration(sec) {
      if (!sec) return '';
      var m = Math.floor(sec / 60);
      var s = sec % 60;
      return m + ':' + (s < 10 ? '0' : '') + s;
    }

    function escHtml(str) {
      var d = document.createElement('div');
      d.textContent = str || '';
      return d.innerHTML;
    }

    // ── Google Drive Upload ───────────────────────────────────────────────────
    // Claude: upload recorded audio to user's Google Drive folder.
    // Firebase Google Auth only grants profile+email scopes, so we need a
    // separate drive.file-scoped token via Google Identity Services (GIS).
    // GIS reuses the existing Google session — user consents to Drive once.
    var GOOGLE_CLIENT_ID = '93996985456-ffj2euk9i4q41v88njuhpusk73mdb31j.apps.googleusercontent.com';
    var DRIVE_SCOPE = 'https://www.googleapis.com/auth/drive.file';
    var DRIVE_FOLDER_NAME = 'Academic Allies Audio Notes';
    var driveToken = null;        // cached OAuth token for the session
    var driveFolderId = null;     // cached Drive folder ID for the session
    var driveTokenClient = null;
    var recordingMimeType = 'audio/webm'; // Claude: captured from MediaRecorder on start

    function getDriveToken() {
      return new Promise(function(resolve, reject) {
        if (driveToken) { resolve(driveToken); return; }
        if (!window.google || !window.google.accounts || !window.google.accounts.oauth2) {
          reject(new Error('Google Identity Services not loaded'));
          return;
        }
        if (!driveTokenClient) {
          var userEmail = (window.AA.auth.currentUser && window.AA.auth.currentUser.email) || '';
          driveTokenClient = google.accounts.oauth2.initTokenClient({
            client_id: GOOGLE_CLIENT_ID,
            scope: DRIVE_SCOPE,
            hint: userEmail,    // Claude: pre-select the signed-in Google account
            callback: function() {} // overridden per-call below
          });
        }
        driveTokenClient.callback = function(resp) {
          if (resp.error) {
            console.error('[AudioNotes] Drive auth error:', resp.error);
            reject(new Error('Drive auth: ' + resp.error));
            return;
          }
          driveToken = resp.access_token;
          resolve(driveToken);
        };
        driveTokenClient.requestAccessToken({ prompt: '' });
      });
    }

    function getOrCreateDriveFolder(token) {
      if (driveFolderId) return Promise.resolve(driveFolderId);
      var q = encodeURIComponent("name='" + DRIVE_FOLDER_NAME + "' and mimeType='application/vnd.google-apps.folder' and trashed=false");
      return fetch('https://www.googleapis.com/drive/v3/files?q=' + q + '&fields=files(id)', {
        headers: { 'Authorization': 'Bearer ' + token }
      })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data.files && data.files.length > 0) {
          driveFolderId = data.files[0].id;
          return driveFolderId;
        }
        // Claude: folder doesn't exist — create it
        return fetch('https://www.googleapis.com/drive/v3/files?fields=id', {
          method: 'POST',
          headers: {
            'Authorization': 'Bearer ' + token,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            name: DRIVE_FOLDER_NAME,
            mimeType: 'application/vnd.google-apps.folder'
          })
        })
        .then(function(r) { return r.json(); })
        .then(function(f) { driveFolderId = f.id; return driveFolderId; });
      });
    }

    function uploadFileToDrive(token, folderId, blob, filename) {
      // Claude: multipart/related upload — metadata + audio in one request
      var boundary = 'aa_audio_' + Date.now();
      var mimeType = blob.type || recordingMimeType || 'audio/webm';
      var metadata = JSON.stringify({
        name: filename,
        parents: [folderId],
        mimeType: mimeType
      });
      var body = new Blob([
        '--' + boundary + '\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n',
        metadata,
        '\r\n--' + boundary + '\r\nContent-Type: ' + mimeType + '\r\n\r\n',
        blob,
        '\r\n--' + boundary + '--'
      ]);
      return fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id,webViewLink', {
        method: 'POST',
        headers: {
          'Authorization': 'Bearer ' + token,
          'Content-Type': 'multipart/related; boundary=' + boundary
        },
        body: body
      })
      .then(function(r) {
        if (r.status === 401) {
          driveToken = null; // Claude: token expired — clear cache for next attempt
          throw new Error('Drive token expired');
        }
        if (!r.ok) throw new Error('Drive upload HTTP ' + r.status);
        return r.json();
      });
    }

    // Claude: best-effort Drive upload — returns {id, webViewLink} or null on failure
    function attemptDriveUpload(blob) {
      return getDriveToken()
        .then(function(token) {
          return getOrCreateDriveFolder(token).then(function(folderId) {
            var ts = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
            // Claude: match extension to actual mimeType so Drive can preview
            var ext = 'webm';
            if (recordingMimeType.indexOf('mp4') !== -1) ext = 'mp4';
            else if (recordingMimeType.indexOf('ogg') !== -1) ext = 'ogg';
            var filename = 'audio-note-' + ts + '.' + ext;
            return uploadFileToDrive(token, folderId, blob, filename);
          });
        })
        .catch(function(err) {
          console.warn('[AudioNotes] Drive upload failed:', err);
          return null;
        });
    }

    // Claude: 2026-03-05 — rename a Drive file by fileId (PATCH metadata only, no re-upload)
    function renameDriveFile(fileId, newName) {
      return getDriveToken().then(function(token) {
        return fetch('https://www.googleapis.com/drive/v3/files/' + encodeURIComponent(fileId), {
          method: 'PATCH',
          headers: {
            'Authorization': 'Bearer ' + token,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ name: newName })
        }).then(function(r) {
          if (!r.ok) throw new Error('Drive rename HTTP ' + r.status);
          return r.json();
        });
      }).catch(function(err) {
        console.warn('[AudioNotes] Drive rename failed:', err);
        return null;
      });
    }

    // ── Speech Recognition ─────────────────────────────────────────────────────
    // Claude: mobile Chrome fix — Speech Recognition stops after each utterance on
    // mobile and resets its results array on restart. We accumulate all final results
    // into `transcript` across restarts so nothing is lost.
    var SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    var speechStopping = false;        // Claude: flag to prevent auto-restart after intentional stop
    var isRecognitionRunning = false;   // Claude: guard against "already started" error in onend
    var isAndroid = /Android/i.test(navigator.userAgent); // Claude: Android-specific workarounds
    var aaAudioCtx = null;             // Claude: 2026-03-05 — AudioContext for Android beep suppression

    // Claude: 2026-03-05 — Android beep suppression via AudioContext silence buffer.
    // Root cause: Android Chrome plays a system chime each time recognition.start() is
    // called because it "re-acquires" the audio path. Trick: play a near-silent 50ms
    // buffer through a live AudioContext right before start(), which keeps the audio
    // output path occupied and prevents the OS from inserting its own sound.
    // Non-nuclear — does NOT disable Speech Recognition.
    function suppressAndroidBeep() {
      if (!isAndroid) return;
      try {
        if (!aaAudioCtx || aaAudioCtx.state === 'closed') {
          aaAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (aaAudioCtx.state === 'suspended') aaAudioCtx.resume();
        var buf = aaAudioCtx.createBuffer(1, Math.ceil(aaAudioCtx.sampleRate * 0.05), aaAudioCtx.sampleRate);
        var src = aaAudioCtx.createBufferSource();
        src.buffer = buf;
        var gain = aaAudioCtx.createGain();
        gain.gain.value = 0.001; // near-silent — not zero, which some devices ignore
        src.connect(gain);
        gain.connect(aaAudioCtx.destination);
        src.start();
      } catch(e) {
        console.warn('[AudioNotes] AudioCtx beep suppress failed:', e);
      }
    }

    function showSpeechFallback(msg) {
      // Claude: Otter.ai fallback link for when Speech API unavailable or fails
      speechWarning.innerHTML = '⚠️ ' + escHtml(msg || 'Transcript unavailable')
        + ' — use <a href="https://otter.ai/download" target="_blank" rel="noopener" '
        + 'style="color:#1a73e8;text-decoration:underline;">Otter.ai</a> as backup';
      speechWarning.style.display = 'block';
    }

    function startSpeechRecognition() {
      if (!SpeechRecognition) {
        // Claude: graceful fallback — show warning with Otter link, recording still works
        showSpeechFallback('Live transcription not supported in this browser');
        return;
      }
      speechWarning.style.display = 'none';
      transcript = '';
      interimText = '';
      speechStopping = false;
      initRecognitionInstance();
    }

    function initRecognitionInstance() {
      recognition = new SpeechRecognition();
      // Claude: force continuous + interim on every instance (mobile Chrome needs both)
      recognition.continuous = true;
      recognition.interimResults = true;
      recognition.maxAlternatives = 1; // Claude: reduce processing load — we only need the top result
      recognition.lang = 'en-US';

      recognition.onresult = function(e) {
        // Claude: mobile Chrome resets results array on each restart, so we only read
        // new finals from this session and append to the accumulated `transcript`.
        var sessionFinal = '';
        var interim = '';
        for (var i = 0; i < e.results.length; i++) {
          if (e.results[i].isFinal) {
            sessionFinal += e.results[i][0].transcript + ' ';
          } else {
            interim += e.results[i][0].transcript;
          }
        }
        // Claude: accumulate — append new finals to running transcript
        if (sessionFinal.trim()) {
          transcript = (transcript + ' ' + sessionFinal).trim();
        }
        interimText = interim;
        // Claude: show full accumulated text normally, current interim in italic gray
        liveTranscript.innerHTML = escHtml(transcript)
          + (interim ? ' <span class="interim">' + escHtml(interim) + '</span>' : '');
      };

      recognition.onerror = function(e) {
        if (e.error === 'not-allowed') {
          showSpeechFallback('Microphone permission denied for transcription');
        } else if (e.error === 'network') {
          showSpeechFallback('Network error — transcription requires internet');
        } else if (e.error !== 'no-speech' && e.error !== 'aborted') {
          console.warn('[AudioNotes] Speech error:', e.error);
        }
      };

      recognition.onend = function() {
        isRecognitionRunning = false;
      };

      /* Claude: 2026-03-05 — Android: no restart. One SR session per recording,
         no beep ever. Audio records the full session regardless. Live transcript
         works for the first stretch; desktop/iOS still auto-restarts normally. */
      recognition.onaudioend = function() {
        if (speechStopping) return;
        if (isAndroid) return; // Claude: no restart on Android — eliminates beep entirely
        if (mediaRecorder && mediaRecorder.state === 'recording') {
          setTimeout(function() {
            if (speechStopping || isRecognitionRunning) return;
            if (!mediaRecorder || mediaRecorder.state !== 'recording') return;
            try {
              initRecognitionInstance();
            } catch(e) {
              console.warn('[AudioNotes] Speech restart failed:', e);
            }
          }, 300);
        }
      };

      // Claude: only start if not already running — prevents "already started" error
      if (isRecognitionRunning) return;
      try {
        suppressAndroidBeep(); // Claude: 2026-03-05 — silence buffer trick before start()
        recognition.start();
        isRecognitionRunning = true;
      } catch(e) {
        isRecognitionRunning = false;
        showSpeechFallback('Speech recognition failed to start');
        console.error('[AudioNotes] Speech start error:', e);
      }
    }

    function stopSpeechRecognition() {
      speechStopping = true; // Claude: prevent auto-restart in onend
      if (recognition) {
        // Claude: capture any remaining interim text as final before stopping
        if (interimText.trim()) {
          transcript = (transcript + ' ' + interimText).trim();
          interimText = '';
        }
        try { recognition.stop(); } catch(e) {}
        recognition = null;
        isRecognitionRunning = false;
      }
      // Claude: 2026-03-05 — close AudioContext used for beep suppression
      if (aaAudioCtx) {
        try { aaAudioCtx.close(); } catch(e) {}
        aaAudioCtx = null;
      }
    }

    // ── GPS + reverse geocode ──────────────────────────────────────────────────
    function captureGps() {
      recordingGps = null;
      recordingAddress = null;
      gpsStatusEl.textContent = '📍 Getting location…';
      navigator.geolocation.getCurrentPosition(
        function(pos) {
          recordingGps = { lat: pos.coords.latitude, lng: pos.coords.longitude };
          gpsStatusEl.textContent = '📍 Location captured';
          // Claude: best-effort reverse geocode via free Nominatim API (no key needed)
          reverseGeocode(recordingGps.lat, recordingGps.lng);
        },
        function() { gpsStatusEl.textContent = '📍 Location unavailable'; },
        { timeout: 8000, maximumAge: 60000 }
      );
    }

    function reverseGeocode(lat, lng) {
      fetch('https://nominatim.openstreetmap.org/reverse?format=json&lat=' + lat + '&lon=' + lng + '&zoom=16')
        .then(function(r) { return r.json(); })
        .then(function(data) {
          if (data && data.display_name) {
            // Claude: keep it short — city, state, country
            var addr = data.address || {};
            recordingAddress = [addr.city || addr.town || addr.village || '', addr.state || '', addr.country || '']
              .filter(Boolean).join(', ');
            if (recordingAddress) gpsStatusEl.textContent = '📍 ' + recordingAddress;
          }
        })
        .catch(function() { /* silent — coords still saved */ });
    }

    // ── Recording timer ────────────────────────────────────────────────────────
    function startTimer() {
      var el = document.createElement('span');
      el.id = 'recordTimer';
      recordStatus.textContent = '';
      recordStatus.appendChild(document.createTextNode('Recording '));
      recordStatus.appendChild(el);
      var start = Date.now();
      timerInterval = setInterval(function() {
        var sec = Math.floor((Date.now() - start) / 1000);
        el.textContent = fmtDuration(sec);
      }, 500);
    }

    function stopTimer() {
      if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
    }

    // ── Recording ──────────────────────────────────────────────────────────────
    // Claude: pick best audio format Drive can preview — mp4 > ogg > webm fallback
    function pickMimeType() {
      var prefs = ['audio/mp4', 'audio/ogg;codecs=opus', 'audio/webm;codecs=opus', 'audio/webm'];
      for (var i = 0; i < prefs.length; i++) {
        if (typeof MediaRecorder !== 'undefined' && MediaRecorder.isTypeSupported(prefs[i])) return prefs[i];
      }
      return '';  // let browser pick default
    }

    function startRecording() {
      // Claude: 2026-03-05 — capture title at start of recording
      noteTitle = noteTitleInput ? noteTitleInput.value.trim() : '';
      noteTitleInput.disabled = true; // lock while recording

      navigator.mediaDevices.getUserMedia({ audio: true })
        .then(function(stream) {
          audioChunks = [];
          // Claude: request preferred mimeType for Drive compatibility
          var preferredMime = pickMimeType();
          var recOpts = preferredMime ? { mimeType: preferredMime } : undefined;
          mediaRecorder = new MediaRecorder(stream, recOpts);
          mediaRecorder.ondataavailable = function(e) { if (e.data.size > 0) audioChunks.push(e.data); };
          mediaRecorder.onstop = function() {
            stream.getTracks().forEach(function(t) { t.stop(); });
          };
          /* Claude 2026-03-07: 10s timeslice — ondataavailable fires every 10s so
             audioChunks fills DURING recording, not only on stop. This means
             pagehide/beforeunload saves contain real audio instead of empty blob.
             Archive: mediaRecorder.start(); */
          mediaRecorder.start(1000); /* Claude 2026-03-07: 1s timeslice (was 10s) — shorter window = chunks available sooner; a 3s recording now has 3 chunks ready in pagehide instead of 0 */
          recordingMimeType = mediaRecorder.mimeType || preferredMime || 'audio/webm';
          recordStartTime = Date.now();

          recordBtn.textContent = '⏹️';
          recordBtn.classList.add('recording');
          recordBtn.title = 'Tap to stop';
          liveTranscript.style.display = 'block';
          liveTranscript.innerHTML = '';

          startTimer();
          captureGps();
          // Claude: 2026-03-07 — set global flag so doLogout() blocks sign-out even if
          // the DOM class is stale (e.g. after screen-lock on desktop or background throttle).
          window.AA_isRecording = true;
          // Claude: 2026-03-05 — reset session inactivity timer when recording starts
          if (window.AA_resetSessionTimer) window.AA_resetSessionTimer();
          // Claude: 2026-03-05 — skip SR on Android entirely; beep is OS-level and
          // cannot be suppressed. Audio records fine; transcript stays empty on Android.
          if (!isAndroid) {
            startSpeechRecognition();
          }
          // Claude: 2026-03-06 — start periodic transcript backup (unstable-device resilience)
          _startTranscriptBackup();
        })
        .catch(function(err) {
          showToast('Microphone access denied');
          console.error('[AudioNotes] getUserMedia error:', err);
        });
    }

    function stopRecording() {
      if (!mediaRecorder || mediaRecorder.state !== 'recording') return;
      // Claude: 2026-03-07 — clear global recording flag immediately on stop
      window.AA_isRecording = false;
      stopSpeechRecognition();
      stopTimer();
      // Claude: 2026-03-06 — stop periodic transcript backup when recording ends
      _stopTranscriptBackup();
      mediaRecorder.stop();

      recordBtn.textContent = '🎙️';
      recordBtn.classList.remove('recording');
      recordBtn.title = 'Tap to record';
      recordStatus.textContent = 'Select a category…';
      noteTitleInput.disabled = false; // Claude: re-enable title input after recording

      catModal.classList.add('open');
    }

    recordBtn.onclick = function() {
      if (mediaRecorder && mediaRecorder.state === 'recording') {
        stopRecording();
      } else {
        startRecording();
      }
    };

    /* Claude: 2026-03-07 — visibilitychange guard for desktop sign-out protection.
       On Windows, when the screen locks the tab becomes "hidden". When the user
       unlocks, the tab becomes "visible" again. If the 30-min session timer was
       close to expiring while the screen was locked, resetting it on wake prevents
       a sign-out the moment the user comes back to their recording. */
    document.addEventListener('visibilitychange', function () {
      if (!document.hidden && window.AA_isRecording) {
        if (window.AA_resetSessionTimer) {
          window.AA_resetSessionTimer();
          console.log('[AA] Visibility restored while recording — session timer reset');
        }
      }
    });

    // ── Category selection ─────────────────────────────────────────────────────
    document.querySelectorAll('.cat-btn').forEach(function(btn) {
      btn.onclick = function() {
        var category = btn.getAttribute('data-cat');
        catModal.classList.remove('open');
        saveNote(category);
      };
    });

    document.getElementById('cancelCat').onclick = function() {
      catModal.classList.remove('open');
      audioChunks = [];
      transcript = '';
      interimText = '';
      noteTitle = '';
      noteTitleInput.value = '';
      noteTitleInput.disabled = false;
      liveTranscript.style.display = 'none';
      speechWarning.style.display = 'none';
      gpsStatusEl.textContent = '';
      recordStatus.textContent = 'Recording discarded';
      setTimeout(function() { recordStatus.textContent = 'Tap to start recording'; }, 2000);
    };

    // ── Save note ──────────────────────────────────────────────────────────────
    // Claude: flow is: build blob → upload to Drive → save metadata to Firebase.
    // If Drive upload fails, still saves to Firebase with null driveLink.
    function saveNote(category) {
      var duration = Math.round((Date.now() - (recordStartTime || Date.now())) / 1000);
      var localTime = new Date().toLocaleString();
      // Claude: stopSpeechRecognition() already folds interim into transcript
      var finalTranscript = transcript.trim() || '';
      var gps = recordingGps ? { lat: recordingGps.lat, lng: recordingGps.lng } : null;

      // TODO: future — integrate Otter.ai or OpenAI Whisper API for higher-quality
      //   transcription as a fallback/upgrade from Web Speech API.

      // Claude: build audio blob for Google Drive upload
      var audioBlob = new Blob(audioChunks, { type: recordingMimeType });

      recordStatus.textContent = 'Uploading to Drive…';

      // Claude: attempt Drive upload first, then save to Firebase (with or without Drive link)
      attemptDriveUpload(audioBlob).then(function(driveResult) {
        recordStatus.textContent = driveResult ? 'Saving note…' : 'Saving (no Drive link)…';

        var noteData = {
          title: noteTitle || null,  // Claude: 2026-03-05 — optional title
          transcript: finalTranscript,
          localTime: localTime,
          gps: gps,
          address: recordingAddress || null,
          category: category,
          duration: duration,
          driveFileId: driveResult ? driveResult.id : null,
          driveLink: driveResult ? driveResult.webViewLink : null,
          timestamp: firebase.firestore.FieldValue.serverTimestamp()
        };

        // Claude: timeout guard — if save hangs >10s, show error
        var saveResolved = false;
        var saveTimer = setTimeout(function() {
          if (!saveResolved) {
            saveResolved = true;
            recordStatus.textContent = 'Save failed — timed out after 10s. Check connection.';
            showToast('Save timed out — check your internet connection', 10000);
            console.error('[AudioNotes] Firestore save timed out after 10s. writeUid:', writeUid);
          }
        }, 10000);

        window.AA.db.collection('audioNotes').doc(writeUid)
          .collection('notes').add(noteData)
          .then(function() {
            if (saveResolved) return;
            saveResolved = true;
            clearTimeout(saveTimer);
            // Claude: 2026-03-05 — audit log compliance for audio note saves
            window.AA.logAccess('write', writeUid, 'audioNote');
            showToast(driveResult ? 'Note saved with audio' : 'Note saved');
            recordStatus.textContent = 'Tap to start recording';
            liveTranscript.style.display = 'none';
            speechWarning.style.display = 'none';
            gpsStatusEl.textContent = '';
            audioChunks = [];
            transcript = '';
            interimText = '';
            noteTitle = '';               // Claude: clear title after save
            noteTitleInput.value = '';
            noteTitleInput.disabled = false;
            recordingAddress = null;
          })
          .catch(function(err) {
            if (saveResolved) return;
            saveResolved = true;
            clearTimeout(saveTimer);
            var errText = err.code ? err.code + ': ' + (err.message || '') : (err.message || String(err));
            recordStatus.textContent = 'Save failed — ' + errText;
            showToast('Error: ' + errText, 10000);
            console.error('[AudioNotes] Firestore save error:', err);
            console.error('[AudioNotes] writeUid:', writeUid, 'noteData:', noteData);
          });
      });
    }

    // ── Load notes (real-time) ─────────────────────────────────────────────────
    function watchNotes(uid) {
      if (unsubNotes) unsubNotes();
      unsubNotes = window.AA.db.collection('audioNotes').doc(uid)
        .collection('notes').orderBy('timestamp', 'desc')
        .onSnapshot(function(snap) {
          allNotes = snap.docs.map(function(d) {
            var data = d.data();
            data._id = d.id;
            return data;
          });
          renderNotes();
        }, function(err) {
          console.error('[AudioNotes] Watch error:', err);
        });
    }

    // ── Render notes ───────────────────────────────────────────────────────────
    function renderNotes() {
      var query = (searchInput.value || '').toLowerCase().trim();
      var catFilter = categoryFilter ? categoryFilter.value : '';

      // Claude: 2026-03-05 — normalize category comparison. Old notes may have
      // been saved with emoji prefix or different case; strip to lowercase key only.
      var CAT_NORMALIZE = {};
      Object.keys(CAT_LABELS).forEach(function(k) {
        // map "🌳 Genealogy" → "genealogy", "Genealogy" → "genealogy", etc.
        CAT_NORMALIZE[CAT_LABELS[k].replace(/^\S+\s+/, '').toLowerCase()] = k;
        CAT_NORMALIZE[k.toLowerCase()] = k;
      });
      function normalizeCategory(raw) {
        if (!raw) return '';
        var stripped = String(raw).replace(/^\S+\s+/, '').toLowerCase().trim();
        return CAT_NORMALIZE[stripped] || CAT_NORMALIZE[raw.toLowerCase().trim()] || raw.toLowerCase().trim();
      }

      var filtered = allNotes.filter(function(n) {
        if (catFilter && normalizeCategory(n.category) !== catFilter) return false;
        if (query && (n.transcript || '').toLowerCase().indexOf(query) === -1) return false;
        return true;
      });

      if (filtered.length === 0) {
        notesList.innerHTML = '';
        emptyState.style.display = 'block';
        emptyState.textContent = allNotes.length === 0
          ? 'No audio notes yet. Tap the mic to record your first note.'
          : 'No notes match your search.';
        return;
      }

      emptyState.style.display = 'none';
      notesList.innerHTML = filtered.map(function(n) {
        var timeStr = fmtTime(n.timestamp);
        var catClass = 'cat-' + (n.category || 'other');
        var catLabel = CAT_LABELS[n.category] || n.category || 'Other';
        // Claude: show address if available, else raw coords, else nothing
        var locStr = n.address
          ? '📍 ' + escHtml(n.address)
          : (n.gps ? '📍 ' + n.gps.lat.toFixed(4) + ', ' + n.gps.lng.toFixed(4) : '');
        /* Claude: 2026-03-05 — show first 100 chars as preview, "..." if longer */
        var transcriptText = n.transcript || '(no transcript)';
        var isLong = transcriptText.length > 100;
        var previewText = isLong ? transcriptText.slice(0, 100) + '...' : transcriptText;
        var deleteHtml = !isMirror
          ? '<button class="note-delete" data-id="' + n._id + '" title="Delete note">🗑️</button>'
          : '';

        // Claude: show Drive playback link when audio was uploaded
        var driveHtml = n.driveLink
          ? '<a href="' + escHtml(n.driveLink) + '" target="_blank" rel="noopener" style="font-size:10pt;color:#1a73e8;text-decoration:none;">▶ Play on Drive</a>'
          : '';

        // Claude: 2026-03-05 — title row with inline rename button (own notes only)
        var titleHtml = '';
        if (!isMirror) {
          var displayTitle = n.title ? escHtml(n.title) : '<span style="color:#bbb;font-weight:400;">Untitled</span>';
          titleHtml = '<div class="note-rename-row">'
            + '<span class="note-title" style="flex:1">' + displayTitle + '</span>'
            + '<button class="note-rename-btn" data-id="' + n._id + '" data-title="' + escHtml(n.title || '').replace(/"/g,'&quot;') + '" data-driveid="' + escHtml(n.driveFileId || '') + '" title="Rename">✏️</button>'
            + '</div>';
        } else if (n.title) {
          titleHtml = '<div class="note-title">' + escHtml(n.title) + '</div>';
        }

        return '<div class="note-card">'
          + titleHtml
          + '<div class="note-header">'
          +   '<span class="note-time">' + timeStr + (n.duration ? ' · ' + fmtDuration(n.duration) : '') + '</span>'
          +   '<span class="note-cat ' + catClass + '">' + catLabel + '</span>'
          + '</div>'
          + '<div class="note-transcript" data-nid="' + n._id + '" data-full="' + escHtml(transcriptText).replace(/"/g, '&quot;') + '">' + escHtml(previewText) + '</div>'
          + (isLong ? '<div class="note-expand" data-nid="' + n._id + '">Show more</div>' : '')
          + '<div class="note-footer">'
          +   '<span class="note-loc">' + locStr + '</span>'
          +   driveHtml
          +   deleteHtml
          + '</div>'
          + '</div>';
      }).join('');

      // Claude: wire expand/collapse toggle
      notesList.querySelectorAll('.note-expand').forEach(function(el) {
        el.onclick = function() { toggleExpand(el.getAttribute('data-nid')); };
      });

      // Claude: wire delete buttons
      notesList.querySelectorAll('.note-delete').forEach(function(btn) {
        btn.onclick = function() {
          var noteId = btn.getAttribute('data-id');
          if (!confirm('Delete this note?')) return;
          window.AA.db.collection('audioNotes').doc(writeUid)
            .collection('notes').doc(noteId).delete()
            .then(function() { showToast('Note deleted'); })
            .catch(function(err) { showToast('Delete failed'); console.error(err); });
        };
      });

      // Claude: 2026-03-05 — wire rename buttons (pencil icon → inline input)
      notesList.querySelectorAll('.note-rename-btn').forEach(function(btn) {
        btn.onclick = function() {
          var row = btn.closest('.note-rename-row');
          if (!row) return;
          var noteId  = btn.getAttribute('data-id');
          var driveId = btn.getAttribute('data-driveid');
          var current = btn.getAttribute('data-title') || '';

          // Replace the row with an inline edit field
          row.innerHTML =
            '<input class="note-rename-input" type="text" maxlength="100" value="' + escHtml(current).replace(/"/g,'&quot;') + '" placeholder="Note title…">'
            + '<button class="note-rename-save">Save</button>'
            + '<button class="note-rename-cancel">Cancel</button>';

          var input  = row.querySelector('.note-rename-input');
          var saveBtn   = row.querySelector('.note-rename-save');
          var cancelBtn = row.querySelector('.note-rename-cancel');
          input.focus();
          input.select();

          function doSave() {
            var newTitle = input.value.trim();
            saveBtn.disabled = true;
            saveBtn.textContent = 'Saving…';
            // Update Firestore
            window.AA.db.collection('audioNotes').doc(writeUid)
              .collection('notes').doc(noteId)
              .update({ title: newTitle })
              .then(function() {
                // If there's a Drive file, rename it there too
                if (driveId) {
                  return renameDriveFile(driveId, newTitle || ('audio-note-' + noteId));
                }
              })
              .then(function() { showToast('Renamed!'); })
              .catch(function(err) { showToast('Rename failed'); console.error(err); });
            // renderNotes() will be called by the Firestore onSnapshot listener automatically
          }

          saveBtn.onclick = doSave;
          input.onkeydown = function(e) {
            if (e.key === 'Enter') doSave();
            if (e.key === 'Escape') cancelBtn.click();
          };
          cancelBtn.onclick = function() { renderNotes(); }; // restore view
        };
      });
    }

    /* Claude: 2026-03-05 — toggle between 100-char preview and full text (300px scroll cap) */
    function toggleExpand(nid) {
      var el = notesList.querySelector('.note-transcript[data-nid="' + nid + '"]');
      var btn = notesList.querySelector('.note-expand[data-nid="' + nid + '"]');
      if (!el) return;
      var fullText = el.getAttribute('data-full');
      if (el.classList.contains('expanded')) {
        el.classList.remove('expanded');
        el.textContent = fullText.length > 100 ? fullText.slice(0, 100) + '...' : fullText;
        if (btn) btn.textContent = 'Show more';
      } else {
        el.classList.add('expanded');
        el.textContent = fullText;
        if (btn) btn.textContent = 'Show less';
      }
    }

    // Claude: filter listeners
    searchInput.oninput = renderNotes;
    categoryFilter.onchange = renderNotes;

    // ── Auth + Init ────────────────────────────────────────────────────────────
    function waitForAA(cb, n) {
      n = n || 0;
      if (window.AA && window.AA.auth && window.AA.db) { cb(); return; }
      if (n > 40) { document.getElementById('signin-notice').textContent = 'Failed to load. Please refresh.'; return; }
      setTimeout(function() { waitForAA(cb, n + 1); }, 200);
    }

    waitForAA(function() {
      /* Claude: 2026-03-06 — grace period for auth null events, matching shared-header.
         Firebase fires onAuthStateChanged(null) transiently when the token expires in
         a background tab. We wait 5s before accepting null as a real sign-out so an
         active recording is never interrupted by a brief auth hiccup.
         If we're genuinely signed out after 5s AND a recording was in progress,
         we save the transcript to localStorage as an emergency draft so it is never lost. */
      var _anGracePeriod = null;

      /* Claude: 2026-03-06 — IndexedDB draft store (replaces localStorage version).
         IndexedDB can hold the full audio blob (no size limit), so the actual
         recording is saved, not just the transcript. */
      var _draftDB = null;
      function _openDraftDB(cb) {
        if (_draftDB) { cb(_draftDB); return; }
        var req = indexedDB.open('AA_AudioDrafts', 1);
        req.onupgradeneeded = function(e) {
          e.target.result.createObjectStore('drafts', { keyPath: 'id' });
        };
        req.onsuccess = function(e) { _draftDB = e.target.result; cb(_draftDB); };
        req.onerror   = function()  { cb(null); };
      }

      function _saveEmergencyDraft(audioBlob) {
        /* Stop speech recognition and collect any remaining audio first */
        try { stopSpeechRecognition(); } catch(e) {}
        var draft = {
          id: 'pending',
          uid: writeUid || '',
          transcript: (transcript || '').trim(),
          audioBlob: audioBlob || null,
          mimeType: recordingMimeType || 'audio/webm',
          title: noteTitle || '',
          gps: recordingGps || null,
          address: recordingAddress || null,
          duration: recordStartTime ? Math.round((Date.now() - recordStartTime) / 1000) : 0,
          savedAt: new Date().toISOString()
        };
        _openDraftDB(function(db) {
          if (!db) {
            /* IndexedDB unavailable — fall back to transcript-only via localStorage */
            try { localStorage.setItem('AA_AUDIO_DRAFT_TEXT', draft.transcript); } catch(e) {}
            showToast('Session ended — transcript saved as draft. Sign back in to recover.', 8000);
            return;
          }
          var tx = db.transaction('drafts', 'readwrite');
          tx.objectStore('drafts').put(draft);
          tx.oncomplete = function() {
            showToast('Session ended while recording — audio + transcript saved. Sign back in to continue.', 8000);
          };
          tx.onerror = function() {
            showToast('Session ended — could not save audio draft.', 6000);
          };
        });
      }

      function _restoreEmergencyDraft() {
        _openDraftDB(function(db) {
          if (!db) return;
          var tx  = db.transaction('drafts', 'readwrite');
          var req = tx.objectStore('drafts').get('pending');
          req.onsuccess = function(e) {
            var draft = e.target.result;
            if (!draft) return;
            /* Only restore if it belongs to this user (uid matches or blank) */
            if (draft.uid && writeUid && draft.uid !== writeUid) return;
            /* Delete the draft now — if save succeeds it won't re-appear; if
               save fails, user will be notified and can try again. */
            tx.objectStore('drafts').delete('pending');

            var liveEl   = document.getElementById('liveTranscript');
            var statusEl = document.getElementById('recordStatus');

            /* Restore transcript state */
            transcript = draft.transcript || '';
            noteTitle  = draft.title || '';
            recordingGps     = draft.gps || null;
            recordingAddress = draft.address || null;
            if (noteTitleInput) noteTitleInput.value = noteTitle;
            if (liveEl && transcript) { liveEl.style.display = 'block'; liveEl.textContent = transcript; }

            if (draft.audioBlob) {
              /* Restore audio blob so the normal save flow (Drive upload + Firestore) runs */
              audioChunks    = [draft.audioBlob];
              recordingMimeType = draft.mimeType || 'audio/webm';
              recordStartTime   = Date.now() - (draft.duration || 0) * 1000;
              if (statusEl) statusEl.textContent = 'Recording recovered — tap a category to save';
              showToast('Recording recovered! Tap a category button to save it.', 10000);
            } else {
              /* Audio blob didn't survive — transcript only */
              if (statusEl) statusEl.textContent = 'Transcript recovered — tap a category to save';
              showToast('Transcript recovered from last session. Tap a category to save.', 8000);
            }
          };
        });
        /* Also clear any old localStorage fallback draft */
        try {
          var oldText = localStorage.getItem('AA_AUDIO_DRAFT_TEXT');
          if (oldText) {
            localStorage.removeItem('AA_AUDIO_DRAFT_TEXT');
            if (!transcript) {
              transcript = oldText;
              var liveEl = document.getElementById('liveTranscript');
              if (liveEl) { liveEl.style.display = 'block'; liveEl.textContent = transcript; }
            }
          }
        } catch(e) {}
        /* Claude: 2026-03-06 — also restore periodic transcript backup (device-crash fallback) */
        try {
          var backupRaw = localStorage.getItem('AA_AUDIO_TRANSCRIPT_BACKUP');
          if (backupRaw) {
            localStorage.removeItem('AA_AUDIO_TRANSCRIPT_BACKUP');
            var backup = JSON.parse(backupRaw);
            if (backup.transcript && !transcript) {
              transcript = backup.transcript;
              var liveEl2 = document.getElementById('liveTranscript');
              if (liveEl2) { liveEl2.style.display = 'block'; liveEl2.textContent = transcript; }
              if (backup.title) {
                var titleEl = document.getElementById('note-title');
                if (titleEl && !titleEl.value) { titleEl.value = backup.title; }
              }
            }
          }
        } catch(e) {}
      }

      window.AA.auth.onAuthStateChanged(function(user) {
        if (!user) {
          /* Grace period — don't immediately tear down if a recording is active */
          if (_anGracePeriod) return; // already waiting
          _anGracePeriod = setTimeout(function() {
            _anGracePeriod = null;
            if (window.AA.auth.currentUser) return; // recovered — do nothing
            /* Still null after grace period — real sign-out. Save audio + transcript. */
            var isActiveRecording = mediaRecorder && mediaRecorder.state === 'recording';
            if (isActiveRecording || transcript.trim() || audioChunks.length) {
              if (isActiveRecording) {
                /* Stop recorder cleanly so ondataavailable fires before we save */
                try { stopSpeechRecognition(); } catch(e) {}
                var _mr = mediaRecorder;
                _mr.onstop = function() {
                  var blob = audioChunks.length
                    ? new Blob(audioChunks, { type: recordingMimeType })
                    : null;
                  _saveEmergencyDraft(blob);
                };
                try { _mr.stop(); } catch(e) { _saveEmergencyDraft(null); }
              } else {
                /* Not actively recording but we have chunks or transcript */
                var blob = audioChunks.length
                  ? new Blob(audioChunks, { type: recordingMimeType })
                  : null;
                _saveEmergencyDraft(blob);
              }
            }
            document.getElementById('signin-notice').textContent = 'Please sign in to use Audio Notes.';
            document.getElementById('main-body').style.display = 'none';
            document.getElementById('signin-notice').style.display = 'block';
            if (unsubNotes) unsubNotes();
          }, 5000);
          return;
        }

        /* User is present — cancel any pending grace-period sign-out */
        if (_anGracePeriod) { clearTimeout(_anGracePeriod); _anGracePeriod = null; }

        document.getElementById('signin-notice').style.display = 'none';
        document.getElementById('main-body').style.display = 'block';

        // Claude: 2026-03-05 — writeUid is always the signed-in user (you record your own notes).
        // readUid follows AA_MIRROR_UID: view your own notes when on your page,
        // student's notes when mirroring. isMirror controls UI (hide record/delete for others).
        writeUid = user.uid;

        /* Claude: 2026-03-06 — restore any emergency draft saved during a mid-recording sign-out */
        _restoreEmergencyDraft();

        function applyMirror() {
          var mirrorUid = window.AA_MIRROR_UID;
          isMirror = !!(mirrorUid && mirrorUid !== user.uid);
          readUid = isMirror ? mirrorUid : user.uid;

          // Update banner
          var banner = document.getElementById('mirrorBanner');
          if (banner) {
            if (isMirror) {
              banner.style.display = 'block';
              banner.textContent = '👁 Viewing another student\'s audio notes (read-only)';
            } else {
              banner.style.display = 'none';
            }
          }

          // Hide/show record section
          var recSection = document.getElementById('recordSection');
          var titleInput = document.getElementById('noteTitleInput');
          if (recSection) recSection.style.display = isMirror ? 'none' : '';
          if (titleInput) titleInput.style.display = isMirror ? 'none' : '';

          watchNotes(readUid);
        }

        // Claude: AA_SWITCH_STUDENT always does a full reload, so applyMirror() once at init is enough
        applyMirror();
      });
    });

    /* Claude 2026-03-07: save-then-warn on unload.
       Archive of old handler: only warned if button had 'recording' class; saved nothing.
       New behaviour:
         1. Sync-save transcript to localStorage (always completes before page dies)
         2. Async-save audio blob to IndexedDB (best-effort; completes in most browsers)
         3. Show dialog only if actively recording; unsaved transcript silently auto-saves */
    window.addEventListener('beforeunload', function(e) {
      var isRecording = mediaRecorder && mediaRecorder.state === 'recording';
      var hasChunks   = audioChunks && audioChunks.length > 0;
      var hasTxt      = transcript && transcript.trim();
      if (!isRecording && !hasChunks && !hasTxt) return; // nothing to protect

      // 1. Synchronous localStorage save — survives even if IndexedDB doesn't finish
      if (hasTxt) {
        try {
          localStorage.setItem('AA_AUDIO_TRANSCRIPT_BACKUP', JSON.stringify({
            transcript: transcript.trim(),
            title:      (document.getElementById('note-title') || {}).value || '',
            savedAt:    new Date().toISOString()
          }));
        } catch(ex) {}
      }

      // 2. Async IndexedDB save — best-effort (most browsers honour it in beforeunload)
      if (hasChunks || hasTxt) {
        var blob = hasChunks ? new Blob(audioChunks, { type: recordingMimeType }) : null;
        _saveEmergencyDraft(blob);
      }

      // 3. Warn only if actively recording so user knows they can restore
      if (isRecording) {
        e.preventDefault();
        e.returnValue = 'Recording in progress — your audio is being saved. Tap "Stay" to keep recording, or leave to restore it later.';
        return e.returnValue;
      }
    });

    /* Claude 2026-03-07: pagehide listener — fires on hard refresh, tab close, and
       navigate-away AFTER the user confirms the beforeunload dialog. At this point
       audioChunks already has data (thanks to the 10s timeslice above).
       requestData() asks the recorder for any buffered partial chunk before saving. */
    window.addEventListener('pagehide', function() {
      var isRecording = mediaRecorder && mediaRecorder.state === 'recording';
      var hasChunks   = audioChunks && audioChunks.length > 0;
      var hasTxt      = transcript && transcript.trim();
      if (!isRecording && !hasChunks && !hasTxt) return;

      // Flush any buffered partial chunk from the recorder into audioChunks
      if (isRecording) {
        try { mediaRecorder.requestData(); } catch(ex) {}
      }

      var blob = audioChunks.length ? new Blob(audioChunks, { type: recordingMimeType }) : null;
      _saveEmergencyDraft(blob);
    });

    /* Claude: 2026-03-06 — register with global presignout hook.
       If Sign Out is clicked (or forced sign-out fires) while a recording is active,
       stop the recorder cleanly, collect the blob, and save the full audio draft to
       IndexedDB before auth is cleared — same as the grace period path. */
    /* Claude: 2026-03-06 — periodic transcript backup every 30 s during recording.
       Saves transcript + title to localStorage so words survive even if the device
       dies before IndexedDB can write the audio blob (unstable-device resilience).
       AA_AUDIO_TRANSCRIPT_BACKUP is consumed by _restoreEmergencyDraft() on sign-in. */
    var _transcriptBackupTimer = null;

    function _startTranscriptBackup() {
      _stopTranscriptBackup();
      _transcriptBackupTimer = setInterval(function () {
        // Claude 2026-03-07: reset session timeout on every tick so a long recording
        // is never killed by inactivity — even if the screen locked and the OS paused
        // the recorder (which removes recordBtn.recording, breaking the shared-header guard).
        if (window.AA_resetSessionTimer) window.AA_resetSessionTimer();

        var t = (transcript || '').trim();
        if (!t) return;
        try {
          localStorage.setItem('AA_AUDIO_TRANSCRIPT_BACKUP', JSON.stringify({
            transcript: t,
            title:      (document.getElementById('note-title') || {}).value || '',
            savedAt:    new Date().toISOString()
          }));
        } catch (e) {}
      }, 30000); // every 30 seconds
    }

    function _stopTranscriptBackup() {
      if (_transcriptBackupTimer) {
        clearInterval(_transcriptBackupTimer);
        _transcriptBackupTimer = null;
      }
    }

    window.AA_PRESIGNOUT = function() {
      var isActiveRecording = mediaRecorder && mediaRecorder.state === 'recording';
      if (!isActiveRecording && !audioChunks.length && !transcript.trim()) return; // nothing to save
      return new Promise(function(resolve) {
        if (isActiveRecording) {
          try { stopSpeechRecognition(); } catch(e) {}
          var _mr = mediaRecorder;
          _mr.onstop = function() {
            var blob = audioChunks.length ? new Blob(audioChunks, { type: recordingMimeType }) : null;
            _saveEmergencyDraft(blob);
            setTimeout(resolve, 300); // brief pause so IndexedDB write can start
          };
          try { _mr.stop(); } catch(e) { _saveEmergencyDraft(null); resolve(); }
        } else {
          var blob = audioChunks.length ? new Blob(audioChunks, { type: recordingMimeType }) : null;
          _saveEmergencyDraft(blob);
          setTimeout(resolve, 300);
        }
      });
    };

  })();
  </script>
</body>
</html>
