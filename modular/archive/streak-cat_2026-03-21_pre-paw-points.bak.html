    html.aa-dark .streak-card { background: #1e1e1e; border-color: #333; }
    html.aa-dark .cat-stage { background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%); }
    html.aa-dark .item-btn { background: #2a2a2a; border-color: #444; color: #e0e0e0; }
    html.aa-dark .item-btn:hover { background: #333; }
    html.aa-dark .item-btn.equipped { background: #2d4a2d; border-color: #4ade80; }
    html.aa-dark .item-btn.locked { background: #1a1a1a; border-color: #333; color: #666; }
    html.aa-dark .cat-speech { background: #1e1e1e; border-color: #444; color: #e0e0e0; }
    html.aa-dark .cat-speech::after { border-top-color: #1e1e1e; }
    html.aa-dark .category-tab { background: #2a2a2a; color: #aaa; }
    html.aa-dark .category-tab.active { background: #3b82f6; color: #fff; }
    html.aa-dark .streak-counter { background: #1e1e1e; }
    html.aa-dark .reward-toast { background: #1e1e1e; border-color: #4ade80; }
    html.aa-dark .name-input { background: #2a2a2a; border-color: #555; color: #e0e0e0; }

    /* ── Layout ── */
    .page-wrap { max-width: 600px; margin: 0 auto; padding: 16px 12px 100px; }

    /* ── Streak counter banner ── */
    .streak-counter {
      display: flex; align-items: center; justify-content: center; gap: 12px;
      background: #fff; border-radius: 14px; padding: 14px 20px; margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08); text-align: center;
    }
    .streak-fire { font-size: 2rem; }
    .streak-number { font-size: 2.2rem; font-weight: 800; color: #f59e0b; }
    .streak-label { font-size: 0.85rem; color: #888; margin-top: 2px; }
    .streak-best { font-size: 0.75rem; color: #aaa; }

    /* ── Cat stage ── */
    .cat-stage {
      position: relative; width: 100%; aspect-ratio: 1 / 1; max-width: 360px;
      margin: 0 auto 16px; border-radius: 20px; overflow: hidden;
      background: linear-gradient(180deg, #e0f2fe 0%, #bae6fd 40%, #93c5fd 100%);
      box-shadow: 0 4px 16px rgba(0,0,0,0.1);
    }
    .cat-stage svg { width: 100%; height: 100%; }

    /* ── Cat speech bubble ── */
    .cat-speech {
      position: relative; background: #fff; border: 2px solid #e5e7eb;
      border-radius: 16px; padding: 12px 16px; margin: 0 auto 16px;
      max-width: 340px; text-align: center; font-size: 0.95rem;
      box-shadow: 0 2px 6px rgba(0,0,0,0.06);
    }
    .cat-speech::after {
      content: ''; position: absolute; top: -10px; left: 50%; transform: translateX(-50%);
      border-left: 10px solid transparent; border-right: 10px solid transparent;
      border-bottom: 10px solid #fff;
    }
    .cat-speech .cat-name { font-weight: 700; color: #6366f1; }

    /* ── Name input ── */
    .name-section { text-align: center; margin-bottom: 20px; }
    .name-input {
      font-size: 1.1rem; padding: 8px 16px; border: 2px solid #d1d5db;
      border-radius: 10px; text-align: center; width: 200px; font-family: inherit;
    }
    .name-input:focus { outline: none; border-color: #6366f1; }
    .name-save-btn {
      display: inline-block; margin-left: 8px; padding: 8px 16px;
      background: #6366f1; color: #fff; border: none; border-radius: 10px;
      cursor: pointer; font-size: 0.9rem; font-family: inherit;
    }
    .name-save-btn:hover { background: #4f46e5; }

    /* ── Category tabs ── */
    .category-tabs {
      display: flex; gap: 6px; overflow-x: auto; padding: 4px 0 12px;
      -webkit-overflow-scrolling: touch; scrollbar-width: none;
    }
    .category-tabs::-webkit-scrollbar { display: none; }
    .category-tab {
      flex-shrink: 0; padding: 8px 14px; border-radius: 20px;
      background: #f3f4f6; border: none; cursor: pointer;
      font-size: 0.82rem; font-family: inherit; color: #666;
      transition: all 0.15s ease;
    }
    .category-tab.active { background: #6366f1; color: #fff; font-weight: 600; }
    .category-tab:hover { background: #e5e7eb; }
    .category-tab.active:hover { background: #4f46e5; }

    /* ── Item grid ── */
    .items-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      gap: 10px; margin-bottom: 20px;
    }
    .item-btn {
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      padding: 10px 6px; border: 2px solid #e5e7eb; border-radius: 12px;
      background: #fff; cursor: pointer; font-family: inherit;
      transition: all 0.15s ease; font-size: 0.78rem; color: #555;
      min-height: 80px; justify-content: center;
    }
    .item-btn:hover { border-color: #6366f1; transform: translateY(-1px); }
    .item-btn.equipped { border-color: #4ade80; background: #f0fdf4; }
    .item-btn.equipped::after { content: '✓'; position: absolute; top: 4px; right: 6px; color: #16a34a; font-size: 0.7rem; font-weight: 700; }
    .item-btn { position: relative; }
    .item-btn.locked { opacity: 0.45; cursor: default; border-color: #e5e7eb; }
    .item-btn.locked:hover { border-color: #e5e7eb; transform: none; }
    .item-emoji { font-size: 1.8rem; }
    .item-label { font-size: 0.72rem; text-align: center; line-height: 1.2; }
    .item-unlock { font-size: 0.65rem; color: #f59e0b; margin-top: 2px; }

    /* ── Reward toast ── */
    .reward-toast {
      position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
      background: #fff; border: 2px solid #4ade80; border-radius: 16px;
      padding: 16px 24px; box-shadow: 0 8px 30px rgba(0,0,0,0.15);
      z-index: 500; text-align: center; animation: toastIn 0.4s ease;
      display: none;
    }
    .reward-toast.show { display: block; }
    .reward-emoji { font-size: 2.5rem; }
    .reward-text { font-size: 0.95rem; margin-top: 6px; font-weight: 600; }
    .reward-sub { font-size: 0.8rem; color: #888; margin-top: 4px; }
    @keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(20px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }

    /* ── Milestone progress ── */
    .milestone-bar {
      background: #f3f4f6; border-radius: 10px; padding: 12px 16px;
      margin-bottom: 16px;
    }
    .milestone-label { font-size: 0.8rem; color: #888; margin-bottom: 6px; }
    .milestone-track { height: 8px; background: #e5e7eb; border-radius: 4px; overflow: hidden; }
    .milestone-fill { height: 100%; background: linear-gradient(90deg, #f59e0b, #ef4444); border-radius: 4px; transition: width 0.5s ease; }
    html.aa-dark .milestone-bar { background: #1e1e1e; }
    html.aa-dark .milestone-track { background: #333; }

    }
    html.aa-dark .checkin-prompt { background: #1a1500; border-color: #f59e0b; }

    function todayStr() {
      var d = new Date();
      return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
    }

    function yesterdayStr() {
      var d = new Date();
      d.setDate(d.getDate() - 1);
      return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
    }

    function isUnlocked(itemId) {

    /* ══════════════════════════════════════════════════════════
       STREAK CALCULATION FROM CHECK-IN DATA
       ══════════════════════════════════════════════════════════ */
    /* Claude: 2026-03-21 — audit fix: O(1) date lookups via hash, retry on transient failure,
       guard against malformed date doc IDs, and safety timeout */
    function calculateStreak(uid, callback, _retries) {
      _retries = _retries || 0;
      /* Read from checkins/{uid}/days, ordered by date desc */
      AA.db.collection('checkins').doc(uid).collection('days')
        .orderBy(firebase.firestore.FieldPath.documentId(), 'desc')
        .limit(400)  /* max 400 days back — supports 365-day bonus unlock */
        .get()
        .then(function(snap) {
          if (snap.empty) { callback(0, false); return; }

          /* Build hash set for O(1) lookups instead of O(n) indexOf */
          var dateSet = {};
          snap.forEach(function(doc) {
            /* Guard: only include properly formatted YYYY-MM-DD doc IDs */
            if (/^\d{4}-\d{2}-\d{2}$/.test(doc.id)) {
              dateSet[doc.id] = true;
            }
          });

          var today = todayStr();
          var yesterday = yesterdayStr();
          var checkedInToday = !!dateSet[today];

          /* Count consecutive days back from today or yesterday */
          var startDate = checkedInToday ? today : yesterday;
          if (!dateSet[startDate]) {
            /* No check-in today or yesterday = streak broken */
            callback(0, false);
            return;
          }

          var streak = 0;
          var d = new Date(startDate + 'T12:00:00');  /* noon to avoid DST issues */
          while (streak <= 400) {  /* safety cap */
            var ds = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
            if (dateSet[ds]) {
              streak++;
              d.setDate(d.getDate() - 1);
            } else {
              break;
            }
          }

          callback(streak, checkedInToday);
        })
        .catch(function(err) {
          console.warn('[StreakCat] checkin read failed (attempt ' + (_retries + 1) + '):', err.message);
          /* Retry once on transient network failure */
          if (_retries < 2) {
            setTimeout(function() { calculateStreak(uid, callback, _retries + 1); }, 1500);
          } else {
            callback(0, false);
          }
        });
    }

      existingUnlocked.forEach(function(id) { has[id] = true; });

        if (has[item.id]) return;  /* already have it */
        if (item.unlock === 'streak' && streak >= item.at) {
          newItems.push(item);
        }
      });

      return newItems;
    }

    function rollRandomReward(streak, existingUnlocked, lastRewardDate) {
      /* Only one random reward per day */
      if (lastRewardDate === todayStr()) return null;
      if (streak < 1) return null;

      /* Build hash for O(1) membership check */
      var has = {};
      existingUnlocked.forEach(function(id) { has[id] = true; });

      /* Pool: random items whose pool requirement <= streak */
      var pool = ITEMS.filter(function(item) {
        if (item.unlock !== 'random') return false;
        if (has[item.id]) return false;
        return streak >= item.pool;
      });

      if (pool.length === 0) return null;

      return pool[Math.floor(Math.random() * pool.length)];
    }

    /* Claude: 2026-03-21 — audit fix: dedup helper — prevents duplicates in
       unlockedItems array on reload race or double-fire */
    function dedup(arr) {
      var seen = {};
      return arr.filter(function(id) {
        if (seen[id]) return false;
        seen[id] = true;
        return true;
      });
    }

        state.bestStreak     = d.bestStreak || 0;
        state.lastRewardDate = d.lastRewardDate || '';
        state.unlockedItems  = dedup(d.unlockedItems || []);

    function updateMilestone() {
      var next = null;
      for (var i = 0; i < MILESTONES.length; i++) {
        if (state.streak < MILESTONES[i]) { next = MILESTONES[i]; break; }
      }
      var bar = document.getElementById('milestone-bar');
      if (!next) {
        document.getElementById('milestone-label').textContent = '🏆 All milestones reached!';
        document.getElementById('milestone-fill').style.width = '100%';
        return;
      }
      /* Find the previous milestone */
      var prev = 0;
      for (var j = MILESTONES.length - 1; j >= 0; j--) {
        if (MILESTONES[j] <= state.streak) { prev = MILESTONES[j]; break; }
      }
      var pct = Math.min(100, Math.round(((state.streak - prev) / (next - prev)) * 100));
      document.getElementById('milestone-label').textContent = 'Next unlock: ' + next + '-day streak (' + state.streak + '/' + next + ')';
      document.getElementById('milestone-fill').style.width = pct + '%';

      state.equippedItems = dedup(state.equippedItems);

      }, { merge: true }).then(function() {

        /* Retry once after 2 seconds */
        setTimeout(function() {

              lastCheckinDate: state.lastCheckinDate, lastRewardDate: state.lastRewardDate,
              unlockedItems: state.unlockedItems, equippedItems: state.equippedItems,
              updatedAt: firebase.firestore.FieldValue.serverTimestamp()

    /* Claude: 2026-03-21 — audit fix: retry load, dedup on load, localStorage fallback,
       stale ID cleanup (e.g. old 'bonus-cat' from prior testing) */
    function loadState(uid, callback, _retries) {
      _retries = _retries || 0;
      AA.db.collection('streakCat').doc(uid).get().then(function(doc) {
        if (doc.exists) {
          var d = doc.data();
          state.catName         = d.catName || '';
          state.bestStreak      = d.bestStreak || 0;
          state.lastRewardDate  = d.lastRewardDate || '';
          state.unlockedItems   = dedup(d.unlockedItems || []);
          state.equippedItems   = dedup(d.equippedItems || []);
        }
        cleanStaleIds();  /* remove old 'bonus-cat' etc. */
        backupToLocal();  /* mirror good state to localStorage */
        callback();
      }).catch(function(err) {
        console.warn('[StreakCat] load failed (attempt ' + (_retries + 1) + '):', err.message);
        if (_retries < 2) {
          setTimeout(function() { loadState(uid, callback, _retries + 1); }, 1500);
        } else {
          /* Firestore gave up — try localStorage as crash-recovery fallback */
          console.warn('[StreakCat] Firestore failed — falling back to localStorage backup');
          var restored = restoreFromLocal();
          if (restored) cleanStaleIds();
          callback();
        }
      });
    }

      };

      /* Unlock all items */
      document.getElementById('test-unlock-all').onclick = function() {
        ITEMS.forEach(function(item) {
          if (state.unlockedItems.indexOf(item.id) === -1) {
            state.unlockedItems.push(item.id);
          }
        });
        renderItems();
        updateSpeech('newItem');
        saveState();
      };

      /* Random outfit */
      document.getElementById('test-equip-random').onclick = function() {
        state.equippedItems = [];
        /* Pick one random item per category from unlocked */
        CATEGORIES.forEach(function(cat) {
          var available = ITEMS.filter(function(it) {
            return it.cat === cat.id && state.unlockedItems.indexOf(it.id) !== -1;
          });
          if (available.length > 0) {
            var pick = available[Math.floor(Math.random() * available.length)];
            state.equippedItems.push(pick.id);
          }
        });
        updateCatStage();
        renderItems();
        updateSpeech('dressed');
        saveState();
      };

      /* Strip all equipped */
      document.getElementById('test-unequip').onclick = function() {
        state.equippedItems = [];
        updateCatStage();
        renderItems();
        updateSpeech('naked');
        saveState();
      };

      /* Reset everything */
      document.getElementById('test-reset').onclick = function() {
        if (!confirm('Reset all streak cat data? This clears name, items, streak — everything.')) return;
        state.catName = '';
        state.streak = 0;
        state.bestStreak = 0;
        state.lastCheckinDate = '';
        state.lastRewardDate = '';
        state.unlockedItems = [];
        state.equippedItems = [];
        document.getElementById('name-section').style.display = 'block';
        updateStreakDisplay();
        updateMilestone();
        updateCatStage();
        renderItems();
        updateSpeech();
        saveState();
      };
    })();
  </script>
</body>
</html>
