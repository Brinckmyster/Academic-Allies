<script>
  /* Claude: 2026-03-17 — Fill-in-the-blank quiz with all 5 categories */

    { quiz: 4, common: 'Iris', genus: 'Iris', aliases: [] },
    { quiz: 4, common: 'Gerber Daisy', genus: 'Gerbera', aliases: [] },

    // Quiz 5: Foliage
    { quiz: 5, common: 'Leather Leaf', genus: 'Rumohra', aliases: [] },
    { quiz: 5, common: 'Bear Grass', genus: 'Xerophyllum', aliases: [] },
    { quiz: 5, common: 'Lily Grass', genus: 'Liriope', aliases: [] },
    { quiz: 5, common: 'Seeded Eucalyptus', genus: 'Eucalyptus', aliases: [] },
    { quiz: 5, common: 'Israeli Ruscus', genus: 'Ruscus', aliases: [] },
    { quiz: 5, common: 'Italian Ruscus', genus: 'Ruscus', aliases: [] },
    { quiz: 5, common: 'Salal', genus: 'Gaultheria', aliases: ['Lemon Leaf'] },
    { quiz: 5, common: 'Grevillea', genus: 'Grevillea', aliases: [] },
    { quiz: 5, common: 'Pitt', genus: 'Pittosporum', aliases: [] },
    { quiz: 5, common: 'Myrtle', genus: 'Myrtus', aliases: [] }
  ];

  /* Quiz state */
  var quizState = {
    mode: 'genus', // 'genus' or 'common'
    selectedQuiz: 'all', // 'all' or '1'-'5'
    currentDeck: [],
    currentIndex: 0,
    correct: 0,
    total: 0,
    missed: [],
    retryingMissed: false
  };

  /* DOM elements */
  var promptLabel = document.getElementById('promptLabel');
  var promptText = document.getElementById('promptText');
  var answerInput = document.getElementById('answerInput');
  var checkBtn = document.getElementById('checkBtn');
  var nextBtn = document.getElementById('nextBtn');
  var feedback = document.getElementById('feedback');
  var scoreDisplay = document.querySelector('.score-display .number');
  var totalDisplay = document.querySelector('.score-display .total');
  var percentageDisplay = document.querySelector('.score-display .percentage');
  var progressFill = document.querySelector('.progress-fill');
  var card = document.querySelector('.card');
  var endScreen = document.getElementById('endScreen');
  var finalScore = document.getElementById('finalScore');
  var finalMessage = document.getElementById('finalMessage');
  var retryMissedBtn = document.getElementById('retryMissedBtn');
  var homeBtn = document.getElementById('homeBtn');

  /* Fisher-Yates shuffle */
  function shuffle(array) {
    var arr = array.slice();
    for (var i = arr.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var temp = arr[i];
      arr[i] = arr[j];
      arr[j] = temp;
    }
    return arr;
  }

  /* Build deck from selected quiz */
  function buildDeck() {
    var filtered = flowerData.filter(function(flower) {
      if (quizState.selectedQuiz === 'all') return true;
      return flower.quiz === parseInt(quizState.selectedQuiz, 10);
    });
    quizState.currentDeck = shuffle(filtered);
    quizState.currentIndex = 0;
    quizState.correct = 0;
    quizState.total = quizState.currentDeck.length;
    quizState.missed = [];
    updateDisplay();
  }

  /* Build deck from missed items */
  function buildMissedDeck() {
    quizState.currentDeck = shuffle(quizState.missed);
    quizState.currentIndex = 0;
    quizState.correct = 0;
    quizState.total = quizState.currentDeck.length;
    quizState.missed = [];
    quizState.retryingMissed = true;
    updateDisplay();
  }

  /* Update score and progress */
  function updateDisplay() {
    scoreDisplay.textContent = quizState.correct;
    totalDisplay.textContent = quizState.total;
    var pct = quizState.total > 0 ? Math.round((quizState.correct / quizState.total) * 100) : 0;
    percentageDisplay.textContent = pct;
    var progressPct = quizState.total > 0 ? ((quizState.currentIndex + 1) / quizState.total) * 100 : 0;
    progressFill.style.width = progressPct + '%';
    displayQuestion();
  }

  /* Display current question */
  function displayQuestion() {
    resetCard();
    if (quizState.currentIndex >= quizState.currentDeck.length) {
      showEndScreen();
      return;
    }
    var flower = quizState.currentDeck[quizState.currentIndex];
    if (quizState.mode === 'genus') {
      promptLabel.textContent = 'Type the Genus';
      promptText.innerHTML = flower.common;
    } else {
      promptLabel.textContent = 'Type the Common Name';
      promptText.innerHTML = flower.genus + ' <button class="pronunciation-btn" title="Pronounce">\u{1F50A}</button>';
      var pronounceBtn = promptText.querySelector('.pronunciation-btn');
      pronounceBtn.addEventListener('click', function(e) {
        e.preventDefault();
        pronounce(flower.genus);
      });
    }
    answerInput.focus();
  }

  /* Text-to-speech pronunciation */
  function pronounce(text) {
    if ('speechSynthesis' in window) {
      window.speechSynthesis.cancel();
      var utterance = new SpeechSynthesisUtterance(text);
      utterance.rate = 0.9;
      window.speechSynthesis.speak(utterance);
    }
  }

  /* Claude: 2026-03-17 — Levenshtein distance for "close but wrong" feedback */
  function editDistance(a, b) {
    var m = a.length, n = b.length;
    var dp = [];
    for (var i = 0; i <= m; i++) {
      dp[i] = [i];
      for (var j = 1; j <= n; j++) {
        dp[i][j] = i === 0 ? j : 0;
      }
    }
    for (var i = 1; i <= m; i++) {
      for (var j = 1; j <= n; j++) {
        if (a[i - 1] === b[j - 1]) {
          dp[i][j] = dp[i - 1][j - 1];
        } else {
          dp[i][j] = 1 + Math.min(dp[i - 1][j], dp[i][j - 1], dp[i - 1][j - 1]);
        }
      }
    }
    return dp[m][n];
  }

  /* Check answer — STRICT spelling, case-insensitive only */
  function checkAnswer() {
    var flower = quizState.currentDeck[quizState.currentIndex];
    var userAnswer = answerInput.value.trim();
    var isCorrect = false;

    if (quizState.mode === 'genus') {
      isCorrect = userAnswer.toLowerCase() === flower.genus.toLowerCase();
    } else {
      // Type common name mode
      isCorrect = userAnswer.toLowerCase() === flower.common.toLowerCase();
      if (!isCorrect) {
        // Check aliases
        for (var i = 0; i < flower.aliases.length; i++) {
          if (userAnswer.toLowerCase() === flower.aliases[i].toLowerCase()) {
            isCorrect = true;
            break;
          }
        }
      }
    }

    if (isCorrect) {
      quizState.correct++;
      card.classList.add('correct-flash');
      feedback.classList.add('show', 'correct');
      feedback.innerHTML = '✓ Correct!';
      updateMissedCounter(false);
    } else {
      card.classList.add('incorrect-flash');
      feedback.classList.add('show', 'incorrect');
      var correctText = quizState.mode === 'genus' ? flower.genus : flower.common;
      /* Show "close!" encouragement if within 2 edits — helps Mary learn without just punishing */
      var dist = editDistance(userAnswer.toLowerCase(), correctText.toLowerCase());
      var closeMsg = '';
      if (userAnswer.length > 0 && dist <= 2) {
        closeMsg = '<div style="color:#e65100;font-size:0.85rem;margin-top:4px;">So close! Check your spelling carefully.</div>';
      }
      feedback.innerHTML = '✗ Incorrect.' + closeMsg + '<div class="correct-answer">Answer: <strong>' + correctText + '</strong></div>';
      quizState.missed.push(flower);
      updateMissedCounter(true);
    }

    checkBtn.style.display = 'none';
    nextBtn.style.display = 'inline-block';
    answerInput.disabled = true;
  }

  /* Update localStorage missed counter */
  function updateMissedCounter(isMiss) {
    var missed = parseInt(localStorage.getItem('AA_FLORAL_MISSED') || '0', 10);
    if (isMiss) {
      localStorage.setItem('AA_FLORAL_MISSED', String(missed + 1));
    } else {
      if (missed > 0) {
        localStorage.setItem('AA_FLORAL_MISSED', String(missed - 1));
      }
    }
  }

  /* Reset card to initial state */
  function resetCard() {
    card.classList.remove('correct-flash', 'incorrect-flash');
    feedback.classList.remove('show', 'correct', 'incorrect');
    feedback.innerHTML = '';
    answerInput.value = '';
    answerInput.disabled = false;
    checkBtn.style.display = 'inline-block';
    nextBtn.style.display = 'none';
  }

  /* Show end screen */
  function showEndScreen() {
    card.style.display = 'none';
    endScreen.style.display = 'block';
    var pct = quizState.total > 0 ? Math.round((quizState.correct / quizState.total) * 100) : 0;
    finalScore.textContent = pct + '%';

    if (quizState.retryingMissed) {
      finalMessage.textContent = 'Nice work on the retry!';
      retryMissedBtn.style.display = 'none';
    } else {
      if (pct === 100) {
        finalMessage.textContent = 'Perfect score! You\'re ready for the exam!';
        retryMissedBtn.style.display = 'none';
      } else if (quizState.missed.length > 0) {
        finalMessage.textContent = 'You missed ' + quizState.missed.length + ' — want to try again?';
        retryMissedBtn.style.display = 'inline-block';
      } else {
        finalMessage.textContent = 'Great job!';
        retryMissedBtn.style.display = 'none';
      }
    }
  }

  /* Event listeners */
  document.querySelectorAll('.mode-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      document.querySelectorAll('.mode-btn').forEach(function(b) {
        b.classList.remove('active');
      });
      btn.classList.add('active');
      quizState.mode = btn.getAttribute('data-mode');
      card.style.display = 'block';
      endScreen.style.display = 'none';
      buildDeck();
    });
  });

  document.querySelectorAll('.filter-pill').forEach(function(btn) {
    btn.addEventListener('click', function() {
      document.querySelectorAll('.filter-pill').forEach(function(b) {
        b.classList.remove('active');
      });
      btn.classList.add('active');
      quizState.selectedQuiz = btn.getAttribute('data-quiz');
      card.style.display = 'block';
      endScreen.style.display = 'none';
      buildDeck();
    });
  });

  checkBtn.addEventListener('click', checkAnswer);
  answerInput.addEventListener('keypress', function(e) {
    if (e.key === 'Enter') {
      checkAnswer();
    }
  });

  nextBtn.addEventListener('click', function() {
    quizState.currentIndex++;
    updateDisplay();
  });

  retryMissedBtn.addEventListener('click', function() {
    buildMissedDeck();
    card.style.display = 'block';
    endScreen.style.display = 'none';
  });

  homeBtn.addEventListener('click', function() {
    window.location.href = '/Academic-Allies/';
  });

  /* Initialize */
  buildDeck();
</script>

</body>
