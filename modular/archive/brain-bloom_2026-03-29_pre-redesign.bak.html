    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
        }
        body {
            font-family: 'Atkinson Hyperlegible', 'OpenDyslexic', Arial, sans-serif;
            font-size: 18pt;
            line-height: 1.5;
            letter-spacing: 0.035em;
            background: #FAFAF9;
            color: #333;
            min-height: 100vh;
            padding: 20px;
        }
        .bb-container {
            max-width: 600px;
            margin: 0 auto;
        }
        .bb-header {
            text-align: center;
            margin-bottom: 20px;
        }
        .bb-header h1 {
            font-size: 22pt;
            color: #6CA0A3;
            margin-bottom: 4px;
        }
        .bb-header p {
            font-size: 14pt;
            color: #888;
        }
        .bb-card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .bb-card h2 {
            color: #6CA0A3;
            margin-bottom: 10px;
            font-size: 20pt;
        }
        .bb-btn {
            background: #6CA0A3;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            font-size: 16pt;
            font-family: inherit;
            cursor: pointer;
            margin: 4px;

        .bb-btn:hover { opacity: 0.9; }
        .bb-btn:disabled { opacity: 0.5; cursor: default; }
        .bb-btn-sm {
            background: #f0f7f8;
            color: #6CA0A3;
            border: 1px solid #c5dfe1;
            border-radius: 8px;
            padding: 6px 14px;
            font-size: 14pt;
            font-family: inherit;
            cursor: pointer;
            margin: 3px;
        }
        .bb-btn-sm.active {
            background: #6CA0A3;
            color: white;
            border-color: #6CA0A3;
        }
        .bb-score {
            text-align: center;
            font-size: 14pt;
            color: #888;
            margin-bottom: 12px;
        }
        .bb-msg {
            text-align: center;
            font-size: 16pt;
            margin: 12px 0;
            min-height: 30px;
        }
        .bb-msg.success { color: #4CAF50; }
        .bb-msg.miss { color: #e67e22; }
        .bb-msg.info { color: #6CA0A3; }

        /* ── Memory Match ─────────────────────────────────── */
        .mm-grid {
            display: grid;
            gap: 8px;
            justify-content: center;
            margin: 16px auto;
        }
        .mm-card {
            width: 70px;
            height: 70px;
            background: #6CA0A3;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28pt;
            cursor: pointer;
            transition: transform 0.3s, background 0.3s;
            user-select: none;
        }
        .mm-card.flipped {
            background: #f0f7f8;
            transform: rotateY(180deg);
        }
        .mm-card.matched {
            background: #d4edda;
            cursor: default;
        }
        .mm-card.hidden-content span { visibility: hidden; }
        .mm-card.flipped span, .mm-card.matched span { visibility: visible; }

        /* ── Sequence Echo ────────────────────────────────── */
        .se-grid {
            display: grid;
            grid-template-columns: repeat(3, 80px);
            gap: 10px;
            justify-content: center;
            margin: 16px auto;
        }
        .se-tile {
            width: 80px;
            height: 80px;
            border-radius: 14px;
            cursor: pointer;
            transition: transform 0.15s, filter 0.15s;
            border: 2px solid rgba(0,0,0,0.1);
        }
        .se-tile.lit {
            filter: brightness(1.5);
            transform: scale(1.1);
        }
        .se-tile:active { transform: scale(0.95); }

        /* ── Word Garden ──────────────────────────────────── */
        .wg-word {
            display: inline-block;
            background: #f0f7f8;
            color: #333;
            border: 2px solid #c5dfe1;
            border-radius: 10px;
            padding: 8px 16px;
            margin: 4px;
            font-size: 16pt;
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s;
            user-select: none;
        }
        .wg-word.selected {
            background: #6CA0A3;
            color: white;
            border-color: #6CA0A3;
        }
        .wg-word.correct {
            background: #d4edda;
            border-color: #4CAF50;
            color: #333;
        }
        .wg-word.wrong {
            background: #f8d7da;
            border-color: #e74c3c;
            color: #333;
        }
        .wg-study-list {
            text-align: center;
            font-size: 20pt;
            line-height: 2;
            min-height: 100px;
        }

        /* ── Difficulty bar ────────────────────────────────── */
        .bb-difficulty {
            text-align: center;
            margin: 10px 0;
        }

        /* ── Back link ─────────────────────────────────────── */
        .bb-back {
            display: inline-block;
            color: #6CA0A3;
            font-size: 14pt;
            text-decoration: none;
            margin-bottom: 12px;
        }
        .bb-back:hover { text-decoration: underline; }

        /* ── Dark mode ─────────────────────────────────────── */
        html.aa-dark body { background: #121212; color: #e0e0e0; }
        html.aa-dark .bb-card { background: #1e1e2e; box-shadow: 0 2px 8px rgba(0,0,0,0.4); }
        html.aa-dark .bb-card h2 { color: #7abfc2; }
        html.aa-dark .bb-btn-sm { background: #1a2e30; color: #7abfc2; border-color: #3d6a6d; }
        html.aa-dark .bb-btn-sm.active { background: #4a7f82; color: white; }
        html.aa-dark .mm-card { background: #3d6a6d; }
        html.aa-dark .mm-card.flipped { background: #1a2e30; }
        html.aa-dark .mm-card.matched { background: #1a3a2a; }
        html.aa-dark .se-tile { border-color: rgba(255,255,255,0.1); }
        html.aa-dark .wg-word { background: #1a2e30; color: #e0e0e0; border-color: #3d6a6d; }
        html.aa-dark .wg-word.selected { background: #4a7f82; color: white; border-color: #7abfc2; }
        html.aa-dark .wg-word.correct { background: #1a3a2a; border-color: #4CAF50; color: #e0e0e0; }
        html.aa-dark .wg-word.wrong { background: #3a1a1a; border-color: #e74c3c; color: #e0e0e0; }
        html.aa-dark .bb-header h1 { color: #7abfc2; }
    </style>
</head>

    <script>
    /* ================================================================
       Brain Bloom — Recovery Mini-Games
       Claude: 2026-03-29
       Three rotating recall games with adjustable difficulty.
       ================================================================ */
    (function() {
      'use strict';

      /* ── State ─────────────────────────────────────────── */
      var _difficulty = 'easy';
      var _streak = 0;
      var _best = 0;
      var _currentGame = null;
      var _gameActive = false;
      var GAMES = ['memory-match', 'sequence-echo', 'word-garden'];
      var _gameIndex = Math.floor(Math.random() * GAMES.length);

      /* ── DOM refs ──────────────────────────────────────── */
      var gameArea   = document.getElementById('bb-game-area');
      var gameTitle  = document.getElementById('bb-game-title');
      var msgEl      = document.getElementById('bb-msg');
      var streakEl   = document.getElementById('bb-streak');
      var bestEl     = document.getElementById('bb-best');

      /* ── Encouragement messages ────────────────────────── */
      var PRAISE = [
        'Nice! 🌟', 'You got it! 💚', 'Beautiful! 🌸', 'Sharp! ✨',
        'Well done! 🎉', 'Blooming! 🌻', 'Yes! 💪', 'Perfect! 🌈'
      ];
      var MISS_MSG = [
        'Almost! Try again 💚', 'So close! 🌱', 'No worries — next one! 🌼',
        'You\'re still doing great 💛', 'That\'s okay! Keep going 🌸'
      ];

      function praise() { return PRAISE[Math.floor(Math.random() * PRAISE.length)]; }
      function missMsg() { return MISS_MSG[Math.floor(Math.random() * MISS_MSG.length)]; }

      function showMsg(text, cls) {
        msgEl.textContent = text;
        msgEl.className = 'bb-msg ' + (cls || 'info');
      }

      function updateScore() {
        streakEl.textContent = '🔥 Streak: ' + _streak;
        bestEl.textContent = '⭐ Best: ' + _best;
      }

      function streakUp() {
        _streak++;
        if (_streak > _best) _best = _streak;
        updateScore();
        _saveScore();
      }

      function streakReset() {
        _streak = 0;
        updateScore();
      }

      /* ── Difficulty ────────────────────────────────────── */
      window.bbSetDifficulty = function(d) {
        _difficulty = d;
        var btns = ['easy', 'medium', 'hard'];
        for (var i = 0; i < btns.length; i++) {
          var el = document.getElementById('diff-' + btns[i]);
          if (el) el.className = 'bb-btn-sm' + (btns[i] === d ? ' active' : '');
        }
      };

      /* ── Game picker ───────────────────────────────────── */
      window.bbShuffle = function() {
        _gameIndex = (_gameIndex + 1) % GAMES.length;
        _showGameTitle();
        gameArea.innerHTML = '';
        showMsg('Tap Play to start!', 'info');
      };

      window.bbPlay = function() {
        if (_gameActive) return;
        _currentGame = GAMES[_gameIndex];
        _showGameTitle();
        if (_currentGame === 'memory-match') _startMemoryMatch();
        else if (_currentGame === 'sequence-echo') _startSequenceEcho();
        else if (_currentGame === 'word-garden') _startWordGarden();
      };

      function _showGameTitle() {
        var g = GAMES[_gameIndex];
        if (g === 'memory-match') gameTitle.textContent = '🃏 Memory Match';
        else if (g === 'sequence-echo') gameTitle.textContent = '🎵 Sequence Echo';
        else if (g === 'word-garden') gameTitle.textContent = '🌼 Word Garden';
      }

      /* ================================================================
         GAME 1: Memory Match
         Flip cards to find matching pairs.
         ================================================================ */
      var MM_EMOJIS = ['🌸','🌻','🦋','🌈','⭐','🎵','💚','🍀','🌙','🐝','🎀','🦊','🌺','🍄','🐢','🔔'];

      function _mmGridSize() {
        if (_difficulty === 'easy') return { cols: 3, rows: 2 };   /* 6 cards = 3 pairs */
        if (_difficulty === 'medium') return { cols: 4, rows: 3 }; /* 12 cards = 6 pairs */
        return { cols: 4, rows: 4 };                                /* 16 cards = 8 pairs */
      }

      function _startMemoryMatch() {
        _gameActive = true;
        showMsg('Find the matching pairs!', 'info');
        var size = _mmGridSize();
        var pairCount = (size.cols * size.rows) / 2;
        var shuffled = MM_EMOJIS.slice();
        _shuffle(shuffled);
        var picked = shuffled.slice(0, pairCount);
        var deck = picked.concat(picked);
        _shuffle(deck);

        var grid = document.createElement('div');
        grid.className = 'mm-grid';
        grid.style.gridTemplateColumns = 'repeat(' + size.cols + ', 70px)';

        var flipped = [];
        var matched = 0;
        var lockBoard = false;

        for (var i = 0; i < deck.length; i++) {
          var card = document.createElement('div');
          card.className = 'mm-card hidden-content';
          card.setAttribute('data-emoji', deck[i]);
          card.innerHTML = '<span>' + deck[i] + '</span>';
          card.setAttribute('role', 'button');
          card.setAttribute('aria-label', 'Card ' + (i + 1) + ' — face down');
          card.setAttribute('tabindex', '0');
          (function(c) {
            var handler = function() {
              if (lockBoard) return;
              if (c.classList.contains('flipped') || c.classList.contains('matched')) return;
              c.classList.add('flipped');
              c.classList.remove('hidden-content');
              c.setAttribute('aria-label', 'Card — ' + c.getAttribute('data-emoji'));
              flipped.push(c);

              if (flipped.length === 2) {
                lockBoard = true;
                var a = flipped[0], b = flipped[1];
                if (a.getAttribute('data-emoji') === b.getAttribute('data-emoji')) {
                  a.classList.add('matched');
                  b.classList.add('matched');
                  matched++;
                  flipped = [];
                  lockBoard = false;
                  if (matched === pairCount) {
                    streakUp();
                    showMsg(praise(), 'success');
                    _gameActive = false;
                    /* Auto-advance to next game after a win */
                    setTimeout(function() {
                      _gameIndex = (_gameIndex + 1) % GAMES.length;
                    }, 1500);
                  }
                } else {
                  setTimeout(function() {
                    a.classList.remove('flipped');
                    a.classList.add('hidden-content');
                    a.setAttribute('aria-label', 'Card — face down');
                    b.classList.remove('flipped');
                    b.classList.add('hidden-content');
                    b.setAttribute('aria-label', 'Card — face down');
                    flipped = [];
                    lockBoard = false;
                  }, 800);
                }
              }
            };
            c.addEventListener('click', handler);
            c.addEventListener('keydown', function(e) {
              if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); handler(); }
            });
          })(card);
          grid.appendChild(card);
        }
        gameArea.innerHTML = '';
        gameArea.appendChild(grid);
      }

      /* ================================================================
         GAME 2: Sequence Echo
         Watch tiles light up, then tap them in the same order.
         ================================================================ */
      var SE_COLORS = ['#e74c3c','#3498db','#2ecc71','#f1c40f','#9b59b6','#e67e22','#1abc9c','#e84393','#6c5ce7'];

      function _seSeqLen() {
        if (_difficulty === 'easy') return 3;
        if (_difficulty === 'medium') return 5;
        return 7;
      }

      function _startSequenceEcho() {
        _gameActive = true;
        var seqLen = _seSeqLen();
        showMsg('Watch the sequence…', 'info');

        var grid = document.createElement('div');
        grid.className = 'se-grid';

        var tiles = [];
        for (var i = 0; i < 9; i++) {
          var tile = document.createElement('div');
          tile.className = 'se-tile';
          tile.style.background = SE_COLORS[i];
          tile.setAttribute('data-idx', i);
          tile.setAttribute('role', 'button');
          tile.setAttribute('aria-label', 'Tile ' + (i + 1));
          tile.setAttribute('tabindex', '0');
          tiles.push(tile);
          grid.appendChild(tile);
        }

        gameArea.innerHTML = '';
        gameArea.appendChild(grid);

        /* Generate sequence */
        var sequence = [];
        for (var s = 0; s < seqLen; s++) {
          sequence.push(Math.floor(Math.random() * 9));
        }

        /* Play sequence */
        var showIdx = 0;
        var playInterval = setInterval(function() {
          if (showIdx > 0) tiles[sequence[showIdx - 1]].classList.remove('lit');
          if (showIdx >= sequence.length) {
            clearInterval(playInterval);
            showMsg('Your turn! Tap the tiles in order.', 'info');
            _enableSeInput(tiles, sequence);
            return;
          }
          tiles[sequence[showIdx]].classList.add('lit');
          showIdx++;
        }, 700);
      }

      function _enableSeInput(tiles, sequence) {
        var inputIdx = 0;
        for (var i = 0; i < tiles.length; i++) {
          (function(tile, idx) {
            var handler = function() {
              if (!_gameActive) return;
              tile.classList.add('lit');
              setTimeout(function() { tile.classList.remove('lit'); }, 200);

              if (idx === sequence[inputIdx]) {
                inputIdx++;
                if (inputIdx === sequence.length) {
                  _gameActive = false;
                  streakUp();
                  showMsg(praise(), 'success');
                  setTimeout(function() {
                    _gameIndex = (_gameIndex + 1) % GAMES.length;
                  }, 1500);
                }
              } else {
                _gameActive = false;
                streakReset();
                showMsg(missMsg(), 'miss');
              }
            };
            tile.addEventListener('click', handler);
            tile.addEventListener('keydown', function(e) {
              if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); handler(); }
            });
          })(tiles[i], i);
        }
      }

      /* ================================================================
         GAME 3: Word Garden
         See words briefly, then pick which ones you saw.
         ================================================================ */
      var WG_WORDS = [
        'sunshine','garden','river','blanket','candle','honey','feather','blossom',
        'rainbow','meadow','willow','pebble','harvest','breeze','lantern','clover',
        'acorn','orchid','jasmine','marble','velvet','crystal','ember','dusk',
        'coral','sage','thistle','birch','fern','maple','cedar','iris',
        'daisy','tulip','violet','lavender','rosemary','thyme','basil','mint'
      ];

      function _wgWordCount() {
        if (_difficulty === 'easy') return { study: 3, choices: 6 };
        if (_difficulty === 'medium') return { study: 5, choices: 10 };
        return { study: 7, choices: 14 };
      }

      function _startWordGarden() {
        _gameActive = true;
        var cfg = _wgWordCount();
        var shuffled = WG_WORDS.slice();
        _shuffle(shuffled);
        var studyWords = shuffled.slice(0, cfg.study);
        var distractors = shuffled.slice(cfg.study, cfg.choices);
        var allChoices = studyWords.concat(distractors);
        _shuffle(allChoices);

        /* Show study phase */
        showMsg('Remember these words…', 'info');
        var studyDiv = document.createElement('div');
        studyDiv.className = 'wg-study-list';
        studyDiv.textContent = studyWords.join('   ');
        gameArea.innerHTML = '';
        gameArea.appendChild(studyDiv);

        /* Display time based on difficulty */
        var showTime = (_difficulty === 'easy') ? 4000 : (_difficulty === 'medium') ? 3000 : 2500;

        setTimeout(function() {
          showMsg('Which words did you see? Tap them!', 'info');
          var choicesDiv = document.createElement('div');
          choicesDiv.style.textAlign = 'center';

          var selected = [];
          var revealed = false;

          for (var i = 0; i < allChoices.length; i++) {
            var btn = document.createElement('span');
            btn.className = 'wg-word';
            btn.textContent = allChoices[i];
            btn.setAttribute('role', 'button');
            btn.setAttribute('tabindex', '0');
            btn.setAttribute('data-word', allChoices[i]);
            (function(b, word) {
              var handler = function() {
                if (revealed) return;
                if (b.classList.contains('selected')) {
                  b.classList.remove('selected');
                  selected = selected.filter(function(w) { return w !== word; });
                } else {
                  if (selected.length >= cfg.study) return; /* can't pick more than study count */
                  b.classList.add('selected');
                  selected.push(word);
                }
                /* Auto-check when they've picked enough */
                if (selected.length === cfg.study) {
                  revealed = true;
                  _wgReveal(choicesDiv, studyWords, selected);
                }
              };
              b.addEventListener('click', handler);
              b.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); handler(); }
              });
            })(btn, allChoices[i]);
            choicesDiv.appendChild(btn);
          }

          gameArea.innerHTML = '';
          gameArea.appendChild(choicesDiv);
        }, showTime);
      }

      function _wgReveal(container, studyWords, selected) {
        var allBtns = container.querySelectorAll('.wg-word');
        var correct = 0;
        for (var i = 0; i < allBtns.length; i++) {
          var word = allBtns[i].getAttribute('data-word');
          var wasStudy = studyWords.indexOf(word) !== -1;
          var wasSelected = selected.indexOf(word) !== -1;
          allBtns[i].classList.remove('selected');
          if (wasStudy && wasSelected) {
            allBtns[i].classList.add('correct');
            correct++;
          } else if (wasStudy && !wasSelected) {
            allBtns[i].classList.add('correct'); /* show what they missed */
          } else if (!wasStudy && wasSelected) {
            allBtns[i].classList.add('wrong');
          }
        }

        if (correct === studyWords.length && selected.length === studyWords.length) {
          streakUp();
          showMsg(praise() + ' ' + correct + '/' + studyWords.length + ' perfect!', 'success');
        } else {
          streakReset();
          showMsg(missMsg() + ' ' + correct + '/' + studyWords.length, 'miss');
        }
        _gameActive = false;
        setTimeout(function() {
          _gameIndex = (_gameIndex + 1) % GAMES.length;
        }, 2000);
      }

      /* ── Utility ───────────────────────────────────────── */
      function _shuffle(arr) {
        for (var i = arr.length - 1; i > 0; i--) {
          var j = Math.floor(Math.random() * (i + 1));
          var tmp = arr[i];
          arr[i] = arr[j];
          arr[j] = tmp;
        }
        return arr;
      }

      /* ── Firestore score persistence ───────────────────── */
      function _saveScore() {
        if (!window.AA || !AA.auth || !AA.auth.currentUser || !AA.db) return;
        var uid = (window.AA_uid ? window.AA_uid(AA.auth.currentUser.uid) : AA.auth.currentUser.uid);
        AA.db.collection('users').doc(uid).set({
          brainBloom: {
            bestStreak: _best,
            lastPlayed: new Date().toISOString(),
            difficulty: _difficulty
          }
        }, { merge: true }).catch(function(err) { console.warn('[BrainBloom] save:', err); });
      }

      function _loadScore() {
        if (!window.AA || !AA.auth || !AA.auth.currentUser || !AA.db) return;
        var uid = (window.AA_uid ? window.AA_uid(AA.auth.currentUser.uid) : AA.auth.currentUser.uid);
        AA.db.collection('users').doc(uid).get().then(function(doc) {
          if (doc.exists && doc.data().brainBloom) {
            var bb = doc.data().brainBloom;
            if (bb.bestStreak && bb.bestStreak > _best) {
              _best = bb.bestStreak;
              updateScore();
            }
          }
        }).catch(function() {});
      }

      /* ── Init ──────────────────────────────────────────── */
      function _waitForAA(cb) {
        if (window.AA && window.AA.auth) { cb(); return; }
        var t = setInterval(function() {
          if (window.AA && window.AA.auth) { clearInterval(t); cb(); }
        }, 200);
      }

      _showGameTitle();
      _waitForAA(function() {
        AA.auth.onAuthStateChanged(function(user) {
          if (user) _loadScore();
        });
      });

    })();
    </script>
</body>
</html>
