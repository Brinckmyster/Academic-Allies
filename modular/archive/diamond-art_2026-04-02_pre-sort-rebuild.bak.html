<!-- Claude: 2026-04-02 — Brilliant Sort: Diamond Puzzle (comfort game).
     Shelf-sorting mechanic: gems arrive mixed, place on shelf, match 3+ adjacent
     same-color to clear them onto the grid and reveal pixel art.
     Theme packs: Floral, Cats, Nature, Patterns.
     Pure vanilla JS (ES5), no dependencies. Touch-friendly. -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Diamond Art — Academic Allies</title>
  <link rel="icon" type="image/png" href="../../icons/mode-recovery.png">
  <style>
    html.aa-dark { color-scheme: dark; }
    html.aa-dark body { background: #1a1a2e !important; color: #e0e0e0 !important; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Atkinson Hyperlegible', 'OpenDyslexic', Arial, sans-serif;
      background: linear-gradient(135deg, #f3e5f5 0%, #e1bee7 100%);
      color: #4a148c;
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center;
      overflow-x: hidden;
      touch-action: manipulation;
      -webkit-user-select: none; user-select: none;
    }

    /* ── Header ─────────────────────────────── */
    .da-header {
      width: 100%; max-width: 600px;
      padding: 12px 16px; display: flex;
      align-items: center; gap: 12px;
    }
    .da-back {
      display: inline-flex; align-items: center; gap: 6px;
      color: #9c27b0; text-decoration: none; font-size: 13pt;
      padding: 8px 14px; border-radius: 8px;
      background: rgba(156,39,176,0.1);
    }
    .da-back:hover { background: rgba(156,39,176,0.2); }
    html.aa-dark .da-back { color: #ce93d8; background: rgba(206,147,216,0.12); }
    .da-title { font-size: 15pt; font-weight: 700; }

    /* ── Pack / Design Picker ─────────────────── */
    .picker-area { width: 100%; max-width: 600px; padding: 8px 16px; }
    .pack-tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
    .pack-tab {
      padding: 6px 14px; border-radius: 20px; border: 2px solid #ce93d8;
      background: transparent; color: #9c27b0; font-size: 11pt;
      cursor: pointer; font-weight: 600;
    }
    .pack-tab.active { background: #9c27b0; color: #fff; }
    html.aa-dark .pack-tab { border-color: #7b1fa2; color: #ce93d8; }
    html.aa-dark .pack-tab.active { background: #7b1fa2; color: #fff; }
    .design-row { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 8px; }
    .design-btn {
      min-width: 80px; padding: 8px 12px; border-radius: 10px;
      border: 2px solid #e1bee7; background: #fce4ec; color: #4a148c;
      font-size: 10pt; cursor: pointer; white-space: nowrap; font-weight: 600;
    }
    .design-btn.active { border-color: #9c27b0; background: #ce93d8; color: #fff; }
    html.aa-dark .design-btn { background: #2a1a3e; border-color: #4a148c; color: #ce93d8; }
    html.aa-dark .design-btn.active { background: #7b1fa2; color: #fff; }

    /* ── Progress Bar ──────────────────────────── */
    .progress-wrap { width: 100%; max-width: 600px; padding: 4px 16px 8px; }
    .progress-bar {
      height: 10px; background: rgba(156,39,176,0.15); border-radius: 5px; overflow: hidden;
    }
    .progress-fill {
      height: 100%; background: linear-gradient(90deg, #ab47bc, #e91e63);
      border-radius: 5px; width: 0%; transition: width 0.3s;
    }
    .progress-text { font-size: 10pt; text-align: center; margin-top: 4px; color: #9c27b0; }
    html.aa-dark .progress-text { color: #ce93d8; }

    /* ── Grid (pixel art canvas) ──────────────── */
    .grid-area {
      width: 100%; max-width: 600px; padding: 0 16px;
      display: flex; justify-content: center;
    }
    .grid {
      display: inline-grid; gap: 2px; border-radius: 8px;
      padding: 4px; background: rgba(0,0,0,0.06);
    }
    html.aa-dark .grid { background: rgba(255,255,255,0.05); }
    .cell {
      border-radius: 3px;
      border: 1px solid rgba(156,39,176,0.15);
      background: rgba(255,255,255,0.4);
      transition: background 0.3s, transform 0.2s;
    }
    html.aa-dark .cell { background: rgba(255,255,255,0.06); border-color: rgba(206,147,216,0.1); }
    .cell.filled { border-color: transparent; }
    .cell.pop-in {
      animation: popIn 0.3s cubic-bezier(0.34,1.56,0.64,1) forwards;
    }
    @keyframes popIn {
      0% { transform: scale(0.3); opacity: 0.5; }
      60% { transform: scale(1.12); }
      100% { transform: scale(1); opacity: 1; }
    }

    /* ── Incoming Queue ───────────────────────── */
    .queue-area {
      width: 100%; max-width: 600px; padding: 8px 16px;
      text-align: center;
    }
    .queue-label {
      font-size: 10pt; color: #9c27b0; font-weight: 600; margin-bottom: 6px;
    }
    html.aa-dark .queue-label { color: #ce93d8; }
    .queue {
      display: flex; gap: 6px; justify-content: center; align-items: center;
      flex-wrap: wrap; padding: 8px;
      background: rgba(255,255,255,0.6); border-radius: 12px;
      border: 2px solid rgba(156,39,176,0.15);
      min-height: 52px;
    }
    html.aa-dark .queue { background: rgba(40,20,60,0.7); border-color: rgba(123,31,162,0.25); }
    .q-gem {
      width: 38px; height: 38px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; cursor: pointer;
      box-shadow: 0 2px 6px rgba(0,0,0,0.18);
      transition: transform 0.12s;
    }
    .q-gem:hover { transform: scale(1.1); }
    .q-gem:active { transform: scale(0.92); }

    /* ── Shelf ─────────────────────────────────── */
    .shelf-area {
      width: 100%; max-width: 600px; padding: 8px 16px 16px;
      position: sticky; bottom: 0; z-index: 10;
      background: linear-gradient(transparent 0%, #f3e5f5 15%);
    }
    html.aa-dark .shelf-area { background: linear-gradient(transparent 0%, #1a1a2e 15%); }
    .shelf-label {
      font-size: 10pt; color: #9c27b0; font-weight: 600;
      margin-bottom: 6px; text-align: center;
    }
    html.aa-dark .shelf-label { color: #ce93d8; }
    .shelf {
      display: flex; gap: 4px; justify-content: center;
      padding: 10px 8px;
      background: rgba(255,255,255,0.8); border-radius: 14px;
      border: 2px solid rgba(156,39,176,0.25);
      min-height: 56px;
    }
    html.aa-dark .shelf { background: rgba(40,20,60,0.85); border-color: rgba(123,31,162,0.35); }
    .shelf-slot {
      width: 42px; height: 42px; border-radius: 8px;
      border: 2px dashed rgba(156,39,176,0.25);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; transition: all 0.15s;
      position: relative;
    }
    html.aa-dark .shelf-slot { border-color: rgba(206,147,216,0.2); }
    .shelf-slot.occupied {
      border-style: solid; border-color: transparent;
      cursor: pointer; box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    }
    .shelf-slot.occupied:hover { transform: scale(1.08); }
    .shelf-slot.selected {
      border: 3px solid #fdd835 !important;
      transform: scale(1.12);
      box-shadow: 0 0 12px rgba(253,216,53,0.5);
    }
    .shelf-slot.match-glow {
      animation: matchGlow 0.4s ease-out;
    }
    @keyframes matchGlow {
      0% { box-shadow: 0 0 0 rgba(233,30,99,0); }
      50% { box-shadow: 0 0 16px rgba(233,30,99,0.6); }
      100% { box-shadow: 0 0 0 rgba(233,30,99,0); }
    }

    /* ── Hint / Help Button ───────────────────── */
    .help-row {
      width: 100%; max-width: 600px; padding: 4px 16px;
      display: flex; justify-content: center; gap: 10px;
    }
    .help-btn {
      padding: 6px 16px; border-radius: 8px; border: 2px solid #ce93d8;
      background: transparent; color: #9c27b0; font-size: 10pt;
      cursor: pointer; font-weight: 600;
    }
    .help-btn:hover { background: rgba(156,39,176,0.1); }
    html.aa-dark .help-btn { color: #ce93d8; border-color: #7b1fa2; }

    /* ── Completion Overlay ────────────────────── */
    .complete-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.6); z-index: 100;
      justify-content: center; align-items: center;
    }
    .complete-overlay.show { display: flex; }
    .complete-box {
      background: #fff; border-radius: 16px; padding: 32px;
      text-align: center; max-width: 320px; width: 90%;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }
    html.aa-dark .complete-box { background: #2a1a3e; color: #e0e0e0; }
    .complete-box h2 { font-size: 18pt; margin-bottom: 8px; }
    .complete-box p { font-size: 11pt; margin-bottom: 16px; color: #666; }
    html.aa-dark .complete-box p { color: #aaa; }
    .complete-btn {
      padding: 10px 24px; border-radius: 10px; border: none;
      background: #9c27b0; color: #fff; font-size: 12pt;
      cursor: pointer; margin: 4px;
    }
    .complete-btn:hover { background: #7b1fa2; }

    /* ── Sparkle ───────────────────────────────── */
    .sparkle {
      position: fixed; pointer-events: none; z-index: 200;
      font-size: 18px; animation: sparkAnim 0.6s ease-out forwards;
    }
    @keyframes sparkAnim {
      0% { opacity: 1; transform: scale(0.5) translateY(0); }
      100% { opacity: 0; transform: scale(1.2) translateY(-30px); }
    }
  </style>
</head>
<body>
  <div class="da-header">
    <a class="da-back" href="/Academic-Allies/modular/components/comfort-games/game-center.html">&#8592; Games</a>
    <span class="da-title">Diamond Art</span>
  </div>

  <div class="picker-area">
    <div class="pack-tabs" id="packTabs"></div>
    <div class="design-row" id="designRow"></div>
  </div>

  <div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <div class="progress-text" id="progressText">0 / 0</div>
  </div>

  <div class="grid-area">
    <div class="grid" id="grid"></div>
  </div>

  <div class="queue-area">
    <div class="queue-label">Tap a gem to place it on the shelf</div>
    <div class="queue" id="queue"></div>
  </div>

  <div class="help-row">
    <button class="help-btn" id="sortBtn" onclick="sortShelf()">Sort Shelf</button>
    <button class="help-btn" id="clearBtn" onclick="clearLargest()">Clear Group</button>
  </div>

  <div class="shelf-area">
    <div class="shelf-label">Shelf — group same colors together! (tap to swap)</div>
    <div class="shelf" id="shelf"></div>
  </div>

  <div class="complete-overlay" id="completeOverlay">
    <div class="complete-box">
      <h2>Beautiful!</h2>
      <p>You revealed the picture!</p>
      <button class="complete-btn" onclick="nextDesign()">Next Design</button>
      <button class="complete-btn" onclick="replayDesign()">Play Again</button>
    </div>
  </div>

<script>
/* Claude: 2026-04-02 — Brilliant Sort: Diamond Puzzle
   Shelf-sorting mechanic. ES5 compliant. */
(function() {
  'use strict';

  var COLORS = {
    R: '#e53935', G: '#43a047', B: '#1e88e5', Y: '#fdd835',
    P: '#8e24aa', O: '#fb8c00', K: '#d81b60', W: '#eceff1',
    T: '#00897b', N: '#5d4037', L: '#c0ca33', S: '#546e7a',
    C: '#00acc1', M: '#f06292', V: '#7e57c2', I: '#ffb300'
  };

  var PACKS = {
    Floral: [
      { name: 'Tulip', cols: 10, rows: 10, data:
        '    RR    ' + '   RRRR   ' + '  RRRRRR  ' + '  RMRRMR  ' +
        '  RRRRRR  ' + '   RRRR   ' + '    GG    ' + '    GG    ' +
        '   GGGG   ' + '    GG    '
      },
      { name: 'Daisy', cols: 10, rows: 10, data:
        '    WW    ' + '  WWWWWW  ' + ' WW YY WW ' + ' WWYYYYWW ' +
        '  WYYYYW  ' + ' WWYYYYWW ' + ' WW YY WW ' + '  WWWWWW  ' +
        '    GG    ' + '   GGGG   '
      },
      { name: 'Rose', cols: 10, rows: 10, data:
        '   KKKK   ' + '  KKMKKK  ' + ' KKMMMMKK ' + ' KMMMMMKK ' +
        ' KKMMMMK  ' + '  KKMMKK  ' + '   KKKK   ' + '    GG    ' +
        '   GLGG   ' + '   GGGG   '
      }
    ],
    Cats: [
      { name: 'Kitty', cols: 10, rows: 10, data:
        ' S  SS  S ' + ' SS SS SS ' + ' SSSSSSSS ' + ' SGSSSGSS ' +
        ' SSSSSSSS ' + ' SSSKSSSS ' + ' SSSSSSSS ' + '  SSSSSS  ' +
        '   SSSS   ' + '  S    S  '
      },
      { name: 'Duchess', cols: 10, rows: 10, data:
        ' W  WW  W ' + ' WW WW WW ' + ' WWWWWWWW ' + ' WIWWWIWW ' +
        ' WWWWWWWW ' + ' WWWKWWWW ' + ' WWMWWMWW ' + '  WWWWWW  ' +
        '   WWWW   ' + '  W    W  '
      },
      { name: 'Nap Cat', cols: 10, rows: 10, data:
        '          ' + ' NNNNNNNN ' + ' NNSSSSNN ' + ' NSSSSSNN ' +
        ' NSSSSSN  ' + ' NNSSSSN  ' + '  NNNNNN  ' + '  NNNNNN  ' +
        '  NNNNNN  ' + '          '
      }
    ],
    Nature: [
      { name: 'Mountain', cols: 10, rows: 10, data:
        'BBBBBBBBBB' + 'BBBWWBBBBB' + 'BBWWWWBBBB' + 'BWWSSSWBBB' +
        'BSSSSSSSBB' + 'SSSSSSSSSS' + 'GGGGGGGGGG' + 'GGGGGGGGGG' +
        'GLGLGLGLGL' + 'GGGGGGGGGG'
      },
      { name: 'Sunset', cols: 10, rows: 10, data:
        'OOOOOOOOOO' + 'OOYYYYYOOO' + 'OYYYYYYYYO' + 'OOOOOOOOOO' +
        'RRRRRRRRRR' + 'KKRRKRRKKR' + 'BBBBBBBBBB' + 'BCBBCBBCBB' +
        'BBBBBBBBBB' + 'BCBBBCBBCB'
      },
      { name: 'Tree', cols: 10, rows: 10, data:
        '    GG    ' + '   GGGG   ' + '  GGGGGG  ' + ' GGGGGGGG ' +
        '  GGGGGG  ' + ' GLGGGGGG ' + 'GGGGGGGLGG' + '    NN    ' +
        '    NN    ' + '   NNNN   '
      }
    ],
    Patterns: [
      { name: 'Heart', cols: 10, rows: 10, data:
        '          ' + ' RR  RR   ' + 'RRRRRRRR  ' + 'RRRRRRRR  ' +
        'RRRRRRRR  ' + ' RRRRRR   ' + '  RRRR    ' + '   RR     ' +
        '          ' + '          '
      },
      { name: 'Star', cols: 10, rows: 10, data:
        '    YY    ' + '    YY    ' + '   YYYY   ' + 'YYYYYYYYYY' +
        ' YYYYYYYY ' + '  YYYYYY  ' + '  YY  YY  ' + ' YY    YY ' +
        'YY      YY' + '          '
      },
      { name: 'Rainbow', cols: 10, rows: 10, data:
        '  RRRRRR  ' + ' RORRRRRO ' + 'ROYYYYYOR ' + 'ROYGGGYOR ' +
        'ROYGBGYOR ' + 'ROYGGGYOR ' + 'ROYYYYYOR ' + ' RORRRRRO ' +
        '  RRRRRR  ' + '          '
      }
    ]
  };

  /* ── State ──────────────────────────────────── */
  var SHELF_SIZE = 9;
  var QUEUE_SIZE = 7;
  var MATCH_MIN = 3;

  var currentPack = 'Floral';
  var currentIdx = 0;
  var gridData = [];
  var totalCells = 0;
  var filledCount = 0;
  var gemQueue = [];       /* array of color keys waiting to be placed */
  var shelf = [];          /* array of { color } or null, length = SHELF_SIZE */
  var selectedSlot = -1;   /* index of selected shelf slot for swapping */
  var animating = false;
  var audioCtx = null;

  /* ── DOM ────────────────────────────────────── */
  var $packTabs = document.getElementById('packTabs');
  var $designRow = document.getElementById('designRow');
  var $grid = document.getElementById('grid');
  var $queue = document.getElementById('queue');
  var $shelf = document.getElementById('shelf');
  var $progressFill = document.getElementById('progressFill');
  var $progressText = document.getElementById('progressText');
  var $overlay = document.getElementById('completeOverlay');

  /* ── Audio ──────────────────────────────────── */
  function getAudio() {
    if (!audioCtx) {
      try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
    }
    return audioCtx;
  }
  function playTone(freq, dur) {
    var ctx = getAudio(); if (!ctx) return;
    try {
      var o = ctx.createOscillator(), g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.frequency.value = freq; o.type = 'sine'; g.gain.value = 0.08;
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
      o.start(); o.stop(ctx.currentTime + dur);
    } catch(e) {}
  }
  function playPlace() { playTone(660, 0.08); }
  function playMatch() {
    playTone(784, 0.12);
    setTimeout(function() { playTone(988, 0.12); }, 80);
    setTimeout(function() { playTone(1175, 0.15); }, 160);
  }
  function playComplete() {
    playTone(523, 0.15);
    setTimeout(function() { playTone(659, 0.15); }, 100);
    setTimeout(function() { playTone(784, 0.15); }, 200);
    setTimeout(function() { playTone(1047, 0.3); }, 300);
  }
  function playSwap() { playTone(440, 0.06); }

  /* ── Sparkle ────────────────────────────────── */
  function sparkleAt(x, y) {
    var chars = ['\u2726', '\u2727', '\uD83D\uDC8E', '\u2728'];
    for (var i = 0; i < 3; i++) {
      var sp = document.createElement('span');
      sp.className = 'sparkle';
      sp.textContent = chars[Math.floor(Math.random() * chars.length)];
      sp.style.left = (x + (Math.random() - 0.5) * 30) + 'px';
      sp.style.top = (y + (Math.random() - 0.5) * 30) + 'px';
      document.body.appendChild(sp);
      (function(el) {
        setTimeout(function() { if (el.parentNode) el.parentNode.removeChild(el); }, 700);
      })(sp);
    }
  }

  /* ── Pack / Design UI ───────────────────────── */
  function buildPacks() {
    $packTabs.innerHTML = '';
    var packs = Object.keys(PACKS);
    for (var i = 0; i < packs.length; i++) {
      (function(p) {
        var b = document.createElement('button');
        b.className = 'pack-tab' + (p === currentPack ? ' active' : '');
        b.textContent = p;
        b.onclick = function() {
          if (animating) return;
          currentPack = p; currentIdx = 0;
          buildPacks(); buildDesignRow(); loadDesign();
        };
        $packTabs.appendChild(b);
      })(packs[i]);
    }
  }
  function buildDesignRow() {
    $designRow.innerHTML = '';
    var designs = PACKS[currentPack];
    for (var i = 0; i < designs.length; i++) {
      (function(idx) {
        var b = document.createElement('button');
        b.className = 'design-btn' + (idx === currentIdx ? ' active' : '');
        b.textContent = designs[idx].name;
        b.onclick = function() {
          if (animating) return;
          currentIdx = idx; buildDesignRow(); loadDesign();
        };
        $designRow.appendChild(b);
      })(i);
    }
  }

  /* ── Load Design ────────────────────────────── */
  function loadDesign() {
    var design = PACKS[currentPack][currentIdx];
    var cols = design.cols;
    var data = design.data;

    gridData = []; totalCells = 0; filledCount = 0;
    selectedSlot = -1; animating = false;
    shelf = [];
    for (var s = 0; s < SHELF_SIZE; s++) shelf.push(null);

    /* Parse grid */
    var allGems = [];
    for (var i = 0; i < data.length; i++) {
      var ch = data[i];
      if (ch !== ' ' && COLORS[ch]) {
        gridData.push({ color: ch, filled: false });
        totalCells++;
        allGems.push(ch);
      } else {
        gridData.push({ color: null, filled: false });
      }
    }

    /* Shuffle gems into queue */
    for (var j = allGems.length - 1; j > 0; j--) {
      var k = Math.floor(Math.random() * (j + 1));
      var tmp = allGems[j]; allGems[j] = allGems[k]; allGems[k] = tmp;
    }
    gemQueue = allGems;

    /* Render grid */
    $grid.innerHTML = '';
    $grid.style.gridTemplateColumns = 'repeat(' + cols + ', 1fr)';
    var cellSize = Math.min(Math.floor((window.innerWidth - 40) / cols), 36);
    $grid.style.width = (cellSize * cols + (cols - 1) * 2 + 8) + 'px';
    for (var c = 0; c < gridData.length; c++) {
      var cell = document.createElement('div');
      cell.className = 'cell';
      cell.style.width = cellSize + 'px';
      cell.style.height = cellSize + 'px';
      cell.setAttribute('data-idx', c);
      if (!gridData[c].color) cell.style.visibility = 'hidden';
      $grid.appendChild(cell);
    }

    renderQueue();
    renderShelf();
    updateProgress();
    $overlay.classList.remove('show');
  }

  /* ── Render Queue (show next N gems) ────────── */
  function renderQueue() {
    $queue.innerHTML = '';
    var show = Math.min(gemQueue.length, QUEUE_SIZE);
    for (var i = 0; i < show; i++) {
      (function(idx) {
        var g = document.createElement('div');
        g.className = 'q-gem';
        g.style.background = COLORS[gemQueue[idx]];
        g.textContent = '\uD83D\uDC8E';
        g.onclick = function() {
          if (animating) return;
          placeOnShelf(idx);
        };
        $queue.appendChild(g);
      })(i);
    }
    if (gemQueue.length > QUEUE_SIZE) {
      var more = document.createElement('span');
      more.style.cssText = 'font-size:10pt;color:#9c27b0;font-weight:600;padding:4px;';
      more.textContent = '+' + (gemQueue.length - QUEUE_SIZE);
      $queue.appendChild(more);
    }
    if (gemQueue.length === 0 && filledCount < totalCells) {
      var done = document.createElement('span');
      done.style.cssText = 'font-size:10pt;color:#9c27b0;font-weight:600;';
      done.textContent = 'Clear the shelf!';
      $queue.appendChild(done);
    }
  }

  /* ── Render Shelf ───────────────────────────── */
  function renderShelf() {
    $shelf.innerHTML = '';
    for (var i = 0; i < SHELF_SIZE; i++) {
      (function(idx) {
        var slot = document.createElement('div');
        slot.className = 'shelf-slot';
        if (shelf[idx]) {
          slot.classList.add('occupied');
          slot.style.background = COLORS[shelf[idx].color];
          slot.textContent = '\uD83D\uDC8E';
          if (idx === selectedSlot) slot.classList.add('selected');
          slot.onclick = function() {
            if (animating) return;
            onShelfTap(idx);
          };
        }
        $shelf.appendChild(slot);
      })(i);
    }
  }

  /* ── Place Gem from Queue onto Shelf ────────── */
  function placeOnShelf(queueIdx) {
    /* Find first empty shelf slot */
    var emptyIdx = -1;
    for (var i = 0; i < SHELF_SIZE; i++) {
      if (!shelf[i]) { emptyIdx = i; break; }
    }
    if (emptyIdx === -1) return; /* shelf full */

    var color = gemQueue[queueIdx];
    gemQueue.splice(queueIdx, 1);
    shelf[emptyIdx] = { color: color };
    playPlace();

    selectedSlot = -1;
    renderQueue();
    renderShelf();

    /* Check for matches after a tiny delay for visual feedback */
    setTimeout(function() { checkMatches(); }, 150);
  }

  /* ── Tap Shelf Slot (select/swap) ───────────── */
  function onShelfTap(idx) {
    if (selectedSlot === -1) {
      /* Select this slot */
      selectedSlot = idx;
      renderShelf();
    } else if (selectedSlot === idx) {
      /* Deselect */
      selectedSlot = -1;
      renderShelf();
    } else {
      /* Swap */
      var tmp = shelf[selectedSlot];
      shelf[selectedSlot] = shelf[idx];
      shelf[idx] = tmp;
      selectedSlot = -1;
      playSwap();
      renderShelf();
      setTimeout(function() { checkMatches(); }, 150);
    }
  }

  /* ── Check for Adjacent Matches ─────────────── */
  function checkMatches() {
    /* Find runs of MATCH_MIN+ adjacent same-color gems */
    var runs = [];
    var i = 0;
    while (i < SHELF_SIZE) {
      if (!shelf[i]) { i++; continue; }
      var color = shelf[i].color;
      var start = i;
      while (i < SHELF_SIZE && shelf[i] && shelf[i].color === color) i++;
      var len = i - start;
      if (len >= MATCH_MIN) {
        runs.push({ color: color, start: start, len: len });
      }
    }

    if (runs.length === 0) return;

    animating = true;
    playMatch();

    /* Clear matched gems from shelf and fill grid */
    var totalToFill = 0;
    for (var r = 0; r < runs.length; r++) {
      totalToFill += runs[r].len;
    }

    var fillDelay = 0;
    for (var r2 = 0; r2 < runs.length; r2++) {
      var run = runs[r2];
      for (var s = run.start; s < run.start + run.len; s++) {
        (function(slotIdx, color, d) {
          setTimeout(function() {
            /* Add glow to shelf slot */
            var slots = $shelf.querySelectorAll('.shelf-slot');
            if (slots[slotIdx]) slots[slotIdx].classList.add('match-glow');

            /* Fill one grid cell of this color */
            fillOneGridCell(color);
          }, d);
        })(s, run.color, fillDelay);
        fillDelay += 60;
      }
      /* Null out shelf slots */
      for (var n = run.start; n < run.start + run.len; n++) {
        shelf[n] = null;
      }
    }

    /* Compact shelf (slide gems to left to fill gaps) */
    setTimeout(function() {
      compactShelf();
      renderShelf();
      renderQueue();
      updateProgress();
      animating = false;

      if (filledCount >= totalCells) {
        setTimeout(function() {
          playComplete();
          $overlay.classList.add('show');
        }, 300);
      } else {
        /* Check for chain matches after compacting */
        setTimeout(function() { checkMatches(); }, 200);
      }
    }, fillDelay + 100);
  }

  /* ── Fill One Grid Cell of Given Color ──────── */
  function fillOneGridCell(color) {
    var cells = $grid.querySelectorAll('.cell');
    for (var i = 0; i < gridData.length; i++) {
      if (gridData[i].color === color && !gridData[i].filled) {
        gridData[i].filled = true;
        filledCount++;
        cells[i].style.background = COLORS[color];
        cells[i].classList.add('filled', 'pop-in');
        var rect = cells[i].getBoundingClientRect();
        sparkleAt(rect.left + rect.width / 2, rect.top + rect.height / 2);
        updateProgress();
        return;
      }
    }
  }

  /* ── Compact Shelf (remove gaps) ────────────── */
  function compactShelf() {
    var compacted = [];
    for (var i = 0; i < SHELF_SIZE; i++) {
      if (shelf[i]) compacted.push(shelf[i]);
    }
    shelf = [];
    for (var j = 0; j < SHELF_SIZE; j++) {
      shelf.push(compacted[j] || null);
    }
  }

  /* ── Sort Shelf Button ──────────────────────── */
  window.sortShelf = function() {
    if (animating) return;
    var items = [];
    for (var i = 0; i < SHELF_SIZE; i++) {
      if (shelf[i]) items.push(shelf[i]);
    }
    items.sort(function(a, b) {
      return a.color < b.color ? -1 : a.color > b.color ? 1 : 0;
    });
    shelf = [];
    for (var j = 0; j < SHELF_SIZE; j++) {
      shelf.push(items[j] || null);
    }
    selectedSlot = -1;
    playSwap();
    renderShelf();
    setTimeout(function() { checkMatches(); }, 200);
  };

  /* ── Clear Largest Group Button ─────────────── */
  window.clearLargest = function() {
    if (animating) return;
    /* Find the largest adjacent group (even if < MATCH_MIN) */
    var bestStart = -1, bestLen = 0, bestColor = null;
    var i = 0;
    while (i < SHELF_SIZE) {
      if (!shelf[i]) { i++; continue; }
      var color = shelf[i].color;
      var start = i;
      while (i < SHELF_SIZE && shelf[i] && shelf[i].color === color) i++;
      var len = i - start;
      if (len > bestLen) { bestLen = len; bestStart = start; bestColor = color; }
    }
    if (bestLen < 2) return; /* need at least 2 */

    animating = true;
    playMatch();
    var fillDelay = 0;
    for (var s = bestStart; s < bestStart + bestLen; s++) {
      (function(color, d) {
        setTimeout(function() { fillOneGridCell(color); }, d);
      })(bestColor, fillDelay);
      shelf[s] = null;
      fillDelay += 60;
    }
    setTimeout(function() {
      compactShelf(); renderShelf(); renderQueue();
      updateProgress(); animating = false;
      if (filledCount >= totalCells) {
        setTimeout(function() { playComplete(); $overlay.classList.add('show'); }, 300);
      }
    }, fillDelay + 100);
  };

  /* ── Progress ───────────────────────────────── */
  function updateProgress() {
    var pct = totalCells > 0 ? Math.round((filledCount / totalCells) * 100) : 0;
    $progressFill.style.width = pct + '%';
    $progressText.textContent = filledCount + ' / ' + totalCells + ' (' + pct + '%)';
  }

  /* ── Nav ────────────────────────────────────── */
  window.nextDesign = function() {
    var designs = PACKS[currentPack];
    currentIdx = (currentIdx + 1) % designs.length;
    buildDesignRow(); loadDesign();
  };
  window.replayDesign = function() { loadDesign(); };

  /* ── Dark mode ──────────────────────────────── */
  (function() {
    try {
      if (localStorage.getItem('aa_dark_mode') === 'true') {
        document.documentElement.classList.add('aa-dark');
      }
    } catch(e) {}
  })();

  /* ── Init ───────────────────────────────────── */
  buildPacks();
  buildDesignRow();
  loadDesign();

})();
</script>
</body>
</html>
