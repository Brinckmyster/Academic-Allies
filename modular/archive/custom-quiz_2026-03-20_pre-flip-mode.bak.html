<script src="/Academic-Allies/modular/js/student-config.js?v=20260318"></script>

<div class="container" role="main" aria-label="Custom quiz">
  <h1 id="quizTitle">Loading Quiz...</h1>
  <p class="sub" id="quizSubtitle">Please wait</p>
  <div id="content"></div>
</div>

<p class="credit">Built by Claude for Bruise — March 2026</p>

<script>
/* Claude: 2026-03-18 — Dynamic custom quiz renderer
   Supports fill-blank, match, and flashcard quiz types.
   Loads quiz definition from Firestore config via quizzes array index.
   URL pattern: custom-quiz.html?quiz=0 */

(function() {
  'use strict';

  var quizData = null;
  var quizType = null;
  var currentQuestion = 0;
  var score = 0;
  var missed = [];
  var answered = [];
  var quizComplete = false;

  /* Fill-blank quiz state */
  var strictlyCorrect = 0;
  var knewIt = 0;

  /* Match quiz state */
  var matchPairs = {};
  var matchScore = 0;

  /* Flashcard quiz state */
  var flashcardState = {};
  var cardsLearned = 0;
  var cardsMissed = 0;

  function getUrlParam(name) {
    var url = new URL(window.location);
    return url.searchParams.get(name);
  }

  function showError(title, message) {
    document.getElementById('quizTitle').innerHTML = title;
    document.getElementById('quizSubtitle').innerHTML = '';
    var content = document.getElementById('content');
    content.innerHTML = '<div class="error-state">' +
      '<p>' + message + '</p>' +
      '<a href="/Academic-Allies/modular/static/study-tools.html">Back to Study Tools</a>' +
      '</div>';
  }

  /* Claude: 2026-03-19 — Sanitize quiz data to handle invalid/missing items gracefully */
  function sanitizeQuizData(data) {
    if (!Array.isArray(data)) {
      console.warn('[Custom Quiz] Data is not an array, returning empty');
      return [];
    }

    var cleaned = [];
    var invalidCount = 0;

    data.forEach(function(item, idx) {
      if (!item || typeof item !== 'object') {
        invalidCount++;
        return;
      }

      var term = String(item.term || '').trim();
      var answer = String(item.answer || '').trim();

      if (!term || !answer) {
        console.warn('[Custom Quiz] Item ' + idx + ' missing term or answer, skipping');
        invalidCount++;
        return;
      }

      var hints = item.hints;
      if (!Array.isArray(hints)) {
        hints = [];
      }

      cleaned.push({
        term: term,
        answer: answer,
        hints: hints
      });
    });

    if (invalidCount > 0) {
      console.warn('[Custom Quiz] Filtered out ' + invalidCount + ' invalid items');
    }

    return cleaned;
  }

  function loadQuiz() {
    var quizIndex = parseInt(getUrlParam('quiz')) || 0;

    if (!window.AA || !window.AA.auth) {
      showError('Not Signed In', 'Please sign in to access this quiz.');
      return;
    }

    var user = window.AA.auth.currentUser;
    if (!user) {
      showError('Not Signed In', 'Please sign in to access this quiz.');
      return;
    }

    /* Claude: 2026-03-20 — Mirror-aware: load student's quizzes in mirror mode */
    var _quizUid = window.AA_MIRROR_UID || user.uid;
    window.AA_CONFIG.load(_quizUid).then(function(config) {
      var quizzes = window.AA_CONFIG.get('quizzes', []);

      if (!quizzes || quizzes.length === 0) {
        showError('No Quizzes', 'Your network lead hasn\'t configured any custom quizzes yet.');
        return;
      }

      if (quizIndex < 0 || quizIndex >= quizzes.length) {
        showError('Quiz Not Found', 'Quiz index ' + quizIndex + ' is out of bounds.');
        return;
      }

      quizData = quizzes[quizIndex];
      if (!quizData || !quizData.type) {
        showError('Invalid Quiz', 'This quiz is missing required fields.');
        return;
      }

      quizType = quizData.type;
      document.getElementById('quizTitle').textContent = quizData.title || 'Custom Quiz';
      document.getElementById('quizSubtitle').textContent = quizData.description || '';

      if (!quizData.data || quizData.data.length === 0) {
        showError('Empty Quiz', 'This quiz has no items.');
        return;
      }

      /* Claude: 2026-03-19 — Sanitize quiz data before rendering */
      quizData.data = sanitizeQuizData(quizData.data);

      if (quizData.data.length === 0) {
        showError('No Valid Items', 'All quiz items were invalid or missing required fields.');
        return;
      }

      if (quizType === 'fill-blank') {
        renderFillBlankQuiz();
      } else if (quizType === 'match') {
        renderMatchQuiz();
      } else if (quizType === 'flashcards') {
        renderFlashcardQuiz();
      } else {
        showError('Unknown Quiz Type', 'Quiz type "' + quizType + '" is not supported.');
      }
    }).catch(function(err) {
      console.error('[Custom Quiz] Config load failed:', err);
      showError('Config Error', 'Failed to load quiz configuration: ' + err.message);
    });
  }

  /* ── FILL-BLANK QUIZ ─────────────────────────────────────────────── */
  function renderFillBlankQuiz() {
    answered = [];
    missed = [];
    score = 0;
    strictlyCorrect = 0;
    knewIt = 0;
    currentQuestion = 0;
    showFillBlankQuestion();
  }

  function showFillBlankQuestion() {
    if (currentQuestion >= quizData.data.length) {
      showFillBlankResults();
      return;
    }

    var item = quizData.data[currentQuestion];
    var progress = ((currentQuestion) / quizData.data.length) * 100;
    var html = '<div class="quiz-section">' +
      '<div class="progress-bar"><div class="progress-fill" style="width:' + progress + '%"></div></div>' +
      '<div class="question-num">Question ' + (currentQuestion + 1) + ' of ' + quizData.data.length + '</div>' +
      '<div class="question">' + item.term + '</div>' +
      '<input type="text" id="answerInput" class="answer-input" placeholder="Type your answer..." autocomplete="off" />' +
      '<div class="hint-box" id="hintBox"></div>' +
      '<div class="feedback" id="feedback"></div>' +
      '<div class="btn-row">' +
      '<button class="btn-primary" onclick="checkAnswer()">Check Answer</button>' +
      '<button class="btn-secondary" onclick="skipQuestion()">Skip</button>' +
      '</div>' +
      '</div>';

    document.getElementById('content').innerHTML = html;
    document.getElementById('answerInput').focus();

    /* Allow Enter to submit */
    document.getElementById('answerInput').onkeypress = function(e) {
      if (e.key === 'Enter') {
        checkAnswer();
      }
    };
  }

  function checkAnswer() {
    var userAnswer = document.getElementById('answerInput').value.trim();
    var item = quizData.data[currentQuestion];
    var correctAnswer = item.answer.trim();

    if (!userAnswer) {
      document.getElementById('feedback').textContent = 'Please enter an answer.';
      document.getElementById('feedback').classList.add('error');
      document.getElementById('feedback').style.display = 'block';
      return;
    }

    var isCorrect = userAnswer.toLowerCase() === correctAnswer.toLowerCase();
    var isClose = levenshteinDistance(userAnswer.toLowerCase(), correctAnswer.toLowerCase()) <= 2;

    var feedback = document.getElementById('feedback');
    if (isCorrect) {
      feedback.textContent = 'Correct! ✓';
      feedback.classList.remove('error');
      feedback.style.display = 'block';
      strictlyCorrect++;
      score++;
    } else if (isClose) {
      feedback.textContent = 'Close! You KNEW it. ✓ (Small typo accepted)';
      feedback.classList.remove('error');
      feedback.style.display = 'block';
      knewIt++;
      score++;
    } else {
      feedback.textContent = 'Not quite. Correct answer: ' + correctAnswer;
      feedback.classList.add('error');
      feedback.style.display = 'block';
      missed.push({ term: item.term, correct: correctAnswer });
      showHints(item);
    }

    answered.push({ term: item.term, answer: item.answer, userAnswer: userAnswer, correct: isCorrect || isClose });

    document.getElementById('answerInput').disabled = true;
    document.querySelector('.btn-primary').disabled = true;

    setTimeout(function() {
      currentQuestion++;
      showFillBlankQuestion();
    }, 2000);
  }

  function showHints(item) {
    if (item.hints && item.hints.length > 0) {
      var hintBox = document.getElementById('hintBox');
      var hintText = 'Hints: ' + item.hints.join(' • ');
      hintBox.textContent = hintText;
      hintBox.style.display = 'block';
    }
  }

  function skipQuestion() {
    var item = quizData.data[currentQuestion];
    missed.push({ term: item.term, correct: item.answer });
    answered.push({ term: item.term, answer: item.answer, userAnswer: '', correct: false });
    currentQuestion++;
    showFillBlankQuestion();
  }

  function showFillBlankResults() {
    var html = '<div class="results-container">' +
      '<h2>Quiz Complete!</h2>' +
      '<div class="score">' + score + ' / ' + quizData.data.length + '</div>' +
      '<p>Correct: ' + strictlyCorrect + ' | Close: ' + knewIt + ' | Missed: ' + missed.length + '</p>';

    if (missed.length > 0) {
      html += '<div><strong>Review Missed:</strong></div>' +
        '<div class="missed-list">';
      missed.forEach(function(item) {
        html += '<div class="missed-item"><strong>' + item.term + '</strong>: ' + item.correct + '</div>';
      });
      html += '</div>';
    }

    html += '<div class="btn-row" style="justify-content: center; margin-top: 16px;">' +
      '<button class="btn-primary" onclick="location.href=\'/Academic-Allies/modular/static/study-tools.html\'">Back to Study Tools</button>' +
      '<button class="btn-secondary" onclick="retryMissed()">Retry Missed (' + missed.length + ')</button>' +
      '</div>' +
      '</div>';

    document.getElementById('content').innerHTML = html;
  }

  function retryMissed() {
    if (missed.length > 0) {
      var originalData = quizData.data;
      quizData.data = missed.map(function(item) {
        return originalData.find(function(d) { return d.term === item.term; });
      }).filter(Boolean);

      answered = [];
      missed = [];
      score = 0;
      strictlyCorrect = 0;
      knewIt = 0;
      currentQuestion = 0;
      showFillBlankQuestion();
    }
  }

  /* ── MATCH QUIZ ──────────────────────────────────────────────────── */
  function renderMatchQuiz() {
    /* Claude: 2026-03-19 — Validate minimum items for match game */
    if (quizData.data.length < 2) {
      showError('Not Enough Items', 'Match quizzes need at least 2 item pairs. This quiz only has ' + quizData.data.length + '.');
      return;
    }

    matchPairs = {};
    matchScore = 0;

    var terms = quizData.data.map(function(item, idx) {
      return { text: item.term, id: idx, type: 'term' };
    });

    var answers = quizData.data.map(function(item, idx) {
      return { text: item.answer, correctId: idx, type: 'answer' };
    });

    /* Shuffle answers */
    answers = answers.sort(function() { return Math.random() - 0.5; });

    var html = '<div class="quiz-section">' +
      '<div class="score-section">' +
      '<div class="score-number" id="matchScore">0</div>' +
      '<div class="score-label">Pairs Matched</div>' +
      '</div>' +
      '<div class="match-container">' +
      '<div class="match-column">' +
      '<div class="match-column-label">Terms</div>';

    terms.forEach(function(term) {
      html += '<div class="match-item" data-id="term-' + term.id + '" onclick="selectMatchItem(\'term-' + term.id + '\')">' + term.text + '</div>';
    });

    html += '</div><div class="match-column">' +
      '<div class="match-column-label">Answers</div>';

    answers.forEach(function(answer) {
      html += '<div class="match-item" data-id="answer-' + answer.correctId + '" onclick="selectMatchItem(\'answer-' + answer.correctId + '\')">' + answer.text + '</div>';
    });

    html += '</div></div>' +
      '<div class="btn-row">' +
      '<button class="btn-primary" onclick="resetMatch()">Reset</button>' +
      '<button class="btn-secondary" onclick="location.href=\'/Academic-Allies/modular/static/study-tools.html\'">Back to Study Tools</button>' +
      '</div>' +
      '</div>';

    document.getElementById('content').innerHTML = html;
  }

  function selectMatchItem(id) {
    var elem = document.querySelector('[data-id="' + id + '"]');
    if (!elem || elem.classList.contains('matched')) return;

    var selected = document.querySelector('.match-item.selected');
    if (!selected) {
      elem.classList.add('selected');
      return;
    }

    if (selected.getAttribute('data-id') === id) {
      elem.classList.remove('selected');
      return;
    }

    var selectedId = selected.getAttribute('data-id');
    if (selectedId.split('-')[0] === id.split('-')[0]) {
      /* Both same type, deselect */
      selected.classList.remove('selected');
      elem.classList.add('selected');
      return;
    }

    /* Check if pair matches */
    var termId = selectedId.split('-')[0] === 'term' ? selectedId.split('-')[1] : id.split('-')[1];
    var answerId = selectedId.split('-')[0] === 'answer' ? selectedId.split('-')[1] : id.split('-')[1];

    if (parseInt(termId) === parseInt(answerId)) {
      /* Correct match */
      selected.classList.remove('selected');
      selected.classList.add('matched');
      elem.classList.remove('selected');
      elem.classList.add('matched');
      matchScore++;
      document.getElementById('matchScore').textContent = matchScore;

      if (matchScore === quizData.data.length) {
        setTimeout(function() {
          alert('Perfect! You matched all pairs correctly!');
        }, 300);
      }
    } else {
      /* Wrong match, flash red then reset */
      selected.style.opacity = '0.5';
      elem.style.opacity = '0.5';
      setTimeout(function() {
        selected.classList.remove('selected');
        selected.style.opacity = '1';
        elem.style.opacity = '1';
      }, 500);
    }
  }

  function resetMatch() {
    document.querySelectorAll('.match-item').forEach(function(elem) {
      elem.classList.remove('matched', 'selected');
      elem.style.opacity = '1';
    });
    matchScore = 0;
    document.getElementById('matchScore').textContent = '0';
  }

  /* ── FLASHCARD QUIZ ──────────────────────────────────────────────── */
  function renderFlashcardQuiz() {
    cardsLearned = 0;
    cardsMissed = 0;
    flashcardState = {};
    currentQuestion = 0;

    quizData.data.forEach(function(item, idx) {
      flashcardState[idx] = { learned: false, missed: false };
    });

    showFlashcard();
  }

  function showFlashcard() {
    if (currentQuestion >= quizData.data.length) {
      showFlashcardResults();
      return;
    }

    var item = quizData.data[currentQuestion];
    var state = flashcardState[currentQuestion];
    var progress = (currentQuestion / quizData.data.length) * 100;

    var html = '<div class="quiz-section">' +
      '<div class="progress-bar"><div class="progress-fill" style="width:' + progress + '%"></div></div>' +
      '<div class="question-num">Card ' + (currentQuestion + 1) + ' of ' + quizData.data.length + '</div>' +
      '<div class="flashcard" id="flashcard" onclick="flipCard()">' +
      '<div class="flashcard-inner">' +
      '<div class="flashcard-face flashcard-front">' +
      '<div class="flashcard-text">' + item.term + '</div>' +
      '<div class="flashcard-label">Tap to reveal answer</div>' +
      '</div>' +
      '<div class="flashcard-face flashcard-back">' +
      '<div class="flashcard-text">' + item.answer + '</div>' +
      '<div class="flashcard-label">Tap to continue</div>' +
      '</div>' +
      '</div>' +
      '</div>' +
      '<div class="btn-row">' +
      '<button class="btn-secondary" onclick="markFlashcardMissed()">😕 Missed</button>' +
      '<button class="btn-primary knew-it-btn" onclick="markFlashcardLearned()">✓ Got It</button>' +
      '<button class="btn-secondary" onclick="nextFlashcard()">Next</button>' +
      '</div>' +
      '</div>';

    document.getElementById('content').innerHTML = html;
  }

  function flipCard() {
    var card = document.getElementById('flashcard');
    if (card) {
      card.classList.toggle('flipped');
    }
  }

  function markFlashcardLearned() {
    var state = flashcardState[currentQuestion];
    if (!state.learned) {
      state.learned = true;
      cardsLearned++;
    }
    nextFlashcard();
  }

  function markFlashcardMissed() {
    var state = flashcardState[currentQuestion];
    if (!state.missed) {
      state.missed = true;
      cardsMissed++;
    }
    nextFlashcard();
  }

  function nextFlashcard() {
    currentQuestion++;
    showFlashcard();
  }

  function showFlashcardResults() {
    var html = '<div class="results-container">' +
      '<h2>Review Complete!</h2>' +
      '<div class="score">' + cardsLearned + ' Learned</div>' +
      '<p>' + cardsMissed + ' to review | ' + cardsLearned + ' mastered</p>' +
      '<div class="btn-row" style="justify-content: center; margin-top: 16px;">' +
      '<button class="btn-primary" onclick="location.href=\'/Academic-Allies/modular/static/study-tools.html\'">Back to Study Tools</button>' +
      '<button class="btn-secondary" onclick="retryFlashcards()">Review Again</button>' +
      '</div>' +
      '</div>';

    document.getElementById('content').innerHTML = html;
  }

  function retryFlashcards() {
    cardsLearned = 0;
    cardsMissed = 0;
    flashcardState = {};
    currentQuestion = 0;
    quizData.data.forEach(function(item, idx) {
      flashcardState[idx] = { learned: false, missed: false };
    });
    showFlashcard();
  }

  /* ── UTILITY ─────────────────────────────────────────────────────── */
  function levenshteinDistance(s1, s2) {
    var len1 = s1.length;
    var len2 = s2.length;
    var d = [];

    for (var i = 0; i <= len1; i++) {
      d[i] = [i];
    }
    for (var j = 0; j <= len2; j++) {
      d[0][j] = j;
    }

    for (i = 1; i <= len1; i++) {
      for (j = 1; j <= len2; j++) {
        var cost = s1[i - 1] === s2[j - 1] ? 0 : 1;
        d[i][j] = Math.min(
          d[i - 1][j] + 1,
          d[i][j - 1] + 1,
          d[i - 1][j - 1] + cost
        );
      }
    }

    return d[len1][len2];
  }

  /* Claude: 2026-03-20 — Expose interactive functions to window for inline onclick handlers.
     Functions inside this IIFE are not accessible from HTML onclick attributes without this. */
  window.checkAnswer = checkAnswer;
  window.skipQuestion = skipQuestion;
  window.selectMatchItem = selectMatchItem;
  window.resetMatch = resetMatch;
  window.flipCard = flipCard;
  window.markFlashcardLearned = markFlashcardLearned;
  window.markFlashcardMissed = markFlashcardMissed;
  window.nextFlashcard = nextFlashcard;
  window.retryMissed = retryMissed;
  window.retryFlashcards = retryFlashcards;

  /* Initialize on auth state change */
  if (window.AA && window.AA.auth) {
    window.AA.auth.onAuthStateChanged(function(user) {
      if (user) {
        loadQuiz();
      } else {
        showError('Not Signed In', 'Please sign in to access this quiz.');
      }
    });
  } else {
    /* Fallback: load immediately */
    setTimeout(loadQuiz, 1000);
  }
})();
</script>
