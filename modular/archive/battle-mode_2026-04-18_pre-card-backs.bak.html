<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" href="/Academic-Allies/favicon.ico">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Battle Mode — Academic Allies</title>
  <!-- Claude: 2026-04-13 — Lingo Legend polish: Fredoka One + Nunito for game-app feel -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/Academic-Allies/modular/css/style.css">
  <style>
    /* Claude: 2026-04-07 — Battle Mode: quiz-powered card battles using Firestore quiz data */

    *, *::before, *::after { box-sizing: border-box; }
    /* Claude: 2026-04-13 — Lingo Legend polish: Nunito body, Fredoka One for game titles */
    body { margin: 0; padding: 0; font-family: 'Nunito', sans-serif; background: #1a1a2e; color: #eee; min-height: 100vh; }

    #site-header { background: #16213e; }

    /* ── Screens ── */
    .screen { display: none; padding: 16px; max-width: 560px; margin: 0 auto; }
    .screen.active { display: block; }

    /* ── Loading / Sign-in ── */
    #screen-loading {
      text-align: center;
      padding-top: 60px;
    }
    .loading-spinner {
      width: 48px; height: 48px;
      border: 5px solid #444;
      border-top-color: #e94560;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Setup Screen ── */
    #screen-setup { padding-top: 20px; }
    #screen-setup h1 {
      font-family: 'Fredoka One', cursive;
      font-size: 2.2rem;
      color: #e94560;
      margin: 0 0 4px;
      text-align: center;
      letter-spacing: 0.02em;
    }
    #screen-setup .subtitle {
      text-align: center;
      color: #aaa;
      font-size: 0.9rem;
      margin-bottom: 24px;
    }

    .setup-card {
      background: #16213e;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
    }
    .setup-card h3 {
      margin: 0 0 10px;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #888;
    }

    .class-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .class-btn {
      background: #0f3460;
      border: 2px solid transparent;
      border-radius: 10px;
      padding: 12px 8px;
      color: #ddd;
      font-size: 0.85rem;
      cursor: pointer;
      text-align: center;
      transition: all 0.2s;
    }
    .class-btn:hover { background: #1a4a7a; }
    .class-btn.selected {
      border-width: 3px !important;
      border-color: #e94560;
      background: #2a1a2e;
      color: #fff; box-shadow: 0 0 12px rgba(233,69,96,0.5), 0 0 0 2px #fff;
    }
    .class-btn .class-icon { font-size: 1.4rem; display: block; margin-bottom: 4px; }
    .class-btn .class-name { display: block; font-weight: 600; }
    .class-btn .class-count { display: block; font-size: 0.75rem; color: #888; margin-top: 2px; }
    /* Claude: 2026-04-11 — Locked spring class cards (no quiz data loaded yet) */
    .class-btn-locked { opacity: 0.45; cursor: not-allowed !important; }
    .class-btn-locked:hover { background: #0f3460 !important; box-shadow: none !important; }

    .mode-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .mode-btn {
      background: #0f3460;
      border: 2px solid transparent;
      border-radius: 10px;
      padding: 14px 8px;
      color: #ddd;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
      transition: all 0.2s;
    }
    .mode-btn:hover { background: #1a4a7a; }
    .mode-btn.selected {
      border-color: #e94560;
      background: #2a1a2e;
      color: #fff; box-shadow: 0 0 12px rgba(233,69,96,0.5), 0 0 0 2px #fff;
    }
    .mode-btn .mode-icon { font-size: 1.6rem; display: block; margin-bottom: 4px; }
    .mode-btn .mode-desc { font-size: 0.75rem; color: #888; font-weight: normal; margin-top: 4px; display: block; }

    .btn-start {
      display: block;
      width: 100%;
      padding: 16px;
      background: #e94560;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-family: 'Fredoka One', cursive;
      font-size: 1.25rem;
      letter-spacing: 0.03em;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s, transform 0.1s;
    }
    .btn-start:hover { background: #c73652; }
    .btn-start:active { transform: scale(0.98); }
    .btn-start:disabled { background: #444; cursor: not-allowed; }

    /* ── Battle Screen ── */
    #screen-battle { padding-top: 12px; }

    .battle-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      font-size: 0.85rem;
      color: #aaa;
    }
    .battle-header .class-label { font-weight: 600; color: #e94560; }

    /* HP bars */
    .hp-section { margin-bottom: 12px; }
    .hp-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }
    .hp-label { font-size: 0.8rem; color: #aaa; min-width: 64px; }
    .hp-bar-bg {
      flex: 1;
      height: 14px;
      background: #333;
      border-radius: 7px;
      overflow: hidden;
    }
    .hp-bar-fill {
      height: 100%;
      border-radius: 7px;
      transition: width 0.4s ease;
    }
    .hp-bar-fill.monster { background: #e94560; }
    .hp-bar-fill.player  { background: #27ae60; }
    .hp-value { font-size: 0.8rem; min-width: 36px; text-align: right; color: #ccc; }

    /* Monster */
    .monster-arena {
      text-align: center;
      padding: 12px 0;
      position: relative;
    }
    .monster-display {
      font-size: 5rem;
      line-height: 1;
      display: inline-block;
      transition: transform 0.1s;
      filter: drop-shadow(0 0 12px rgba(233,69,96,0.4));
    }
    .monster-display.hit {
      animation: monster-hit 0.4s ease;
    }
    .monster-display.attack {
      animation: monster-attack 0.4s ease;
    }
    @keyframes monster-hit {
      0%   { transform: scale(1); filter: drop-shadow(0 0 20px red) brightness(2); }
      50%  { transform: scale(0.85) rotate(-5deg); }
      100% { transform: scale(1); filter: drop-shadow(0 0 12px rgba(233,69,96,0.4)); }
    }
    @keyframes monster-attack {
      0%   { transform: translateX(0); }
      25%  { transform: translateX(20px) scale(1.1); }
      75%  { transform: translateX(-10px); }
      100% { transform: translateX(0); }
    }
    .monster-name {
      font-size: 0.9rem;
      color: #e94560;
      font-weight: 700;
      margin-top: 4px;
    }

    /* Question card */
    .question-card {
      background: #16213e;
      border: 2px solid #0f3460;
      border-radius: 14px;
      padding: 18px;
      margin-bottom: 14px;
      min-height: 80px;
      position: relative;
    }
    .question-card .q-label {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #666;
      margin-bottom: 6px;
    }
    .question-card .q-text {
      font-size: 1.05rem;
      color: #eee;
      line-height: 1.4;
    }
    .question-card .q-from {
      font-size: 0.72rem;
      color: #555;
      margin-top: 8px;
      font-style: italic;
    }

    /* Multiple choice */
    .mc-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 10px;
    }
    .mc-btn {
      background: #0f3460;
      border: 2px solid #1a4a7a;
      border-radius: 10px;
      padding: 12px 8px;
      color: #ddd;
      font-size: 0.88rem;
      cursor: pointer;
      text-align: center;
      transition: all 0.15s;
      min-height: 56px;
    }
    .mc-btn:hover:not(:disabled) { background: #1a4a7a; border-color: #4a90d9; }
    .mc-btn.correct { background: #1a4a2a; border-color: #27ae60; color: #5ddb8a; font-weight: 700; }
    .mc-btn.wrong   { background: #3a1a1a; border-color: #e94560; color: #e94560; }
    .mc-btn:disabled { cursor: default; }

    /* Type-in mode */
    .type-row {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
    }
    .type-input {
      flex: 1;
      padding: 12px 14px;
      background: #0f3460;
      border: 2px solid #1a4a7a;
      border-radius: 10px;
      color: #eee;
      font-size: 1rem;
      outline: none;
    }
    .type-input:focus { border-color: #4a90d9; }
    .type-input.correct { border-color: #27ae60; background: #1a4a2a; }
    .type-input.wrong   { border-color: #e94560; background: #3a1a1a; }

    .btn-submit {
      padding: 12px 20px;
      background: #e94560;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }
    .btn-submit:hover { background: #c73652; }
    .btn-submit:disabled { background: #444; cursor: default; }

    /* Feedback message */
    .feedback-msg {
      text-align: center;
      font-size: 0.9rem;
      min-height: 22px;
      margin-bottom: 8px;
      font-weight: 600;
    }
    .feedback-msg.good  { color: #5ddb8a; }
    .feedback-msg.bad   { color: #e94560; }

    /* Hearts */
    .hearts {
      text-align: center;
      font-size: 1.3rem;
      letter-spacing: 2px;
      margin-top: 4px;
    }

    /* ── Victory / Defeat ── */
    #screen-result {
      text-align: center;
      padding-top: 40px;
    }
    .result-icon  { font-size: 5rem; margin-bottom: 12px; }
    .result-title { font-family: 'Fredoka One', cursive; font-size: 2.2rem; letter-spacing: 0.02em; margin-bottom: 8px; }
    .result-title.win  { color: #f0c030; }
    .result-title.lose { color: #e94560; }
    .result-sub { color: #aaa; font-size: 0.95rem; margin-bottom: 28px; }
    .result-stats {
      background: #16213e;
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 24px;
      text-align: left;
    }
    .stat-row { display: flex; justify-content: space-between; padding: 4px 0; font-size: 0.9rem; color: #ccc; }
    .stat-row .val { font-weight: 700; color: #fff; }

    .btn-again, .btn-setup {
      display: inline-block;
      padding: 14px 28px;
      border-radius: 12px;
      font-family: 'Fredoka One', cursive;
      font-size: 1.1rem;
      letter-spacing: 0.03em;
      cursor: pointer;
      border: none;
      margin: 6px;
      transition: background 0.2s, transform 0.1s;
    }
    .btn-again:active, .btn-setup:active { transform: scale(0.97); }
    .btn-again { background: #e94560; color: #fff; }
    .btn-again:hover { background: #c73652; }
    .btn-setup { background: #16213e; color: #ccc; border: 2px solid #444; }
    .btn-setup:hover { background: #1a4a7a; }

    /* Claude: 2026-04-13 — Lingo Legend polish: streak badge, tricky badge, damage popup */

    /* Streak badge — gold pill, fades in when streak >= 3 */
    .streak-badge {
      display: inline-block;
      background: #f0c030;
      color: #1a1a2e;
      font-size: 0.68rem;
      font-weight: 800;
      border-radius: 20px;
      padding: 1px 7px;
      margin-left: 6px;
      vertical-align: middle;
      opacity: 0;
      transition: opacity 0.3s;
      white-space: nowrap;
    }
    .streak-badge.visible { opacity: 1; }

    /* Tricky badge — amber pill shown when question is from a Tricky set */
    .tricky-badge {
      display: inline-block;
      background: #e67e22;
      color: #fff;
      font-size: 0.68rem;
      font-weight: 800;
      border-radius: 20px;
      padding: 1px 7px;
      margin-left: 6px;
      vertical-align: middle;
      white-space: nowrap;
    }

    /* Damage popup — floats up and fades on correct answer */
    .damage-popup {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Fredoka One', cursive;
      font-size: 1.6rem;
      color: #f0c030;
      pointer-events: none;
      animation: dmg-float 0.9s ease forwards;
      z-index: 10;
      white-space: nowrap;
      text-shadow: 0 2px 6px rgba(0,0,0,0.6);
    }
    @keyframes dmg-float {
      0%   { opacity: 1; transform: translateX(-50%) translateY(0); }
      60%  { opacity: 1; }
      100% { opacity: 0; transform: translateX(-50%) translateY(-54px); }
    }

    /* Claude: 2026-04-18 — Lingo Legend card hand system */

    /* Hand phase — 3 ability cards to choose from */
    #hand-section {
      display: none;
      margin-bottom: 14px;
    }
    .hand-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #888;
      text-align: center;
      margin-bottom: 8px;
    }
    .hand-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
    }
    .hand-card {
      background: #16213e;
      border: 2px solid #0f3460;
      border-radius: 12px;
      padding: 12px 8px;
      cursor: pointer;
      text-align: center;
      transition: transform 0.15s, border-color 0.15s, box-shadow 0.15s;
      min-height: 90px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      position: relative;
    }
    .hand-card:hover { transform: translateY(-3px); border-color: #4a90d9; }
    .hand-card.selected {
      border-color: #e94560;
      box-shadow: 0 0 14px rgba(233,69,96,0.5);
      transform: translateY(-4px);
    }
    .hand-card.tricky-card { border-color: #e67e22; }
    .hand-card.tricky-card.selected { border-color: #e67e22; box-shadow: 0 0 14px rgba(230,126,34,0.5); }
    .hand-card .card-icon { font-size: 1.4rem; }
    .hand-card .card-preview {
      font-size: 0.72rem;
      color: #aaa;
      line-height: 1.3;
      /* Clamp to 2 lines */
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .hand-card .card-tricky-pip {
      position: absolute;
      top: 5px;
      right: 6px;
      font-size: 0.62rem;
      background: #e67e22;
      color: #fff;
      border-radius: 8px;
      padding: 1px 5px;
      font-weight: 700;
    }
    /* Deck counter */
    .deck-count {
      text-align: center;
      font-size: 0.75rem;
      color: #555;
      margin-bottom: 6px;
    }

    /* Mobile tweaks */
    @media (max-width: 380px) {
      .class-grid, .mc-grid { grid-template-columns: 1fr; }
      .mode-grid { grid-template-columns: 1fr 1fr; }
      .hand-grid { grid-template-columns: 1fr 1fr 1fr; gap: 5px; }
      .hand-card { padding: 8px 4px; min-height: 78px; }
      .hand-card .card-preview { font-size: 0.67rem; }
    }
  </style>
</head>
<body>

  <div id="site-header"></div>
  <script>
    fetch("/Academic-Allies/modular/shared-header.html")
      .then(function(r){ return r.text(); })
      .then(function(html){
        var c = document.getElementById("site-header");
        c.innerHTML = html;
        var s = c.querySelectorAll("script");
        s.forEach(function(o){
          var n = document.createElement("script");
          Array.from(o.attributes).forEach(function(a){ n.setAttribute(a.name, a.value); });
          n.textContent = o.textContent;
          o.replaceWith(n);
        });
      });
  </script>

  <!-- Firebase (v8 compat — matches app pattern) -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script src="/Academic-Allies/modular/aa-firebase.js"></script>

  <!-- ── LOADING ── -->
  <div class="screen active" id="screen-loading">
    <div class="loading-spinner"></div>
    <p style="text-align:center;color:#888;">Loading your quizzes...</p>
  </div>

  <!-- ── SETUP ── -->
  <div class="screen" id="screen-setup">
    <h1>Battle Mode</h1>
    <p class="subtitle">Answer questions to defeat the monster!</p>

    <div class="setup-card">
      <h3>Pick a Class</h3>
      <div class="class-grid" id="class-grid">
        <!-- filled by JS -->
      </div>
    </div>

    <div class="setup-card">
      <h3>Answer Style</h3>
      <div class="mode-grid">
        <button class="mode-btn selected" id="mode-mc" onclick="selectMode('mc')">
          <span class="mode-icon">👆</span>
          Multiple Choice
          <span class="mode-desc">Tap the answer — easier on rough days</span>
        </button>
        <button class="mode-btn" id="mode-type" onclick="selectMode('type')">
          <span class="mode-icon">✏️</span>
          Type It In
          <span class="mode-desc">Write the answer yourself</span>
        </button>
      </div>
    </div>

    <button class="btn-start" id="btn-start" onclick="startBattle()" disabled>
      Pick a class to start battling!
    </button>
  </div>

  <!-- ── BATTLE ── -->
  <div class="screen" id="screen-battle">
    <div class="battle-header">
      <span class="class-label" id="battle-class-label"></span>
      <span id="battle-progress"></span>
    </div>

    <!-- Monster HP -->
    <div class="hp-section">
      <div class="hp-row">
        <span class="hp-label" id="monster-name-label">Monster</span>
        <div class="hp-bar-bg"><div class="hp-bar-fill monster" id="monster-hp-bar" style="width:100%"></div></div>
        <span class="hp-value" id="monster-hp-val"></span>
      </div>
      <div class="hp-row">
        <span class="hp-label">You</span>
        <div class="hp-bar-bg"><div class="hp-bar-fill player" id="player-hp-bar" style="width:100%"></div></div>
        <span class="hp-value" id="player-hp-val"></span>
      </div>
    </div>

    <!-- Monster display -->
    <div class="monster-arena">
      <div class="monster-display" id="monster-emoji">👾</div>
      <div class="monster-name" id="monster-name-display"></div>
    </div>

    <!-- Claude: 2026-04-18 — Lingo Legend card hand: pick a card to play, then answer it -->
    <div id="hand-section">
      <div class="deck-count" id="deck-count"></div>
      <div class="hand-label">⚔️ Choose a card to play</div>
      <div class="hand-grid" id="hand-grid">
        <!-- filled by JS -->
      </div>
    </div>

    <!-- Question -->
    <!-- Claude: 2026-04-13 — Lingo Legend polish: dynamic category label + streak/tricky badges -->
    <div class="question-card" id="question-card" style="display:none">
      <div class="q-label">❓ <span id="q-cat">What is this?</span><span class="streak-badge" id="streak-badge"></span><span class="tricky-badge" id="tricky-badge" style="display:none">🔥 Tricky</span></div>
      <div class="q-text" id="q-text"></div>
      <div class="q-from" id="q-from"></div>
    </div>

    <!-- Multiple choice (shown/hidden by mode) -->
    <div id="mc-section" style="display:none">
      <div class="mc-grid" id="mc-grid"></div>
    </div>

    <!-- Type-in (shown/hidden by mode) -->
    <div id="type-section" style="display:none">
      <div class="type-row">
        <input class="type-input" id="type-input" type="text" placeholder="Type your answer..." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
        <button class="btn-submit" id="btn-submit" onclick="submitTyped()">Go</button>
      </div>
    </div>

    <div class="feedback-msg" id="feedback-msg"></div>
    <div class="hearts" id="hearts-display"></div>
  </div>

  <!-- ── RESULT ── -->
  <div class="screen" id="screen-result">
    <div class="result-icon" id="result-icon"></div>
    <div class="result-title" id="result-title"></div>
    <div class="result-sub"  id="result-sub"></div>
    <div class="result-stats" id="result-stats"></div>
    <div>
      <button class="btn-again" onclick="playAgain()">Play Again</button>
      <button class="btn-setup" onclick="showSetup()">Change Class</button>
    </div>
  </div>

  <script>
    /* Claude: 2026-04-07 — Battle Mode game logic: loads Firestore quizzes, runs card battles */

    var MONSTER_PLAYER_HP = 5;
    var MONSTER_HP        = 10;

    var MONSTERS = {
      "HORT 328": { emoji: "🌸", name: "The Petal Beast"  },
      "FCS 207":  { emoji: "🧵", name: "The Stitch Fiend" },
      "IDS 101":  { emoji: "📚", name: "The Book Goblin"  },
      "HORT 287R":{ emoji: "💐", name: "The Bloom Brute"  },
      "FCS 101":  { emoji: "🏠", name: "The Hearth Troll" },
      /* Claude: 2026-04-12 — RBT exam prep monster */
      "RBT":      { emoji: "🧠", name: "The Behavior Beast" },
      "default":  { emoji: "👾", name: "The Quiz Beast"   }
    };

    // ── State ──
    var allQuestions   = [];  // { question, answer, quizTitle, classKey, tricky }
    var battleQuestions = [];
    var currentQ       = 0;
    var playerHP       = MONSTER_PLAYER_HP;
    var monsterHP      = MONSTER_HP;
    var correctCount   = 0;
    var wrongCount     = 0;
    var selectedClass  = null;
    var selectedMode   = "mc";
    var answerLocked   = false;
    var classMeta      = {};  // classKey -> { label, count, monster }
    var springClassList = []; // classes queued from auto-generate-classes.js
    /* Claude: 2026-04-13 — Lingo Legend polish: streak tracking */
    var streak         = 0;
    var maxStreak      = 0;
    /* Claude: 2026-04-18 — Lingo Legend card hand system */
    var deck           = [];   // remaining questions not yet drawn
    var currentHand    = [];   // 3 cards currently in hand
    var selectedCardIdx = -1;  // which hand card the player tapped

    // ── Boot ──
    firebase.auth().onAuthStateChanged(function(user) {
      if (!user) {
        showScreen("loading");
        document.getElementById("screen-loading").innerHTML =
          '<p style="text-align:center;padding-top:60px;color:#aaa;">Please sign in to play Battle Mode.</p>';
        return;
      }
      loadQuizzes(window.AA_uid ? window.AA_uid(user.uid) : user.uid);
    });

    function loadQuizzes(uid) {
      firebase.firestore().doc("studentConfig/" + uid).get()
        .then(function(snap) {
          if (!snap.exists) {
            showError("No quiz data found. Ask your Network Lead to load your quizzes.");
            return;
          }
          var data   = snap.data();
          var quizzes = data.quizzes || [];

          allQuestions = [];
          classMeta    = {};

          quizzes.forEach(function(quiz) {
            // Only use flashcard type to avoid triplicating content
            if (quiz.type !== "flashcards") return;
            if (!quiz.data || !quiz.data.length) return;

            // Determine class key from title
            var classKey = getClassKey(quiz.title || "");

            if (!classMeta[classKey]) {
              classMeta[classKey] = { label: classKey, count: 0, monster: getMonster(classKey) };
            }

            /* Claude: 2026-04-13 — Lingo Legend polish: tag tricky questions from "Tricky" quiz sets */
            var isTricky = quiz.title && quiz.title.toLowerCase().indexOf("tricky") !== -1;
            quiz.data.forEach(function(item) {
              /* Claude: 2026-04-12 — support both legacy item.answer and current item.definition field */
              var def = item.definition || item.answer;
              if (!item.term || !def) return;
              allQuestions.push({
                question:   def,
                answer:     item.term,
                quizTitle:  quiz.title || classKey,
                classKey:   classKey,
                tricky:     isTricky
              });
              classMeta[classKey].count++;
            });
          });

          if (allQuestions.length === 0) {
            showError("No flashcard quizzes found. Try loading your quizzes from Study Tools first.");
            return;
          }

          buildClassGrid();
          showScreen("setup");
        })
        .catch(function(err) {
          showError("Couldn't load quizzes: " + err.message);
        });
    }

    function getClassKey(title) {
      var t = title.toUpperCase();
      if (t.indexOf("HORT 287") !== -1 || t.indexOf("HORT287") !== -1) return "HORT 287R";
      if (t.indexOf("HORT 328") !== -1 || t.indexOf("HORT328") !== -1) return "HORT 328";
      if (t.indexOf("HORT")     !== -1)                                  return "HORT";
      if (t.indexOf("FCS 207")  !== -1 || t.indexOf("FCS207")  !== -1) return "FCS 207";
      if (t.indexOf("FCS 101")  !== -1 || t.indexOf("FCS101")  !== -1) return "FCS 101";
      if (t.indexOf("FCS")      !== -1)                                  return "FCS";
      if (t.indexOf("IDS 101")  !== -1 || t.indexOf("IDS101")  !== -1) return "IDS 101";
      if (t.indexOf("IDS")      !== -1)                                  return "IDS";
      if (t.indexOf("COOK")     !== -1 || t.indexOf("CULIN")   !== -1) return "Cooking";
      /* Claude: 2026-04-12 — RBT exam prep class key */
      if (t.indexOf("RBT")      !== -1)                                  return "RBT";
      return "General";
    }

    function getMonster(classKey) {
      return MONSTERS[classKey] || MONSTERS["default"];
    }

    function buildClassGrid() {
      var grid = document.getElementById("class-grid");
      grid.innerHTML = "";
      var keys = Object.keys(classMeta);

      keys.forEach(function(key) {
        var meta = classMeta[key];
        var btn  = document.createElement("button");
        btn.className  = "class-btn";
        btn.setAttribute("data-class", key);
        btn.innerHTML  =
          '<span class="class-icon">' + meta.monster.emoji + '</span>' +
          '<span class="class-name">' + key + '</span>' +
          '<span class="class-count">' + meta.count + ' questions</span>';
        btn.onclick = function() { selectClass(key); };
        grid.appendChild(btn);
      });

      // Add "All Classes" if more than one
      if (keys.length > 1) {
        var total = allQuestions.length;
        var btn   = document.createElement("button");
        btn.className  = "class-btn";
        btn.setAttribute("data-class", "ALL");
        btn.innerHTML  =
          '<span class="class-icon">⚔️</span>' +
          '<span class="class-name">All Classes</span>' +
          '<span class="class-count">' + total + ' questions</span>';
        btn.onclick = function() { selectClass("ALL"); };
        grid.appendChild(btn);
      }
      // Merge any spring classes already queued by auto-generate-classes.js
      if (springClassList.length) {
        addSpringClassesToGrid(springClassList);
      }
    }

    /* Claude: 2026-04-11 — Spring class integration: accept classes from auto-generate,
       show them in the class picker grid. Classes with no quiz data yet show as locked
       (Lingo Legend pattern — see all courses, unlock by loading quiz data). */
    function addSpringClassesToGrid(classes) {
      var grid = document.getElementById("class-grid");
      if (!grid || !classes || !classes.length) return;
      classes.forEach(function(cls) {
        var key = (cls.code || cls.name || "").trim();
        if (!key) return;
        // Skip if Firestore already covers this class (exact or prefix match)
        var metaKeys = Object.keys(classMeta);
        for (var i = 0; i < metaKeys.length; i++) {
          if (metaKeys[i] === key ||
              metaKeys[i].indexOf(key) === 0 ||
              key.indexOf(metaKeys[i]) === 0) return;
        }
        var monster = getMonster(key);
        var label   = (cls.name && cls.name !== cls.code)
          ? cls.code + " \u2014 " + cls.name
          : key;
        var btn = document.createElement("button");
        btn.className = "class-btn class-btn-locked";
        btn.setAttribute("data-class", key);
        btn.setAttribute("title", "Add quiz data in Study Tools to unlock");
        btn.innerHTML =
          '<span class="class-icon">' + monster.emoji + '</span>' +
          '<span class="class-name">' + label + '</span>' +
          '<span class="class-count">Load quizzes to unlock</span>';
        btn.disabled = true;
        grid.appendChild(btn);
      });
    }

    window.AA_addSpringClasses = function(classes) {
      if (!classes || !classes.length) return;
      springClassList = classes;
      // If grid is already built (Firestore loaded first), inject now
      if (allQuestions.length > 0) {
        addSpringClassesToGrid(springClassList);
      }
    };
    // Pick up anything auto-generate already queued before this script ran
    if (window.AA_pendingSpringClasses && window.AA_pendingSpringClasses.length) {
      window.AA_addSpringClasses(window.AA_pendingSpringClasses);
      window.AA_pendingSpringClasses = [];
    }

    function selectClass(key) {
      selectedClass = key;
      var btns = document.querySelectorAll(".class-btn");
      btns.forEach(function(b) {
        b.classList.toggle("selected", b.getAttribute("data-class") === key);
      });
      var startBtn = document.getElementById("btn-start");
      startBtn.disabled     = false;
      startBtn.textContent  = "Start Battle!";
    }

    function selectMode(mode) {
      selectedMode = mode;
      document.getElementById("mode-mc").classList.toggle("selected",   mode === "mc");
      document.getElementById("mode-type").classList.toggle("selected", mode === "type");
    }

    function startBattle() {
      if (!selectedClass) return;

      // Pull questions for selected class
      var pool = selectedClass === "ALL"
        ? allQuestions.slice()
        : allQuestions.filter(function(q) { return q.classKey === selectedClass; });

      // Shuffle
      pool = shuffle(pool);

      // Cap at MONSTER_HP questions (one per HP)
      battleQuestions = pool.slice(0, MONSTER_HP);

      // Reset state
      currentQ     = 0;
      playerHP     = MONSTER_PLAYER_HP;
      monsterHP    = MONSTER_HP;
      correctCount = 0;
      wrongCount   = 0;
      answerLocked = false;
      /* Claude: 2026-04-13 — Lingo Legend polish: reset streak on new battle */
      streak       = 0;
      maxStreak    = 0;
      /* Claude: 2026-04-18 — card hand: deck = full shuffled pool */
      deck            = pool.slice();   // already shuffled above
      currentHand     = [];
      selectedCardIdx = -1;

      // Set monster
      var monster = (selectedClass === "ALL") ? MONSTERS["default"] : getMonster(selectedClass);
      document.getElementById("monster-emoji").textContent    = monster.emoji;
      document.getElementById("monster-name-display").textContent = monster.name;
      document.getElementById("monster-name-label").textContent   = monster.name;
      document.getElementById("battle-class-label").textContent   = selectedClass === "ALL" ? "All Classes" : selectedClass;

      updateHPBars();
      showScreen("battle");
      dealHand();
    }

    /* Claude: 2026-04-18 — Lingo Legend card hand: deal 3 cards from deck, player picks one */
    function dealHand() {
      // Check win/loss conditions first
      if (monsterHP <= 0) { endBattle(true);  return; }
      if (playerHP  <= 0) { endBattle(false); return; }
      if (deck.length === 0 && currentHand.length === 0) { endBattle(true); return; }

      // Refill hand up to 3 from deck
      while (currentHand.length < 3 && deck.length > 0) {
        currentHand.push(deck.shift());
      }

      selectedCardIdx = -1;
      answerLocked    = false;

      // Show hand, hide answer UI
      document.getElementById("hand-section").style.display    = "";
      document.getElementById("question-card").style.display   = "none";
      document.getElementById("mc-section").style.display      = "none";
      document.getElementById("type-section").style.display    = "none";
      document.getElementById("feedback-msg").textContent      = "";
      document.getElementById("feedback-msg").className        = "feedback-msg";

      var total = correctCount + wrongCount + currentHand.length + deck.length;
      document.getElementById("deck-count").textContent = deck.length + " cards left in deck";
      document.getElementById("battle-progress").textContent   =
        (correctCount + wrongCount) + " played · " + monsterHP + " HP left";

      updateHPBars();
      renderHearts();
      renderHand();
    }

    function renderHand() {
      var grid = document.getElementById("hand-grid");
      grid.innerHTML = "";
      currentHand.forEach(function(q, i) {
        var card = document.createElement("div");
        card.className = "hand-card" + (q.tricky ? " tricky-card" : "");
        card.innerHTML =
          (q.tricky ? '<span class="card-tricky-pip">🔥 Tricky</span>' : "") +
          '<span class="card-icon">' + (getMonster(q.classKey).emoji) + '</span>' +
          '<span class="card-preview">' + escHtml(q.question) + '</span>';
        card.onclick = (function(idx) {
          return function() { selectHandCard(idx); };
        })(i);
        grid.appendChild(card);
      });
    }

    function selectHandCard(idx) {
      if (answerLocked) return;
      selectedCardIdx = idx;
      // Highlight selected card
      var cards = document.querySelectorAll(".hand-card");
      cards.forEach(function(c, i) {
        c.classList.toggle("selected", i === idx);
      });
      // Reveal the question + answer UI
      renderQuestion(currentHand[idx]);
    }

    function renderQuestion(q) {
      answerLocked = false;

      document.getElementById("question-card").style.display = "";
      document.getElementById("q-text").textContent = q.question;
      document.getElementById("q-from").textContent = q.quizTitle;
      document.getElementById("feedback-msg").textContent = "";
      document.getElementById("feedback-msg").className   = "feedback-msg";

      /* Claude: 2026-04-13 — Lingo Legend polish: update q-cat, tricky badge, streak badge */
      document.getElementById("q-cat").textContent = q.classKey || "Question";
      var trickyBadge = document.getElementById("tricky-badge");
      var streakBadge = document.getElementById("streak-badge");
      trickyBadge.style.display = q.tricky ? "" : "none";
      if (streak >= 3) {
        streakBadge.textContent = "🔥 " + streak + " Streak!";
        streakBadge.classList.add("visible");
      } else {
        streakBadge.textContent = "";
        streakBadge.classList.remove("visible");
      }

      if (selectedMode === "mc") {
        renderMC(q);
        document.getElementById("mc-section").style.display   = "";
        document.getElementById("type-section").style.display = "none";
      } else {
        var input = document.getElementById("type-input");
        input.value     = "";
        input.className = "type-input";
        input.disabled  = false;
        document.getElementById("btn-submit").disabled = false;
        document.getElementById("mc-section").style.display   = "none";
        document.getElementById("type-section").style.display = "";
        setTimeout(function() { input.focus(); }, 100);
      }
    }

    function escHtml(s) {
      return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    }

    function renderMC(q) {
      /* Claude: 2026-04-18 — pull distractors from deck + rest of hand + allQuestions fallback */
      var pool = deck.concat(currentHand);
      var others = pool
        .filter(function(item) { return item.answer !== q.answer; })
        .map(function(item) { return item.answer; });
      others = shuffle(others).slice(0, 3);

      // If not enough distractors, pad from allQuestions
      if (others.length < 3) {
        var extra = allQuestions
          .filter(function(item) { return item.answer !== q.answer; })
          .map(function(item) { return item.answer; });
        extra = shuffle(extra);
        while (others.length < 3 && extra.length > 0) {
          var candidate = extra.shift();
          if (others.indexOf(candidate) === -1) others.push(candidate);
        }
      }

      var choices = shuffle([q.answer].concat(others.slice(0, 3)));
      var grid    = document.getElementById("mc-grid");
      grid.innerHTML = "";

      choices.forEach(function(choice) {
        var btn = document.createElement("button");
        btn.className   = "mc-btn";
        btn.textContent = choice;
        btn.onclick     = function() { handleMC(choice, q.answer, btn); };
        grid.appendChild(btn);
      });
    }

    function handleMC(chosen, correct, btn) {
      if (answerLocked) return;
      answerLocked = true;

      // Disable all buttons
      var btns = document.querySelectorAll(".mc-btn");
      btns.forEach(function(b) { b.disabled = true; });

      if (chosen === correct) {
        btn.classList.add("correct");
        onCorrect();
      } else {
        btn.classList.add("wrong");
        // Show correct answer
        btns.forEach(function(b) {
          if (b.textContent === correct) b.classList.add("correct");
        });
        onWrong(correct);
      }
    }

    function submitTyped() {
      var input = document.getElementById("type-input");
      var typed = input.value.trim();
      if (!typed || answerLocked) return;

      var q       = currentHand[selectedCardIdx];
      var correct = q ? q.answer : "";

      answerLocked = true;
      input.disabled = true;
      document.getElementById("btn-submit").disabled = true;

      if (fuzzyMatch(typed, correct)) {
        input.classList.add("correct");
        onCorrect();
      } else {
        input.classList.add("wrong");
        onWrong(correct);
      }
    }

    function onCorrect() {
      /* Claude: 2026-04-18 — tricky cards deal 2 damage */
      var playedCard = currentHand[selectedCardIdx] || {};
      var dmg = playedCard.tricky ? 2 : 1;
      monsterHP -= dmg;
      correctCount++;
      /* Claude: 2026-04-13 — Lingo Legend polish: streak tracking */
      streak++;
      if (streak > maxStreak) maxStreak = streak;
      var streakMsg = streak >= 3 ? " 🔥 " + streak + " in a row!" : "";
      var dmgMsg = dmg > 1 ? " CRITICAL HIT! (" + dmg + " dmg)" : " The monster takes a hit!";
      setFeedback("Correct!" + dmgMsg + streakMsg, "good");
      hitMonster();
      showDamagePopup(dmg);
      /* Remove played card from hand */
      if (selectedCardIdx >= 0) currentHand.splice(selectedCardIdx, 1);
      selectedCardIdx = -1;
      setTimeout(function() {
        dealHand();
      }, 1200);
    }

    function onWrong(correct) {
      playerHP--;
      wrongCount++;
      /* Claude: 2026-04-13 — Lingo Legend polish: reset streak on wrong answer */
      streak = 0;
      setFeedback("Wrong! The answer was: " + correct, "bad");
      monsterAttacks();
      /* Remove played card from hand */
      if (selectedCardIdx >= 0) currentHand.splice(selectedCardIdx, 1);
      selectedCardIdx = -1;
      setTimeout(function() {
        dealHand();
      }, 1600);
    }

    function hitMonster() {
      var el = document.getElementById("monster-emoji");
      el.classList.remove("hit");
      void el.offsetWidth; // reflow
      el.classList.add("hit");
    }

    /* Claude: 2026-04-13/2026-04-18 — Lingo Legend polish: floating damage number on hit */
    function showDamagePopup(dmg) {
      var arena = document.querySelector(".monster-arena");
      if (!arena) return;
      var popup = document.createElement("div");
      popup.className = "damage-popup";
      var label = dmg > 1 ? "⚡ -" + dmg + " CRIT!" : (streak >= 3 ? "⚡ -1 COMBO!" : "-1");
      popup.textContent = label;
      arena.appendChild(popup);
      setTimeout(function() {
        if (popup.parentNode) popup.parentNode.removeChild(popup);
      }, 950);
    }

    function monsterAttacks() {
      var el = document.getElementById("monster-emoji");
      el.classList.remove("attack");
      void el.offsetWidth;
      el.classList.add("attack");
    }

    function updateHPBars() {
      var mPct = Math.max(0, (monsterHP / MONSTER_HP) * 100);
      var pPct = Math.max(0, (playerHP  / MONSTER_PLAYER_HP) * 100);
      document.getElementById("monster-hp-bar").style.width = mPct + "%";
      document.getElementById("player-hp-bar").style.width  = pPct + "%";
      document.getElementById("monster-hp-val").textContent = monsterHP + "/" + MONSTER_HP;
      document.getElementById("player-hp-val").textContent  = playerHP  + "/" + MONSTER_PLAYER_HP;
    }

    function renderHearts() {
      var hearts = "";
      for (var i = 0; i < MONSTER_PLAYER_HP; i++) {
        hearts += (i < playerHP) ? "❤️" : "🖤";
      }
      document.getElementById("hearts-display").textContent = hearts;
    }

    function setFeedback(msg, type) {
      var el = document.getElementById("feedback-msg");
      el.textContent = msg;
      el.className   = "feedback-msg " + type;
    }

    function endBattle(won) {
      updateHPBars();
      renderHearts();

      document.getElementById("result-icon").textContent  = won ? "🏆" : "💀";
      document.getElementById("result-title").textContent = won ? "Victory!" : "Defeated!";
      document.getElementById("result-title").className   = "result-title " + (won ? "win" : "lose");
      document.getElementById("result-sub").textContent   = won
        ? "You defeated " + document.getElementById("monster-name-display").textContent + "!"
        : "The monster won this round. Try again!";

      var totalAnswered = correctCount + wrongCount;
      var acc = totalAnswered > 0
        ? Math.round((correctCount / totalAnswered) * 100)
        : 0;

      /* Claude: 2026-04-13 — Lingo Legend polish: best streak in result stats */
      document.getElementById("result-stats").innerHTML =
        '<div class="stat-row"><span>Correct</span><span class="val">' + correctCount + '</span></div>' +
        '<div class="stat-row"><span>Wrong</span><span class="val">'   + wrongCount   + '</span></div>' +
        '<div class="stat-row"><span>Accuracy</span><span class="val">' + (isNaN(acc) ? 0 : acc) + '%</span></div>' +
        '<div class="stat-row"><span>HP Remaining</span><span class="val">' + (won ? playerHP : 0) + '/' + MONSTER_PLAYER_HP + '</span></div>' +
        '<div class="stat-row"><span>Best Streak 🔥</span><span class="val">' + maxStreak + '</span></div>';

      showScreen("result");
    }

    function playAgain() {
      startBattle();
    }

    function showSetup() {
      showScreen("setup");
    }

    // ── Helpers ──

    function showScreen(name) {
      var ids = ["loading", "setup", "battle", "result"];
      ids.forEach(function(id) {
        var el = document.getElementById("screen-" + id);
        if (el) el.classList.toggle("active", id === name);
      });
    }

    function showError(msg) {
      showScreen("loading");
      document.getElementById("screen-loading").innerHTML =
        '<p style="text-align:center;padding-top:60px;color:#e94560;">' + msg + '</p>';
    }

    function shuffle(arr) {
      var a = arr.slice();
      for (var i = a.length - 1; i > 0; i--) {
        var j  = Math.floor(Math.random() * (i + 1));
        var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
      }
      return a;
    }

    function fuzzyMatch(typed, correct) {
      var normalize = function(s) {
        return s.toLowerCase().trim()
          .replace(/[^a-z0-9\s]/g, "")
          .replace(/\s+/g, " ");
      };
      var t = normalize(typed);
      var c = normalize(correct);
      if (t === c) return true;
      // Allow if typed answer is contained in correct (for long definitions)
      if (c.indexOf(t) !== -1 && t.length > 4) return true;
      return false;
    }

    // Allow Enter key to submit in type mode
    document.addEventListener("keydown", function(e) {
      if (e.key === "Enter") {
        var typeSection = document.getElementById("type-section");
        if (typeSection && typeSection.style.display !== "none" && !answerLocked) {
          submitTyped();
        }
      }
    });
  </script>
