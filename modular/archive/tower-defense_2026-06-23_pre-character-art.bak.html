<!-- /* Claude: 2026-05-01 — Tower defense game */ -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Tower Defense</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#16213e;color:#eee;font-family:sans-serif;display:flex;flex-direction:column;align-items:center;height:100dvh;overflow:hidden;user-select:none}
html.aa-dark body{background:#0a0a14}
#wrap{position:relative;flex:1;width:100%;display:flex;justify-content:center;align-items:center;min-height:0}
canvas{max-width:100%;max-height:100%;display:block;cursor:crosshair}
#hud{display:flex;gap:6px;align-items:center;padding:5px 8px;background:#0d1b2a;width:100%;flex-shrink:0;font-size:13px;flex-wrap:wrap}
#hud span{background:#1a2a3a;padding:2px 8px;border-radius:5px;white-space:nowrap}
#bar{display:flex;gap:5px;padding:5px 8px;background:#0d1b2a;width:100%;flex-shrink:0;flex-wrap:wrap}
button{padding:7px 11px;border:2px solid #444;border-radius:7px;cursor:pointer;font-size:12px;font-weight:bold;background:#1e293b;color:#eee;touch-action:manipulation}
.tb{min-width:72px;text-align:center;border-color:#555}
.tb.sel{border-color:#fbbf24;background:#2a2000}
.tb small{display:block;font-weight:normal;font-size:10px;color:#aaa}
#bWave{background:#166534;border-color:#16a34a;color:#fff;font-size:13px}
#bWave:disabled{opacity:.5;cursor:default}
#bFull{margin-left:auto;font-size:15px}
#msg{position:absolute;inset:0;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.75)}
#mBox{background:#1e293b;border:2px solid #4ade80;border-radius:12px;padding:22px 32px;text-align:center;font-size:17px}
#mBox button{margin-top:14px;background:#166534;border-color:#16a34a;font-size:14px;padding:8px 22px}
</style>
</head>
<body>
<div id="hud">
  <span>💰 <b id="hC">100</b></span>
  <span>❤️ <b id="hL">10</b></span>
  <span>🌊 Wave <b id="hW">0</b></span>
  <span>⭐ <b id="hS">0</b></span>
  <span id="phint" style="display:none;color:#fbbf24">▼ Tap to place</span>
</div>
<div id="wrap">
  <canvas id="cv"></canvas>
  <div id="msg"><div id="mBox"><div id="mTxt"></div><button onclick="init()">▶ Play Again</button></div></div>
  <div id="tinfo" style="display:none;position:absolute;bottom:8px;left:50%;transform:translateX(-50%);background:rgba(13,27,42,0.92);border:1px solid #4a5568;border-radius:9px;padding:5px 8px;z-index:10;white-space:nowrap">
    <span id="tname" style="font-size:11px;color:#94a3b8;display:block;text-align:center;margin-bottom:4px"></span>
    <div style="display:flex;gap:5px">
      <button id="bUp" onclick="upgradeTower()" style="font-size:11px;padding:5px 9px;min-width:60px"></button>
      <button id="bSell" onclick="sellTower()" style="font-size:11px;padding:5px 9px;background:#7f1d1d;border-color:#991b1b;color:#fca5a5"></button>
      <button onclick="closeTinfo()" style="font-size:11px;padding:5px 8px">✕</button>
    </div>
  </div>
</div>
<div id="bar">
  <button class="tb" id="b0" onclick="pick(0)">🔵 Basic<br><small>$50 · med</small></button>
  <button class="tb" id="b1" onclick="pick(1)">🔴 Sniper<br><small>$100 · far</small></button>
  <button class="tb" id="b2" onclick="pick(2)">🟢 Rapid<br><small>$75 · fast</small></button>
  <button id="bCancel" style="display:none;background:#7f1d1d;border-color:#991b1b;color:#fca5a5" onclick="cancelPlace()">✕ Cancel</button>
  <button id="bWave" onclick="startWave()">▶ Send Wave</button>
  <button id="bFull" onclick="goFull()">⛶</button>
</div>
<script>
var cv = document.getElementById('cv'), cx = cv.getContext('2d');
cv.width = 480; cv.height = 360;
var W = cv.width, H = cv.height, TAU = Math.PI * 2;

var PATH = [[0,65],[115,65],[115,185],[365,185],[365,300],[W+20,300]];

var TT = [
  {cost:50,  range:80,  dmg:15, rate:55,  col:'#38bdf8', bc:'#e0f2fe'},
  {cost:100, range:155, dmg:55, rate:110, col:'#f87171', bc:'#fde68a'},
  {cost:75,  range:60,  dmg:7,  rate:18,  col:'#4ade80', bc:'#fda4af'}
];

/* Claude: 2026-05-01 — Visual upgrade step 1: terrain and scenery */
var TREES=[
  {x:18,y:28,s:16},{x:52,y:22,s:14},{x:88,y:32,s:15},
  {x:198,y:22,s:18},{x:295,y:26,s:15},{x:415,y:22,s:17},{x:452,y:25,s:14},
  {x:58,y:130,s:16},{x:28,y:168,s:15},{x:55,y:240,s:17},{x:22,y:282,s:14},
  {x:425,y:78,s:16},{x:455,y:128,s:15},{x:438,y:160,s:14},
  {x:195,y:338,s:16},{x:98,y:330,s:15},{x:268,y:340,s:14}
];
var ROCKS=[
  {x:35,y:50,r:6},{x:168,y:48,r:5},{x:248,y:46,r:7},
  {x:78,y:210,r:5},{x:198,y:210,r:6},
  {x:308,y:225,r:5},{x:428,y:265,r:6}
];
var BUSHES=[
  {x:142,y:148,r:8},{x:172,y:132,r:7},{x:78,y:92,r:7},
  {x:338,y:138,r:8},{x:298,y:158,r:7},
  {x:78,y:338,r:8},{x:418,y:338,r:7}
];
var GP=[[55,75],[145,35],[275,45],[370,75],[85,255],[215,305],[325,275],[440,195]];

var gold, lives, wave, score, busy, over;
var towers, enemies, bullets, q, qt, mx, my, sel, selTower, placing, raf;

function init() {
  gold=100; lives=10; wave=0; score=0; busy=false; over=false;
  towers=[]; enemies=[]; bullets=[]; q=[]; qt=0; mx=240; my=180; sel=0; selTower=-1; placing=false;
  document.getElementById('msg').style.display='none';
  document.getElementById('bWave').disabled=false;
  document.getElementById('hW').textContent=0;
  for(var j=0;j<3;j++) document.getElementById('b'+j).className='tb';
  document.getElementById('bCancel').style.display='none';
  document.getElementById('phint').style.display='none';
  updateTinfo();
  cancelAnimationFrame(raf);
  loop();
}

function pick(i) {
  selTower=-1; updateTinfo();
  sel=i; placing=true;
  for(var j=0;j<3;j++) document.getElementById('b'+j).className='tb'+(j===i?' sel':'');
  document.getElementById('bCancel').style.display='';
  document.getElementById('phint').style.display='';
}

function cancelPlace() {
  placing=false;
  for(var j=0;j<3;j++) document.getElementById('b'+j).className='tb';
  document.getElementById('bCancel').style.display='none';
  document.getElementById('phint').style.display='none';
}

function startWave() {
  if(busy) return;
  wave++; busy=true;
  document.getElementById('bWave').disabled=true;
  document.getElementById('hW').textContent=wave;
  var n=4+wave*3;
  for(var i=0;i<n;i++) q.push({hp:20+wave*12, spd:0.5+wave*0.07, rew:8+wave*2});
  qt=0;
}

function spawnE(d) {
  enemies.push({x:PATH[0][0]-20, y:PATH[0][1], wp:1, hp:d.hp, mhp:d.hp, spd:d.spd, rew:d.rew});
}

function dst(ax,ay,bx,by) { return Math.sqrt((ax-bx)*(ax-bx)+(ay-by)*(ay-by)); }

function onPath(x,y) {
  for(var i=0;i<PATH.length-1;i++){
    var ax=PATH[i][0],ay=PATH[i][1],bx=PATH[i+1][0],by=PATH[i+1][1];
    var len=dst(ax,ay,bx,by); if(!len) continue;
    var t=((x-ax)*(bx-ax)+(y-ay)*(by-ay))/(len*len);
    t=t<0?0:t>1?1:t;
    if(dst(x,y,ax+t*(bx-ax),ay+t*(by-ay))<24) return true;
  }
  return false;
}

cv.addEventListener('click', function(e) {
  if(over) return;
  var r=cv.getBoundingClientRect(), sx=W/r.width, sy=H/r.height;
  var x=(e.clientX-r.left)*sx, y=(e.clientY-r.top)*sy;
  for(var i=0;i<towers.length;i++){
    if(dst(x,y,towers[i].x,towers[i].y)<18){
      if(!placing){ selTower=(selTower===i)?-1:i; updateTinfo(); }
      return;
    }
  }
  if(!placing){ selTower=-1; updateTinfo(); return; }
  var td=TT[sel];
  if(onPath(x,y)||gold<td.cost) return;
  gold-=td.cost;
  towers.push({x:x, y:y, t:sel, cd:0, lvl:0, dmgMult:1, rangeMult:1});
});

cv.addEventListener('mousemove', function(e) {
  var r=cv.getBoundingClientRect();
  mx=(e.clientX-r.left)*W/r.width;
  my=(e.clientY-r.top)*H/r.height;
});

cv.addEventListener('touchmove', function(e) {
  var r=cv.getBoundingClientRect(), t=e.touches[0];
  mx=(t.clientX-r.left)*W/r.width;
  my=(t.clientY-r.top)*H/r.height;
},{passive:true});

function loop() {
  raf=requestAnimationFrame(loop);
  if(over) return;

  qt++;
  if(q.length && qt>=40){ qt=0; spawnE(q.shift()); }

  for(var i=enemies.length-1;i>=0;i--){
    var e=enemies[i];
    if(e.hp<=0){ gold+=e.rew; score+=e.rew; enemies.splice(i,1); continue; }
    var wp=PATH[e.wp], dx=wp[0]-e.x, dy=wp[1]-e.y, d=Math.sqrt(dx*dx+dy*dy);
    if(d < e.spd+1){
      e.wp++;
      if(e.wp>=PATH.length){ enemies.splice(i,1); lives--; if(lives<=0){ over=true; gameOver(); } continue; }
    } else { e.x+=dx/d*e.spd; e.y+=dy/d*e.spd; }
  }

  for(var t=0;t<towers.length;t++){
    var tw=towers[t], ttd=TT[tw.t];
    if(tw.cd>0){ tw.cd--; continue; }
    var rng=(tw.rangeMult||1)*ttd.range;
    var tgt=null, best=rng+1;
    for(var j=0;j<enemies.length;j++){
      if(enemies[j].hp<=0) continue;
      var d2=dst(tw.x,tw.y,enemies[j].x,enemies[j].y);
      if(d2<best){ best=d2; tgt=enemies[j]; }
    }
    if(tgt){ bullets.push({x:tw.x,y:tw.y,tx:tgt,dmg:Math.floor((tw.dmgMult||1)*ttd.dmg),col:ttd.bc,spd:5.5}); tw.cd=ttd.rate; }
  }

  for(var b=bullets.length-1;b>=0;b--){
    var bl=bullets[b];
    if(!bl.tx||bl.tx.hp<=0){ bullets.splice(b,1); continue; }
    var dx2=bl.tx.x-bl.x, dy2=bl.tx.y-bl.y, bd=Math.sqrt(dx2*dx2+dy2*dy2);
    if(bd < bl.spd+2){ bl.tx.hp-=bl.dmg; bullets.splice(b,1); }
    else { bl.x+=dx2/bd*bl.spd; bl.y+=dy2/bd*bl.spd; }
  }

  if(busy && !q.length && !enemies.length){ busy=false; gold+=25; document.getElementById('bWave').disabled=false; }

  document.getElementById('hC').textContent=gold;
  document.getElementById('hL').textContent=lives;
  document.getElementById('hS').textContent=score;

  draw();
}

function draw() {
  /* Claude: 2026-05-01 — Visual upgrade step 1: terrain and scenery */

  // Green grass background with gradient
  var grd=cx.createLinearGradient(0,0,0,H);
  grd.addColorStop(0,'#2f6320'); grd.addColorStop(1,'#254f18');
  cx.fillStyle=grd; cx.fillRect(0,0,W,H);

  // Sky gradient strip (portrait mode only)
  if(H>W){
    var sky=cx.createLinearGradient(0,0,0,H*0.22);
    sky.addColorStop(0,'#5a9fd4'); sky.addColorStop(1,'rgba(95,160,212,0)');
    cx.fillStyle=sky; cx.fillRect(0,0,W,H*0.22);
  }

  // Subtle darker grass patches for color variation
  cx.globalAlpha=0.18; cx.fillStyle='#1e4f14';
  for(var gi=0;gi<GP.length;gi++){
    cx.beginPath(); cx.arc(GP[gi][0],GP[gi][1],22,0,TAU); cx.fill();
  }
  cx.globalAlpha=1;

  // Rocks (dark circle + lighter highlight circle)
  for(var ri=0;ri<ROCKS.length;ri++){
    var rk=ROCKS[ri];
    cx.fillStyle='#7a7060'; cx.beginPath(); cx.arc(rk.x,rk.y,rk.r,0,TAU); cx.fill();
    cx.fillStyle='#9a8f7f'; cx.beginPath(); cx.arc(rk.x-1,rk.y-1,Math.max(1,rk.r*0.55),0,TAU); cx.fill();
  }

  // Bushes (dark green base + lighter top highlight)
  for(var bui=0;bui<BUSHES.length;bui++){
    var bsh=BUSHES[bui];
    cx.fillStyle='#1e5c1a'; cx.beginPath(); cx.arc(bsh.x,bsh.y,bsh.r,0,TAU); cx.fill();
    cx.fillStyle='#2a7a25'; cx.beginPath(); cx.arc(bsh.x-1,bsh.y-2,bsh.r*0.6,0,TAU); cx.fill();
  }

  // Trees: trunk rectangle + two stacked pine triangles
  for(var ti=0;ti<TREES.length;ti++){
    var tr=TREES[ti], tx=tr.x, ty=tr.y, ts=tr.s;
    cx.fillStyle='#5c3a1e'; cx.fillRect(tx-2,ty+ts*0.5,5,ts*0.65);
    cx.fillStyle='#1a6b15';
    cx.beginPath(); cx.moveTo(tx,ty-ts*0.3); cx.lineTo(tx-ts*0.72,ty+ts*0.55); cx.lineTo(tx+ts*0.72,ty+ts*0.55); cx.closePath(); cx.fill();
    cx.fillStyle='#228b1a';
    cx.beginPath(); cx.moveTo(tx,ty-ts); cx.lineTo(tx-ts*0.5,ty+ts*0.15); cx.lineTo(tx+ts*0.5,ty+ts*0.15); cx.closePath(); cx.fill();
  }

  // Dirt/brown winding path (shadow edge → main dirt → lighter centre)
  cx.lineCap='round'; cx.lineJoin='round';
  cx.strokeStyle='#4a2808'; cx.lineWidth=34;
  cx.beginPath(); cx.moveTo(PATH[0][0],PATH[0][1]);
  for(var i=1;i<PATH.length;i++) cx.lineTo(PATH[i][0],PATH[i][1]);
  cx.stroke();
  cx.strokeStyle='#7a4e1e'; cx.lineWidth=30;
  cx.beginPath(); cx.moveTo(PATH[0][0],PATH[0][1]);
  for(var i=1;i<PATH.length;i++) cx.lineTo(PATH[i][0],PATH[i][1]);
  cx.stroke();
  cx.strokeStyle='#9a6830'; cx.lineWidth=18;
  cx.beginPath(); cx.moveTo(PATH[0][0],PATH[0][1]);
  for(var i=1;i<PATH.length;i++) cx.lineTo(PATH[i][0],PATH[i][1]);
  cx.stroke();

  // Castle/base at path exit (right edge)
  var bx=455, by=270;
  cx.fillStyle='#786858'; cx.fillRect(bx-16,by,32,30);
  cx.fillStyle='#8a7868';
  cx.fillRect(bx-15,by-8,8,10); cx.fillRect(bx-3,by-8,8,10); cx.fillRect(bx+8,by-8,8,10);
  cx.fillStyle='#1a0f08'; cx.fillRect(bx-5,by+16,10,14);
  cx.beginPath(); cx.arc(bx,by+16,5,Math.PI,0,true); cx.fill();
  cx.strokeStyle='#9a9080'; cx.lineWidth=1.5;
  cx.beginPath(); cx.moveTo(bx,by-8); cx.lineTo(bx,by-20); cx.stroke();
  cx.fillStyle='#bb2222';
  cx.beginPath(); cx.moveTo(bx,by-20); cx.lineTo(bx+9,by-15); cx.lineTo(bx,by-10); cx.closePath(); cx.fill();

  // Tower placement preview (only in placing mode)
  if(placing){
    var ptd=TT[sel], canPlace=gold>=ptd.cost && !onPath(mx,my);
    cx.beginPath(); cx.arc(mx,my,ptd.range,0,TAU);
    cx.strokeStyle=canPlace?'rgba(255,255,255,.1)':'rgba(255,80,80,.15)';
    cx.lineWidth=1.5; cx.stroke();
    cx.beginPath(); cx.arc(mx,my,12,0,TAU);
    cx.fillStyle=(canPlace?ptd.col:'#ef4444')+'99'; cx.fill();
  }

  for(var t=0;t<towers.length;t++) drawTower(t, towers[t]);

  for(var e=0;e<enemies.length;e++){
    var en=enemies[e]; if(en.hp<=0) continue;
    cx.beginPath(); cx.arc(en.x,en.y,9,0,TAU);
    cx.fillStyle='#dc2626'; cx.fill();
    cx.strokeStyle='#fca5a5'; cx.lineWidth=1.5; cx.stroke();
    cx.fillStyle='#1e293b'; cx.fillRect(en.x-10,en.y-17,20,4);
    cx.fillStyle=en.hp/en.mhp>.5?'#22c55e':'#f59e0b';
    cx.fillRect(en.x-10,en.y-17,Math.max(0,20*en.hp/en.mhp),4);
  }

  for(var b=0;b<bullets.length;b++){
    var bl=bullets[b];
    cx.beginPath(); cx.arc(bl.x,bl.y,3,0,TAU);
    cx.fillStyle=bl.col; cx.fill();
  }
}

function drawTower(idx, tw) {
  /* Claude: 2026-05-01 — Visual upgrade step 2: tower buildings + upgrades */
  var ttd=TT[tw.t], x=tw.x, y=tw.y, lv=tw.lvl||0;
  var isSel=(selTower===idx);
  var rng=(tw.rangeMult||1)*ttd.range;

  if(isSel){
    cx.beginPath(); cx.arc(x,y,rng,0,TAU);
    cx.strokeStyle='rgba(255,255,120,0.22)'; cx.lineWidth=1.5; cx.stroke();
  }
  if(lv>0){
    cx.fillStyle='#fbbf24'; cx.font='9px sans-serif'; cx.textAlign='center';
    cx.fillText(lv===2?'★★':'★',x,y+14);
  }
  cx.textAlign='left';

  if(tw.t===0){
    cx.fillStyle=lv>0?'#276b3a':'#38a169';
    cx.fillRect(x-9,y-8,18,16);
    cx.fillStyle='#1a4f27'; cx.fillRect(x-9,y-8,18,4);
    cx.fillStyle='#b7e4c7'; cx.fillRect(x-7,y-4,5,5); cx.fillRect(x+2,y-4,5,5);
    cx.beginPath(); cx.arc(x,y-15,5,0,TAU); cx.fillStyle='#f4c48a'; cx.fill();
    cx.fillStyle='#2d2d2d';
    cx.fillRect(x-3,y-17,2,2); cx.fillRect(x+1,y-17,2,2);
    cx.beginPath(); cx.arc(x,y-14,2.5,0.2,Math.PI-0.2);
    cx.strokeStyle='#2d2d2d'; cx.lineWidth=1; cx.stroke();

  } else if(tw.t===1){
    cx.fillStyle=lv>0?'#991b1b':'#e53e3e';
    cx.fillRect(x-7,y-17,14,25);
    cx.fillStyle='#7f1d1d'; cx.fillRect(x-7,y-17,14,6);
    cx.fillStyle='#1a0a0a'; cx.fillRect(x-4,y-17,3,5); cx.fillRect(x+1,y-17,3,5);
    cx.fillStyle='#fde68a'; cx.fillRect(x-5,y-10,4,4); cx.fillRect(x+1,y-10,4,4);
    cx.beginPath(); cx.arc(x,y-22,5,0,TAU); cx.fillStyle='#f4c48a'; cx.fill();
    cx.fillStyle='#2d2d2d';
    cx.fillRect(x-3,y-24,2,2); cx.fillRect(x+1,y-24,2,2);
    cx.strokeStyle='#9ca3af'; cx.lineWidth=2;
    cx.beginPath(); cx.moveTo(x+4,y-22); cx.lineTo(x+14,y-22); cx.stroke();
    cx.fillStyle='#9ca3af'; cx.beginPath(); cx.arc(x+15,y-22,2,0,TAU); cx.fill();

  } else {
    cx.fillStyle=lv>0?'#1d4ed8':'#3b82f6';
    cx.fillRect(x-11,y-4,22,12);
    cx.fillStyle='#1e3a8a'; cx.fillRect(x-11,y-4,22,4);
    cx.fillStyle='#0f172a'; cx.fillRect(x-5,y,10,4);
    cx.beginPath(); cx.arc(x,y-9,5,0,TAU); cx.fillStyle='#f4c48a'; cx.fill();
    cx.fillStyle='#2d2d2d';
    cx.fillRect(x-3,y-11,2,2); cx.fillRect(x+1,y-11,2,2);
  }
}

function updateTinfo() {
  /* Claude: 2026-06-23 — placement-fix: sell/upgrade panel */
  var el=document.getElementById('tinfo');
  if(selTower<0||selTower>=towers.length){ el.style.display='none'; return; }
  var tw=towers[selTower], ttd=TT[tw.t];
  var lv=tw.lvl||0, upcost=Math.floor(ttd.cost*0.5);
  var refund=Math.floor(ttd.cost*(1+lv*0.5)*0.5);
  document.getElementById('tname').textContent=['Basic','Sniper','Rapid'][tw.t]+' Lv'+(lv+1);
  var ub=document.getElementById('bUp');
  ub.textContent=lv<2?'⬆ $'+upcost:'MAX'; ub.disabled=(lv>=2||gold<upcost);
  document.getElementById('bSell').textContent='💰 Sell $'+refund;
  el.style.display='flex'; el.style.flexDirection='column';
}

function upgradeTower() {
  if(selTower<0) return;
  var tw=towers[selTower], upcost=Math.floor(TT[tw.t].cost*0.5);
  if((tw.lvl||0)>=2||gold<upcost) return;
  gold-=upcost; tw.lvl=(tw.lvl||0)+1;
  tw.dmgMult=(tw.dmgMult||1)*1.3; tw.rangeMult=(tw.rangeMult||1)*1.1;
  updateTinfo();
}

function sellTower() {
  if(selTower<0) return;
  var tw=towers[selTower], ttd=TT[tw.t];
  gold+=Math.floor(ttd.cost*(1+(tw.lvl||0)*0.5)*0.5);
  towers.splice(selTower,1);
  selTower=-1; updateTinfo();
}

function closeTinfo() { selTower=-1; updateTinfo(); }

function gameOver() {
  document.getElementById('mTxt').textContent='💀 Game Over — Wave '+wave+' | Score: '+score;
  document.getElementById('msg').style.display='flex';
}

function goFull() {
  var el=document.getElementById('wrap');
  if(el.requestFullscreen) el.requestFullscreen();
  else if(el.webkitRequestFullscreen) el.webkitRequestFullscreen();
}

init();
</script>
</body>
</html>
