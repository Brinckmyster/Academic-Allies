<!-- Claude: 2026-04-20 — Farm Mode rebuilt as Lingo Legend-style village builder.
     Top-down emoji grid map. Answer questions → earn coins → place buildings.
     Persistent Firestore state: farmVillage/{uid}. COMM 130 + all existing classes. -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Farm Mode — Academic Allies</title>
  <link rel="icon" type="image/png" href="../../icons/mode-recovery.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    html.aa-dark { color-scheme: dark; }
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Nunito', Arial, sans-serif;
      background: linear-gradient(to bottom, #87ceeb 0%, #9dd4ee 30%, #6db85a 60%, #4a8a2a 100%);
      background-attachment: fixed;
      color: #2d1508;
      min-height: 100vh;
    }
    html.aa-dark body {
      background: linear-gradient(to bottom, #0b1a2e 0%, #0e2040 30%, #1a3a0a 60%, #2a5a1a 100%) !important;
      background-attachment: fixed !important;
      color: #e8d8c0 !important;
    }

    /* ── Screens ── */
    .screen { display: none; }
    .screen.active { display: block; }
    #screen-village { display: none; flex-direction: column; height: 100vh; overflow: hidden; }
    #screen-village.active { display: flex; }
    #shared-header-root { margin-bottom: 0; }

    /* ══════════════════════════════
       SETUP SCREEN
    ══════════════════════════════ */
    .setup-wrap { max-width: 480px; margin: 0 auto; padding: 16px; }

    .farm-title {
      font-family: 'Fredoka One', cursive;
      font-size: 2.2rem; text-align: center;
      color: #fff; text-shadow: 0 2px 8px rgba(0,0,0,0.5);
      margin-bottom: 4px;
    }
    .farm-subtitle { text-align: center; font-size: 0.85rem; color: #ffe4b5; margin-bottom: 4px; text-shadow: 0 1px 4px rgba(0,0,0,0.4); }
    .farm-credit   { text-align: center; font-size: 0.72rem; color: #d4b070; margin-bottom: 20px; }
    .farm-credit a { color: #f0c84a; }

    .setup-card {
      background: rgba(255,248,220,0.92);
      border: 2px solid rgba(139,90,40,0.2);
      border-radius: 16px; padding: 16px; margin-bottom: 14px;
      box-shadow: 0 3px 12px rgba(0,0,0,0.2);
    }
    html.aa-dark .setup-card { background: rgba(40,25,10,0.88) !important; border-color: rgba(160,100,40,0.25) !important; }
    .setup-card h3 { font-family: 'Fredoka One', cursive; font-size: 1.05rem; color: #7b3d0a; margin-bottom: 12px; }
    html.aa-dark .setup-card h3 { color: #d4a060 !important; }

    .class-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .class-btn {
      background: rgba(255,255,255,0.7);
      border: 2px solid rgba(139,90,40,0.15);
      border-radius: 12px; padding: 12px 8px;
      color: #5a2e08; cursor: pointer; text-align: center;
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      transition: all 0.15s;
    }
    html.aa-dark .class-btn { background: rgba(60,35,10,0.7) !important; color: #d4b080 !important; border-color: rgba(160,100,40,0.2) !important; }
    .class-btn:hover { border-color: #a05a1a; background: rgba(255,225,170,0.5); }
    .class-btn.selected { border-color: #d4900a; background: rgba(255,205,80,0.3); font-weight: 700; }
    html.aa-dark .class-btn.selected { background: rgba(180,120,20,0.3) !important; border-color: #d4900a !important; }
    .class-icon  { font-size: 1.6rem; }
    .class-name  { font-size: 0.8rem; font-weight: 700; }
    .class-count { font-size: 0.7rem; opacity: 0.6; }

    .btn-start {
      width: 100%; padding: 16px;
      background: linear-gradient(to bottom, #6ab82a, #4a8a1a);
      border: none; border-radius: 14px; color: #fff;
      font-family: 'Fredoka One', cursive; font-size: 1.2rem; cursor: pointer;
      box-shadow: 0 4px 0 #2a6010, 0 6px 12px rgba(0,0,0,0.3);
      text-shadow: 0 1px 3px rgba(0,0,0,0.3);
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn-start:hover:not(:disabled) { opacity: 0.9; }
    .btn-start:active { transform: translateY(2px); box-shadow: 0 2px 0 #2a6010; }
    .btn-start:disabled { background: linear-gradient(to bottom, #8a8a6a, #6a6a4a); box-shadow: none; cursor: default; }

    /* ══════════════════════════════
       VILLAGE SCREEN — HUD
    ══════════════════════════════ */
    .village-hud {
      background: rgba(30,15,3,0.90);
      display: flex; align-items: center; justify-content: space-between;
      padding: 6px 12px; gap: 8px; flex-shrink: 0; z-index: 10;
    }
    html.aa-dark .village-hud { background: rgba(8,3,0,0.95) !important; }
    .hud-class {
      font-size: 0.78rem; color: #ffe4b5; font-weight: 700;
      flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .hud-coins { font-family: 'Fredoka One', cursive; font-size: 1rem; color: #f0d060; white-space: nowrap; }
    .btn-build {
      background: linear-gradient(to bottom, #e8a820, #c07810);
      border: none; border-radius: 8px; padding: 5px 10px;
      color: #fff; font-family: 'Fredoka One', cursive; font-size: 0.82rem;
      cursor: pointer; box-shadow: 0 2px 0 #8a5008; white-space: nowrap;
    }
    .btn-build:active { transform: translateY(1px); box-shadow: none; }
    .btn-build.build-on { background: linear-gradient(to bottom, #e84040, #c02020); box-shadow: 0 2px 0 #801010; }
    .btn-exit-village {
      background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.22);
      border-radius: 6px; padding: 4px 8px; color: #ffe4b5; font-size: 0.72rem; cursor: pointer;
    }

    /* ══════════════════════════════
       VILLAGE MAP
    ══════════════════════════════ */
    .village-map-wrap {
      flex: 1; display: flex; align-items: center; justify-content: center;
      overflow: hidden; padding: 6px;
    }
    .village-map {
      display: grid; grid-template-columns: repeat(7, 1fr);
      gap: 2px; background: #1a4a08;
      border-radius: 10px; overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
      width: 100%; max-width: 370px;
    }
    .map-tile {
      aspect-ratio: 1;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.35rem; line-height: 1;
      user-select: none; position: relative;
      transition: filter 0.12s;
    }
    .tile-tree    { background: #2d6a12; }
    .tile-path    { background: #c09852; }
    .tile-water   { background: #3a8fd4; }
    .tile-flower  { background: #6db84a; }
    .tile-buildable { background: #559040; }
    .tile-buildable.empty.bmode { cursor: pointer; background: #65a050; }
    .tile-buildable.empty.bmode:hover { filter: brightness(1.2); }
    .tile-buildable.has-building.bmode { cursor: default; }
    .tile-buildable.glow { animation: tile-glow 1.1s ease-in-out infinite; }
    @keyframes tile-glow {
      0%,100% { filter: brightness(1); }
      50%      { filter: brightness(1.35) drop-shadow(0 0 6px rgba(240,208,96,0.9)); }
    }

    /* ══════════════════════════════
       QUIZ PANEL
    ══════════════════════════════ */
    .quiz-panel {
      background: rgba(255,248,210,0.97);
      border-top: 3px solid rgba(139,90,40,0.22);
      padding: 10px 12px 8px; flex-shrink: 0;
      overflow-y: auto; max-height: 52vh;
    }
    html.aa-dark .quiz-panel { background: rgba(22,12,3,0.97) !important; border-top-color: rgba(160,100,40,0.28) !important; }

    .q-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 7px; }
    .q-label { font-size: 0.72rem; font-weight: 700; color: #7b4a1a; text-transform: uppercase; letter-spacing: 0.04em; }
    html.aa-dark .q-label { color: #c09060 !important; }
    .streak-badge { font-size: 0.72rem; background: #d4a020; color: #fff; border-radius: 8px; padding: 2px 7px; font-weight: 700; display: none; }
    .streak-badge.visible { display: inline-block; }
    .mode-pills { display: flex; gap: 4px; }
    .mode-pill {
      padding: 3px 9px; border-radius: 9px;
      border: 1px solid rgba(139,90,40,0.22);
      background: rgba(255,248,220,0.6);
      font-size: 0.72rem; cursor: pointer; color: #5a3010;
    }
    html.aa-dark .mode-pill { background: rgba(50,28,8,0.6) !important; color: #c09060 !important; }
    .mode-pill.active { background: #d4900a; border-color: #d4900a; color: #fff; }

    .q-text { font-size: 0.95rem; font-weight: 700; color: #2d1508; line-height: 1.4; margin-bottom: 3px; }
    html.aa-dark .q-text { color: #e8d0b0 !important; }
    .q-from { font-size: 0.7rem; color: #9a6a3a; font-style: italic; margin-bottom: 10px; }

    .mc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; margin-bottom: 8px; }
    .mc-btn {
      background: rgba(255,248,220,0.9); border: 2px solid rgba(139,90,40,0.18);
      border-radius: 9px; padding: 9px 7px; color: #3a2008;
      font-size: 0.84rem; font-family: 'Nunito', sans-serif;
      cursor: pointer; text-align: center; min-height: 48px;
      transition: all 0.12s;
    }
    html.aa-dark .mc-btn { background: rgba(50,28,8,0.88) !important; color: #d4b080 !important; border-color: rgba(160,100,40,0.2) !important; }
    .mc-btn:hover:not(:disabled) { border-color: #a05a1a; background: rgba(255,235,180,0.95); }
    .mc-btn.correct { background: #27ae60; border-color: #5ddb8a; border-width: 3px; color: #fff; font-weight: 700; box-shadow: 0 0 14px rgba(93,219,138,0.5); transform: scale(1.03); }
    .mc-btn.wrong   { background: #f0d0d0; border-color: #c08080; color: #906060; text-decoration: line-through; opacity: 0.5; }
    html.aa-dark .mc-btn.wrong { background: rgba(80,20,20,0.7) !important; }
    .mc-btn:disabled { cursor: default; }

    .type-row { display: flex; gap: 8px; margin-bottom: 8px; }
    .type-input {
      flex: 1; padding: 10px;
      background: rgba(255,248,220,0.9); border: 2px solid rgba(139,90,40,0.18);
      border-radius: 9px; color: #2d1508; font-size: 0.95rem; font-family: 'Nunito', sans-serif;
    }
    html.aa-dark .type-input { background: rgba(40,25,10,0.88) !important; color: #d4b080 !important; border-color: rgba(160,100,40,0.22) !important; }
    .type-input:focus { outline: none; border-color: #a05a1a; }
    .type-input.correct { border-color: #27ae60; background: rgba(39,174,96,0.12); }
    .type-input.wrong   { border-color: #c05050; background: rgba(192,80,80,0.1); }
    .btn-submit {
      padding: 10px 16px; background: linear-gradient(to bottom, #5a9e2a, #3a7e0a);
      border: none; border-radius: 9px; color: #fff; font-size: 0.95rem; font-weight: 700;
      cursor: pointer; box-shadow: 0 2px 0 #1a5005;
    }
    .btn-submit:hover { opacity: 0.9; }
    .btn-submit:disabled { background: #8a8a6a; box-shadow: none; cursor: default; }

    .feedback-msg {
      font-size: 0.85rem; font-weight: 700; line-height: 1.5;
      min-height: 36px; padding: 6px 10px; border-radius: 8px; margin-bottom: 7px;
      color: #2d1508;
    }
    .feedback-msg:empty { padding: 0; min-height: 0; }
    html.aa-dark .feedback-msg { color: #e8d0b0 !important; }
    .feedback-msg.good { color: #1a7a3a; background: rgba(39,174,96,0.13); }
    html.aa-dark .feedback-msg.good { color: #5ddb8a !important; background: rgba(20,60,30,0.6) !important; }
    .feedback-msg.bad  { color: #8a1a1a; background: rgba(192,80,80,0.1); }
    html.aa-dark .feedback-msg.bad  { color: #e94560 !important; background: rgba(60,10,10,0.6) !important; }

    .btn-next {
      display: block; width: 100%; padding: 12px;
      background: linear-gradient(to bottom, #6ab82a, #4a9a0a);
      border: none; border-radius: 10px; color: #fff;
      font-family: 'Fredoka One', cursive; font-size: 1rem; cursor: pointer;
      box-shadow: 0 3px 0 #2a6010; margin-bottom: 6px;
      text-shadow: 0 1px 2px rgba(0,0,0,0.25);
    }
    .btn-next:hover { opacity: 0.9; }

    /* ══════════════════════════════
       BUILD OVERLAY
    ══════════════════════════════ */
    .build-overlay {
      display: none; position: fixed; bottom: 0; left: 0; right: 0;
      background: rgba(255,248,210,0.98); border-top: 3px solid #d4900a;
      padding: 12px; z-index: 100;
      box-shadow: 0 -4px 20px rgba(0,0,0,0.3);
      max-height: 55vh; overflow-y: auto;
    }
    html.aa-dark .build-overlay { background: rgba(22,12,3,0.98) !important; }
    .build-overlay.visible { display: block; }
    .build-overlay-title { font-family: 'Fredoka One', cursive; font-size: 1rem; color: #7b3d0a; margin-bottom: 10px; }
    html.aa-dark .build-overlay-title { color: #d4a060 !important; }
    .build-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 8px; margin-bottom: 10px; }
    .build-option {
      background: rgba(255,255,255,0.72); border: 2px solid rgba(139,90,40,0.18);
      border-radius: 10px; padding: 10px 6px; text-align: center; cursor: pointer;
      transition: all 0.14s;
      display: flex; flex-direction: column; align-items: center; gap: 3px;
    }
    html.aa-dark .build-option { background: rgba(60,35,10,0.72) !important; border-color: rgba(160,100,40,0.2) !important; }
    .build-option:hover:not([disabled]) { border-color: #d4900a; background: rgba(255,220,150,0.4); }
    .build-option.selected { border-color: #d4900a; border-width: 3px; background: rgba(255,210,100,0.28); }
    .build-option[disabled] { opacity: 0.38; cursor: default; }
    .build-emoji { font-size: 1.8rem; }
    .build-name  { font-size: 0.78rem; font-weight: 700; color: #5a2e08; }
    html.aa-dark .build-name { color: #d4b080 !important; }
    .build-cost  { font-size: 0.72rem; color: #9a6a3a; }
    html.aa-dark .build-cost { color: #b08050 !important; }
    .build-tip {
      font-size: 0.78rem; color: #7b4a1a; text-align: center;
      margin-bottom: 8px; font-style: italic;
    }
    html.aa-dark .build-tip { color: #b08050 !important; }
    .btn-done-building {
      width: 100%; padding: 10px;
      background: rgba(200,60,60,0.12); border: 1px solid rgba(200,60,60,0.28);
      border-radius: 10px; color: #8a2020;
      font-family: 'Fredoka One', cursive; font-size: 0.9rem; cursor: pointer;
    }
    html.aa-dark .btn-done-building { color: #e06060 !important; background: rgba(80,20,20,0.22) !important; }

    /* ── Coin float animation ── */
    .coin-float {
      position: fixed; pointer-events: none;
      font-size: 1.1rem; font-weight: 700; color: #f0c820;
      text-shadow: 0 1px 4px rgba(0,0,0,0.5);
      animation: coin-rise 1.2s ease-out forwards; z-index: 200;
    }
    @keyframes coin-rise {
      0%   { opacity: 1; transform: translateY(0); }
      100% { opacity: 0; transform: translateY(-55px); }
    }

    @media (max-width: 380px) {
      .map-tile { font-size: 1.05rem; }
      .mc-grid  { grid-template-columns: 1fr; }
      .build-grid { grid-template-columns: 1fr 1fr 1fr; }
    }
    @media (min-height: 720px) {
      .village-map-wrap { padding: 10px; }
    }
  </style>
</head>
<body>
  <div id="shared-header-root"></div>

  <!-- Loading -->
  <div class="screen active" id="screen-loading">
    <p style="text-align:center;padding-top:60px;color:#ffe4b5;text-shadow:0 1px 4px rgba(0,0,0,0.5);">Loading your village...</p>
  </div>

  <!-- Setup -->
  <div class="screen" id="screen-setup">
    <div class="setup-wrap">
      <h1 class="farm-title">🏡 Farm Mode</h1>
      <p class="farm-subtitle">Answer questions — earn coins — build your village.</p>
      <p class="farm-credit">Inspired by <a href="https://play.google.com/store/apps/details?id=com.hyperthought.lingolegend" target="_blank" rel="noopener">Lingo Legend</a></p>

      <div class="setup-card">
        <h3>📚 What class are you studying?</h3>
        <div class="class-grid" id="class-grid" role="group" aria-label="Pick a class"></div>
      </div>

      <div class="setup-card">
        <h3>✏️ Answer Style</h3>
        <div class="class-grid">
          <button class="class-btn selected" id="mode-mc" onclick="selectMode('mc')" aria-pressed="true">
            <span class="class-icon">👆</span>
            <span class="class-name">Multiple Choice</span>
            <span class="class-count">Easier on rough days</span>
          </button>
          <button class="class-btn" id="mode-type" onclick="selectMode('type')" aria-pressed="false">
            <span class="class-icon">✏️</span>
            <span class="class-name">Type It In</span>
            <span class="class-count">Write the answer yourself</span>
          </button>
        </div>
      </div>

      <div id="saved-coins-note" style="display:none;text-align:center;font-size:0.8rem;color:#ffe4b5;margin-bottom:10px;text-shadow:0 1px 3px rgba(0,0,0,0.4);"></div>

      <button class="btn-start" id="btn-start" onclick="enterVillage()" disabled aria-disabled="true">
        Pick a class to start!
      </button>
    </div>
  </div>

  <!-- Village -->
  <div class="screen" id="screen-village">
    <!-- HUD -->
    <div class="village-hud">
      <span class="hud-class" id="hud-class"></span>
      <span class="hud-coins" aria-live="polite" aria-label="Coins">🪙 <span id="coin-count">0</span></span>
      <button class="btn-build" id="btn-build" onclick="toggleBuildMode()" aria-pressed="false">🏗️ Build</button>
      <button class="btn-exit-village" onclick="exitVillage()" aria-label="Save and exit">💾 Exit</button>
    </div>

    <!-- Map -->
    <div class="village-map-wrap" role="region" aria-label="Village map">
      <div class="village-map" id="village-map" aria-hidden="true"></div>
    </div>

    <!-- Quiz panel -->
    <div class="quiz-panel" id="quiz-panel">
      <div class="q-header">
        <span class="q-label">❓ <span id="q-cat">Question</span></span>
        <span class="streak-badge" id="streak-badge" aria-live="polite"></span>
        <div class="mode-pills">
          <button class="mode-pill active" id="pill-mc"   onclick="setMode('mc')"   aria-pressed="true">👆 MC</button>
          <button class="mode-pill"        id="pill-type" onclick="setMode('type')" aria-pressed="false">✏️ Type</button>
        </div>
      </div>

      <div class="q-text" id="q-text" aria-live="polite" aria-atomic="true"></div>
      <div class="q-from" id="q-from"></div>

      <!-- MC -->
      <div id="mc-section">
        <div class="mc-grid" id="mc-grid" role="group" aria-label="Answer choices"></div>
      </div>

      <!-- Type-in -->
      <div id="type-section" style="display:none">
        <div class="type-row">
          <input class="type-input" id="type-input" type="text" placeholder="Type your answer..."
                 autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
                 aria-label="Your answer">
          <button class="btn-submit" id="btn-submit" onclick="submitTyped()">Go</button>
        </div>
      </div>

      <div class="feedback-msg" id="feedback-msg" role="alert" aria-live="assertive"></div>
      <button class="btn-next" id="btn-next" style="display:none" onclick="nextQuestion()">Next ▶</button>
    </div>
  </div>

  <!-- Build overlay -->
  <div class="build-overlay" id="build-overlay" role="dialog" aria-label="Build menu" aria-modal="true">
    <div class="build-overlay-title">🏗️ What do you want to build?</div>
    <div class="build-grid" id="build-grid"></div>
    <div class="build-tip" id="build-tip">Pick a building, then tap an empty plot on the map.</div>
    <button class="btn-done-building" onclick="cancelBuildMode()">✕ Done Building</button>
  </div>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script src="/Academic-Allies/modular/aa-firebase.js"></script>

  <script>
    /* Claude: 2026-04-20 — Farm Mode village builder.
       Top-down emoji grid map. Answer questions → earn coins → place buildings.
       Persistent Firestore state: farmVillage/{uid}
       COMM 130 + HORT 235 + all existing classes. */

    /* Dark mode */
    try { if (localStorage.getItem('AA_DARK_MODE') === 'true') document.documentElement.classList.add('aa-dark'); } catch(e) {}

    /* ── Map layout (7 cols × 9 rows = 63 tiles) ──────────────── */
    /* Claude: 2026-04-20 — T=tree border, P=path, W=water, F=flower, B=buildable plot */
    var MAP_TILES = [
      'T','T','T','T','T','T','T',
      'T','B','B','P','B','B','T',
      'T','B','B','P','B','B','T',
      'T','T','P','P','P','T','T',
      'T','B','P','P','P','B','T',
      'T','B','B','P','B','B','T',
      'T','W','W','P','F','F','T',
      'T','W','W','P','F','F','T',
      'T','T','T','T','T','T','T'
    ];
    var TILE_INFO = {
      'T': { cls: 'tile-tree',      emoji: '🌲', label: 'Tree'       },
      'P': { cls: 'tile-path',      emoji: '',   label: 'Path'       },
      'W': { cls: 'tile-water',     emoji: '💧', label: 'Pond'       },
      'F': { cls: 'tile-flower',    emoji: '🌸', label: 'Flower bed' },
      'B': { cls: 'tile-buildable', emoji: '',   label: 'Empty plot' }
    };

    /* ── Buildings ────────────────────────────────────────────── */
    var BUILDINGS = [
      { id: 'campfire',  emoji: '🔥', name: 'Campfire',       cost: 10  },
      { id: 'tent',      emoji: '⛺', name: 'Tent',            cost: 20  },
      { id: 'house',     emoji: '🏡', name: 'House',           cost: 35  },
      { id: 'sunflower', emoji: '🌻', name: 'Sunflower Field', cost: 50  },
      { id: 'workshop',  emoji: '⚙️', name: 'Workshop',        cost: 75  },
      { id: 'market',    emoji: '🏪', name: 'Market',          cost: 100 },
      { id: 'tower',     emoji: '🗼', name: 'Tower',           cost: 150 },
      { id: 'castle',    emoji: '🏰', name: 'Castle',          cost: 250 }
    ];

    /* ── Class emoji map ──────────────────────────────────────── */
    /* Claude: 2026-04-19 — HORT 235; Claude: 2026-04-20 — COMM 130 */
    var CLASS_EMOJI = {
      "HORT 235":  "🌾", "HORT 328":  "🌸", "HORT 287R": "💐",
      "HORT":      "🌼", "FCS 207":   "🧵", "FCS 101":   "🏠",
      "FCS":       "🏡", "IDS 101":   "📚", "IDS":       "📖",
      "Cooking":   "🍳", "COMM 130":  "🎤", "RBT":       "🧠",
      "General":   "🌻"
    };

    /* Claude: 2026-04-19 — HORT 235 before generic HORT; Claude: 2026-04-20 — COMM 130 */
    function getClassKey(title) {
      var t = title.toUpperCase();
      if (t.indexOf("HORT 287") !== -1 || t.indexOf("HORT287") !== -1) return "HORT 287R";
      if (t.indexOf("HORT 328") !== -1 || t.indexOf("HORT328") !== -1) return "HORT 328";
      if (t.indexOf("HORT 235") !== -1 || t.indexOf("HORT235") !== -1) return "HORT 235";
      if (t.indexOf("HORT")     !== -1)                                  return "HORT";
      if (t.indexOf("FCS 207")  !== -1 || t.indexOf("FCS207")  !== -1) return "FCS 207";
      if (t.indexOf("FCS 101")  !== -1 || t.indexOf("FCS101")  !== -1) return "FCS 101";
      if (t.indexOf("FCS")      !== -1)                                  return "FCS";
      if (t.indexOf("IDS 101")  !== -1 || t.indexOf("IDS101")  !== -1) return "IDS 101";
      if (t.indexOf("IDS")      !== -1)                                  return "IDS";
      if (t.indexOf("COOK")     !== -1 || t.indexOf("CULIN")   !== -1) return "Cooking";
      if (t.indexOf("COMM 130") !== -1 || t.indexOf("COMM130") !== -1) return "COMM 130";
      if (t.indexOf("RBT")      !== -1)                                  return "RBT";
      return "General";
    }

    /* ── State ────────────────────────────────────────────────── */
    var allQuestions     = [];
    var questionDeck     = [];
    var classMeta        = {};
    var selectedClass    = null;
    var selectedMode     = "mc";
    var coins            = 0;
    var villageBuildings = {};   // { "tileIndex": buildingId }
    var currentQ         = null;
    var answerLocked     = false;
    var streak           = 0;
    var maxStreak        = 0;
    var correctCount     = 0;
    var wrongCount       = 0;
    var buildModeOn      = false;
    var selectedBuilding = null;
    var currentUserUid   = null;

    /* ── Utilities ────────────────────────────────────────────── */
    function shuffle(arr) {
      var a = arr.slice();
      for (var i = a.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        var t = a[i]; a[i] = a[j]; a[j] = t;
      }
      return a;
    }
    function fuzzyMatch(typed, correct) {
      var a = typed.toLowerCase().replace(/[^a-z0-9]/g,"");
      var b = correct.toLowerCase().replace(/[^a-z0-9]/g,"");
      return a === b || b.indexOf(a) === 0;
    }
    function escHtml(s) {
      return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    }
    function getBuildingById(id) {
      for (var i = 0; i < BUILDINGS.length; i++) {
        if (BUILDINGS[i].id === id) return BUILDINGS[i];
      }
      return null;
    }

    /* ── Boot ─────────────────────────────────────────────────── */
    function waitForAA(cb, tries) {
      tries = tries || 0;
      if (window.AA && window.AA.db) { cb(); return; }
      if (tries > 30) { cb(); return; }
      setTimeout(function() { waitForAA(cb, tries + 1); }, 100);
    }

    firebase.auth().onAuthStateChanged(function(user) {
      if (!user) {
        showScreen("loading");
        document.getElementById("screen-loading").innerHTML =
          '<p style="text-align:center;padding-top:60px;color:#ffe4b5;">Please sign in to play Farm Mode.</p>';
        return;
      }
      /* Claude: 2026-04-24 — moved AA_uid() call inside waitForAA (same race fix as battle-mode) */
      waitForAA(function() {
        currentUserUid = window.AA_uid ? window.AA_uid(user.uid) : user.uid;
        loadData(currentUserUid);
      });
    });

    function loadData(uid) {
      Promise.all([
        firebase.firestore().doc("studentConfig/" + uid).get(),
        firebase.firestore().doc("farmVillage/" + uid).get()
      ]).then(function(results) {
        var configSnap  = results[0];
        var villageSnap = results[1];

        /* Load quizzes */
        if (configSnap.exists) {
          var quizzes = configSnap.data().quizzes || [];
          allQuestions = [];
          classMeta    = {};
          quizzes.forEach(function(quiz) {
            /* Claude: 2026-04-24 — fixed type check: was "flashcards" (plural), quizzes use "flashcard" */
            if (quiz.type !== "flashcard" && quiz.type !== "flashcards") return;
            if (!quiz.data || !quiz.data.length) return;
            var classKey = getClassKey(quiz.title || "");
            if (!classMeta[classKey]) classMeta[classKey] = { label: classKey, count: 0 };
            quiz.data.forEach(function(item) {
              var def = item.definition || item.answer;
              if (!item.term || !def) return;
              allQuestions.push({ question: def, answer: item.term, quizTitle: quiz.title || classKey, classKey: classKey });
              classMeta[classKey].count++;
            });
          });
        }

        /* Load village state */
        if (villageSnap.exists) {
          var vdata    = villageSnap.data();
          coins            = vdata.coins    || 0;
          villageBuildings = vdata.buildings || {};
        }

        if (allQuestions.length === 0) {
          showError("No flashcard quizzes found. Ask your network lead to add study material.");
          return;
        }
        buildClassGrid();
        if (coins > 0) {
          var note = document.getElementById("saved-coins-note");
          note.textContent = "🪙 You have " + coins + " saved coins — your village is waiting!";
          note.style.display = "";
        }
        showScreen("setup");
      }).catch(function(err) {
        showError("Couldn't load data: " + err.message);
      });
    }

    /* ── Setup UI ─────────────────────────────────────────────── */
    function buildClassGrid() {
      var grid = document.getElementById("class-grid");
      grid.innerHTML = "";
      Object.keys(classMeta).forEach(function(key) {
        var emoji = CLASS_EMOJI[key] || "📚";
        var btn   = document.createElement("button");
        btn.className = "class-btn";
        btn.setAttribute("aria-pressed", "false");
        btn.innerHTML =
          '<span class="class-icon">' + emoji + '</span>' +
          '<span class="class-name">' + escHtml(key) + '</span>' +
          '<span class="class-count">' + classMeta[key].count + ' questions</span>';
        btn.onclick = (function(k) { return function() { selectClass(k); }; })(key);
        grid.appendChild(btn);
      });
      if (Object.keys(classMeta).length > 1) {
        var btn = document.createElement("button");
        btn.className = "class-btn";
        btn.setAttribute("aria-pressed", "false");
        btn.innerHTML =
          '<span class="class-icon">🌾</span>' +
          '<span class="class-name">All Classes</span>' +
          '<span class="class-count">' + allQuestions.length + ' questions</span>';
        btn.onclick = function() { selectClass("ALL"); };
        grid.appendChild(btn);
      }
    }

    function selectClass(key) {
      selectedClass = key;
      document.querySelectorAll("#class-grid .class-btn").forEach(function(b) {
        var nm    = b.querySelector(".class-name").textContent;
        var match = (key === "ALL") ? (nm === "All Classes") : (nm === key);
        b.classList.toggle("selected", match);
        b.setAttribute("aria-pressed", match ? "true" : "false");
      });
      var btn = document.getElementById("btn-start");
      btn.disabled = false;
      btn.setAttribute("aria-disabled", "false");
      btn.textContent = "Enter Village!";
    }

    function selectMode(mode) {
      selectedMode = mode;
      document.getElementById("mode-mc").classList.toggle("selected",   mode === "mc");
      document.getElementById("mode-type").classList.toggle("selected", mode === "type");
      document.getElementById("mode-mc").setAttribute("aria-pressed",   mode === "mc"   ? "true" : "false");
      document.getElementById("mode-type").setAttribute("aria-pressed", mode === "type" ? "true" : "false");
    }

    function setMode(mode) {
      selectedMode = mode;
      document.getElementById("pill-mc").classList.toggle("active",   mode === "mc");
      document.getElementById("pill-type").classList.toggle("active", mode === "type");
      document.getElementById("pill-mc").setAttribute("aria-pressed",   mode === "mc"   ? "true" : "false");
      document.getElementById("pill-type").setAttribute("aria-pressed", mode === "type" ? "true" : "false");
      if (currentQ && !answerLocked) renderQuestion(currentQ);
    }

    /* ── Village entry / exit ─────────────────────────────────── */
    function enterVillage() {
      if (!selectedClass) return;
      var pool = selectedClass === "ALL"
        ? allQuestions.slice()
        : allQuestions.filter(function(q) { return q.classKey === selectedClass; });
      questionDeck     = shuffle(pool);
      streak           = 0; maxStreak = 0;
      correctCount     = 0; wrongCount = 0;
      answerLocked     = false; buildModeOn = false; selectedBuilding = null;

      document.getElementById("hud-class").textContent =
        (CLASS_EMOJI[selectedClass] || "📚") + " " + (selectedClass === "ALL" ? "All Classes" : selectedClass);
      document.getElementById("coin-count").textContent = coins;
      document.getElementById("pill-mc").classList.toggle("active",   selectedMode === "mc");
      document.getElementById("pill-type").classList.toggle("active", selectedMode === "type");

      renderMap();
      showScreen("village");
      drawNextQuestion();
    }

    function exitVillage() {
      saveVillage();
      cancelBuildMode();
      showScreen("setup");
      /* Refresh coins note */
      var note = document.getElementById("saved-coins-note");
      note.textContent = "🪙 You have " + coins + " saved coins — your village is waiting!";
      note.style.display = coins > 0 ? "" : "none";
    }

    /* ── Firestore save ───────────────────────────────────────── */
    function saveVillage() {
      if (!currentUserUid) return;
      firebase.firestore().doc("farmVillage/" + currentUserUid).set({
        coins:      coins,
        buildings:  villageBuildings,
        lastPlayed: firebase.firestore.Timestamp.now()
      }, { merge: true }).catch(function(err) {
        console.warn("[FarmMode] Save failed:", err.message);
      });
    }

    /* ── Map rendering ────────────────────────────────────────── */
    function renderMap() {
      var mapEl = document.getElementById("village-map");
      mapEl.innerHTML = "";
      MAP_TILES.forEach(function(type, idx) {
        var info = TILE_INFO[type];
        var tile = document.createElement("div");
        tile.className = "map-tile " + info.cls;
        tile.setAttribute("data-tile-index", idx);
        tile.setAttribute("data-tile-type",  type);
        tile.setAttribute("aria-label", info.label);

        if (type === "B") {
          var bldId = String(idx);
          if (villageBuildings[bldId]) {
            var bld = getBuildingById(villageBuildings[bldId]);
            tile.textContent = bld ? bld.emoji : "?";
            tile.classList.add("has-building");
          } else {
            tile.textContent = "";
            tile.classList.add("empty");
            tile.setAttribute("role", "button");
          }
          tile.onclick = (function(i) { return function() { onTileClick(i); }; })(idx);
        } else {
          tile.textContent = info.emoji;
        }
        mapEl.appendChild(tile);
      });
    }

    function applyBuildModeStyles() {
      document.querySelectorAll(".tile-buildable").forEach(function(el) { el.classList.add("bmode"); });
      document.querySelectorAll(".tile-buildable.empty").forEach(function(el) { el.classList.add("glow"); });
    }
    function removeBuildModeStyles() {
      document.querySelectorAll(".tile-buildable").forEach(function(el) { el.classList.remove("bmode","glow"); });
    }

    /* ── Build mode ───────────────────────────────────────────── */
    function toggleBuildMode() {
      if (buildModeOn) { cancelBuildMode(); return; }
      buildModeOn = true; selectedBuilding = null;
      document.getElementById("btn-build").classList.add("build-on");
      document.getElementById("btn-build").setAttribute("aria-pressed", "true");
      applyBuildModeStyles();
      renderBuildMenu();
      document.getElementById("build-overlay").classList.add("visible");
    }

    function cancelBuildMode() {
      buildModeOn = false; selectedBuilding = null;
      document.getElementById("btn-build").classList.remove("build-on");
      document.getElementById("btn-build").setAttribute("aria-pressed", "false");
      removeBuildModeStyles();
      document.getElementById("build-overlay").classList.remove("visible");
    }

    function renderBuildMenu() {
      var grid = document.getElementById("build-grid");
      grid.innerHTML = "";
      BUILDINGS.forEach(function(bld) {
        var btn = document.createElement("button");
        btn.className = "build-option";
        if (coins < bld.cost) btn.setAttribute("disabled", "true");
        btn.innerHTML =
          '<span class="build-emoji">' + bld.emoji + '</span>' +
          '<span class="build-name">'  + escHtml(bld.name) + '</span>' +
          '<span class="build-cost">🪙 ' + bld.cost + '</span>';
        btn.onclick = (function(b) { return function() { selectBuilding(b); }; })(bld);
        grid.appendChild(btn);
      });
    }

    function selectBuilding(bld) {
      if (coins < bld.cost) return;
      selectedBuilding = bld;
      document.querySelectorAll(".build-option").forEach(function(el) { el.classList.remove("selected"); });
      var btns = document.querySelectorAll(".build-option");
      for (var i = 0; i < btns.length; i++) {
        var nm = btns[i].querySelector(".build-name");
        if (nm && nm.textContent === bld.name) { btns[i].classList.add("selected"); break; }
      }
      document.getElementById("build-tip").textContent = "Now tap an empty 🟩 plot on the map to place " + bld.emoji + " " + bld.name + "!";
    }

    function onTileClick(idx) {
      if (!buildModeOn) return;
      if (!selectedBuilding) {
        document.getElementById("build-tip").textContent = "👆 First pick a building from the list above!";
        return;
      }
      var bldId = String(idx);
      if (villageBuildings[bldId]) {
        document.getElementById("build-tip").textContent = "That plot already has a building! Pick an empty 🟩 one.";
        return;
      }
      if (coins < selectedBuilding.cost) {
        document.getElementById("build-tip").textContent = "Not enough coins! Answer more questions to earn more.";
        return;
      }

      /* Place building */
      coins -= selectedBuilding.cost;
      villageBuildings[bldId] = selectedBuilding.id;
      document.getElementById("coin-count").textContent = coins;

      var tile = document.querySelector("[data-tile-index='" + idx + "']");
      if (tile) {
        tile.textContent = selectedBuilding.emoji;
        tile.classList.remove("empty","glow");
        tile.classList.add("has-building");
      }

      document.getElementById("build-tip").textContent = selectedBuilding.emoji + " " + selectedBuilding.name + " placed! 🎉";
      selectedBuilding = null;
      document.querySelectorAll(".build-option").forEach(function(el) { el.classList.remove("selected"); });
      renderBuildMenu();
      saveVillage();
    }

    /* ── Screen control ───────────────────────────────────────── */
    function showScreen(name) {
      document.querySelectorAll(".screen").forEach(function(s) { s.classList.remove("active"); });
      document.getElementById("screen-" + name).classList.add("active");
    }
    function showError(msg) {
      showScreen("loading");
      document.getElementById("screen-loading").innerHTML =
        '<p style="text-align:center;padding-top:60px;color:#e94560;">' + escHtml(msg) + '</p>';
    }

    /* ── Quiz logic ───────────────────────────────────────────── */
    function drawNextQuestion() {
      if (questionDeck.length === 0) {
        var pool = selectedClass === "ALL"
          ? allQuestions.slice()
          : allQuestions.filter(function(q) { return q.classKey === selectedClass; });
        questionDeck = shuffle(pool);
      }
      currentQ     = questionDeck.shift();
      answerLocked = false;

      document.getElementById("btn-next").style.display   = "none";
      document.getElementById("feedback-msg").textContent = "";
      document.getElementById("feedback-msg").className   = "feedback-msg";
      document.getElementById("q-text").textContent       = currentQ.question;
      document.getElementById("q-from").textContent       = currentQ.quizTitle;
      document.getElementById("q-cat").textContent        = currentQ.classKey || "Question";

      var badge = document.getElementById("streak-badge");
      if (streak >= 3) {
        badge.textContent = "🔥 " + streak + " streak!";
        badge.classList.add("visible");
      } else {
        badge.textContent = "";
        badge.classList.remove("visible");
      }
      renderQuestion(currentQ);
    }

    function renderQuestion(q) {
      if (selectedMode === "mc") {
        renderMC(q);
        document.getElementById("mc-section").style.display   = "";
        document.getElementById("type-section").style.display = "none";
      } else {
        var inp = document.getElementById("type-input");
        inp.value = ""; inp.className = "type-input"; inp.disabled = false;
        document.getElementById("btn-submit").disabled = false;
        document.getElementById("mc-section").style.display   = "none";
        document.getElementById("type-section").style.display = "";
        setTimeout(function() { inp.focus(); }, 80);
      }
    }

    function renderMC(q) {
      var others = questionDeck.slice()
        .filter(function(i) { return i.answer !== q.answer; })
        .map(function(i) { return i.answer; });
      others = shuffle(others).slice(0, 3);
      if (others.length < 3) {
        var extra = shuffle(allQuestions.filter(function(i) { return i.answer !== q.answer; }));
        while (others.length < 3 && extra.length) {
          var c = extra.shift().answer;
          if (others.indexOf(c) === -1) others.push(c);
        }
      }
      var choices = shuffle([q.answer].concat(others.slice(0,3)));
      var grid = document.getElementById("mc-grid");
      grid.innerHTML = "";
      choices.forEach(function(choice) {
        var btn = document.createElement("button");
        btn.className   = "mc-btn";
        btn.textContent = choice;
        btn.setAttribute("aria-label", "Answer: " + choice);
        btn.onclick = function() { handleMC(choice, q.answer, btn); };
        grid.appendChild(btn);
      });
    }

    function handleMC(chosen, correct, btn) {
      if (answerLocked) return;
      answerLocked = true;
      document.querySelectorAll(".mc-btn").forEach(function(b) { b.disabled = true; });
      if (chosen === correct) {
        btn.classList.add("correct");
        onCorrect();
      } else {
        btn.classList.add("wrong");
        document.querySelectorAll(".mc-btn").forEach(function(b) {
          if (b.textContent === correct) { b.classList.add("correct"); b.textContent = "✅ " + correct; }
        });
        onWrong(correct);
      }
    }

    function submitTyped() {
      var inp   = document.getElementById("type-input");
      var typed = inp.value.trim();
      if (!typed || answerLocked || !currentQ) return;
      answerLocked = true;
      inp.disabled = true;
      document.getElementById("btn-submit").disabled = true;
      if (fuzzyMatch(typed, currentQ.answer)) {
        inp.classList.add("correct"); onCorrect();
      } else {
        inp.classList.add("wrong"); onWrong(currentQ.answer);
      }
    }

    function onCorrect() {
      streak++;
      if (streak > maxStreak) maxStreak = streak;
      correctCount++;
      var bonus  = streak >= 6 ? 3 : streak >= 3 ? 1 : 0;
      var earned = 5 + bonus;
      coins += earned;
      document.getElementById("coin-count").textContent = coins;
      var bonusMsg = bonus > 0 ? " 🔥 +" + bonus + " bonus!" : "";
      setFeedback("✅ Correct! +🪙" + earned + " coins!" + bonusMsg, "good");
      floatCoins(earned);
      setTimeout(function() { document.getElementById("btn-next").style.display = ""; }, 500);
      if (correctCount % 5 === 0) saveVillage();
    }

    function onWrong(correct) {
      streak = 0; wrongCount++;
      var el = document.getElementById("feedback-msg");
      el.className = "feedback-msg bad";
      el.innerHTML = '❌ Wrong! &nbsp; ✅ <strong style="color:#1a7a3a;font-size:1.05em">' + escHtml(correct) + '</strong>';
      setTimeout(function() { document.getElementById("btn-next").style.display = ""; }, 600);
    }

    function nextQuestion() {
      document.getElementById("btn-next").style.display = "none";
      drawNextQuestion();
    }

    function setFeedback(msg, type) {
      var el = document.getElementById("feedback-msg");
      el.innerHTML  = msg;
      el.className  = "feedback-msg " + (type || "");
    }

    /* ── Coin float animation ─────────────────────────────────── */
    function floatCoins(amount) {
      var el    = document.createElement("span");
      el.className   = "coin-float";
      el.textContent = "+🪙" + amount;
      var ref  = document.getElementById("coin-count");
      var rect = ref.getBoundingClientRect();
      el.style.left = (rect.left + rect.width / 2 - 20) + "px";
      el.style.top  = rect.top + "px";
      document.body.appendChild(el);
      setTimeout(function() { if (el.parentNode) el.parentNode.removeChild(el); }, 1300);
    }

    /* ── Shared header ────────────────────────────────────────── */
    if (document.getElementById("shared-header-root")) {
      fetch("/Academic-Allies/modular/shared-header.html?v=20260402")
        .then(function(r) { return r.text(); })
        .then(function(html) {
          var c = document.getElementById("shared-header-root");
          c.innerHTML = html;
          var scripts = c.querySelectorAll("script");
          [].slice.call(scripts).forEach(function(old) {
            var n = document.createElement("script");
            [].slice.call(old.attributes).forEach(function(a) { n.setAttribute(a.name, a.value); });
            n.textContent = old.textContent;
            old.parentNode.replaceChild(n, old);
          });
        }).catch(function() {});
    }
  </script>
</body>
