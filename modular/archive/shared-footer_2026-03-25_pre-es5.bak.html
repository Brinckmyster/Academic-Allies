#aa-quickcheckin-overlay {

  background: rgba(0, 0, 0, 0.4);

#aa-quickcheckin-overlay.show {

#aa-quickcheckin-panel {

  overflow-y: auto;

html.aa-dark #aa-quickcheckin-panel {

}

.aa-quickcheckin-emoji-btn.sel-y {

}

html.aa-dark .aa-quickcheckin-emoji-btn.sel-y {

.aa-quickcheckin-emoji-btn.sel-o {

#aa-quickcheckin-status {

</style>

<!-- Site footer (links) — only injected if page doesn't already have one -->
<script>
(function() {
  /* Claude: 2026-03-12 — add body padding so fixed credit bar doesn't overlap content.
     Archive: shared-footer_2026-03-12_pre-overlap-fix.bak.html
     Claude: 2026-03-16 — increased to 60px to accommodate nudge + credit bars */
  document.body.style.paddingBottom = '60px';

  if (document.querySelector('.site-footer') || document.querySelector('footer.site-footer')) return;
  var f = document.createElement('footer');
  f.className = 'site-footer';
  /* Claude: 2026-03-14 — ARIA contentinfo role for screen reader landmark navigation */
  f.setAttribute('role', 'contentinfo');
  f.innerHTML = '<div class="site-footer-inner">'
    + '<a href="/Academic-Allies/modular/static/sitemap.html">Site Map</a>'
    + '<a href="/Academic-Allies/modular/static/docs/TEAM-PROFILES.html">About the Team</a>'
    + '<a href="/Academic-Allies/modular/privacy.html">Privacy Policy</a>'
    + '<span>&copy; 2026 Academic Allies &mdash; Licensed under <a href="/Academic-Allies/LICENSE">MIT</a></span>'
    + '</div>';
  document.body.appendChild(f);
})();
</script>

  <span class="nudge-msg">Haven't checked in yet today — tap here for a quick one!</span>
  <button class="nudge-quick-btn" id="aa-nudge-quick-btn" aria-label="Quick check-in">Quick Check-In</button>
  <a href="/Academic-Allies/modular/checkin.html" class="nudge-full-link" aria-label="Full daily check-in">Full Check-In →</a>

</div>

<script>
/* Claude: 2026-03-16 — Check-in nudge system with quick check-in panel */
(function() {
  var EMOJIS = [
    { e:'😁', lbl:'Fully Charged',      t:'g', v:1  },
    { e:'😊', lbl:'Energized',           t:'g', v:2  },
    { e:'🙂', lbl:'Pretty Good',         t:'g', v:3  },
    { e:'🙂', lbl:'Doing Okay',          t:'g', v:4  },
    { e:'😐', lbl:'Neutral',             t:'y', v:5  },
    { e:'😕', lbl:'Starting to Tire',    t:'o', v:6  },
    { e:'😟', lbl:'Pretty Tired',        t:'o', v:7  },
    { e:'😫', lbl:'Very Exhausted',      t:'r', v:8  },
    { e:'😩', lbl:'Almost Empty',        t:'r', v:9  },
    { e:'☠️', lbl:'Completely Depleted', t:'r', v:10 }
  ];

  var nudgeBanner = document.getElementById('aa-nudge-banner');
  var quickcheckinOverlay = document.getElementById('aa-quickcheckin-overlay');
  var quickcheckinPanel = document.getElementById('aa-quickcheckin-panel');
  var emojisContainer = document.getElementById('aa-quickcheckin-emojis');
  var statusMsg = document.getElementById('aa-quickcheckin-status');
  var quickBtn = document.getElementById('aa-nudge-quick-btn');
  var dismissBtn = document.getElementById('aa-nudge-dismiss');

  function getTodayKey() {
    var now = new Date();
    var y = now.getFullYear();
    var m = String(now.getMonth() + 1).padStart(2, '0');
    var d = String(now.getDate()).padStart(2, '0');
    return 'checkins_' + y + '-' + m + '-' + d;
  }

  function buildEmojiButtons() {
    emojisContainer.innerHTML = '';
    EMOJIS.forEach(function(emoji) {
      var btn = document.createElement('button');
      btn.className = 'aa-quickcheckin-emoji-btn';
      btn.setAttribute('aria-label', emoji.lbl + ', energy level ' + emoji.v);
      btn.innerHTML = '<span class="em">' + emoji.e + '</span>'
        + '<span class="lbl">' + emoji.lbl + '</span>';
      btn.onclick = function() {
        saveQuickCheckin(emoji);
      };
      emojisContainer.appendChild(btn);
    });
  }

  function saveQuickCheckin(emoji) {
    if (window.AA_MIRROR_UID) {
      return;
    }

    statusMsg.textContent = 'Saving...';
    statusMsg.className = 'saving';

    try {
      var todayKey = getTodayKey();
      var checkinsArray = [];
      try {
        var stored = localStorage.getItem(todayKey);
        if (stored) {
          checkinsArray = JSON.parse(stored);
        }
      } catch (e) {}

      /* Claude: 2026-03-16 — map single-letter flag to full word for Firestore compat */
      var FLAG_FULL = { g: 'green', y: 'yellow', o: 'orange', r: 'red' };
      var flag = FLAG_FULL[emoji.t] || 'green';
      var entry = {
        timestamp: new Date().toISOString(),
        bbdMode: false,
        categories: {
          mental: {
            gateway: 'yes',
            checked: [],
            emojiV: emoji.v,
            mood: emoji.lbl,
            note: ''
          }
        },
        basics: [],
        thumping: false,
        emergency: false,
        finalNote: '(Quick check-in)',
        energyLevel: emoji.v,
        mood: emoji.lbl,
        symptoms: false,
        symptomList: [],
        support: false,
        planner: false,
        flag: flag,
        quickCheckin: true
      };

      checkinsArray.push(entry);

      try {
        localStorage.setItem(todayKey, JSON.stringify(checkinsArray));
      } catch (e) {
        console.error('localStorage error:', e);
      }

      /* Claude: 2026-03-16 — strip 'checkins_' prefix for Firestore dateKey (YYYY-MM-DD) */
      if (window.AA && window.AA.auth && window.AA.auth.currentUser && window.AA.saveCheckin) {
        var firestoreDateKey = todayKey.replace('checkins_', '');
        window.AA.saveCheckin(window.AA.auth.currentUser.uid, firestoreDateKey, entry);
      }

      /* Claude: 2026-03-16 — notify supporters on non-green quick check-ins */
      if (flag !== 'green' && window.AA && window.AA.auth && window.AA.auth.currentUser && window.AA.addNotification) {
        var msg = 'Quick check-in logged: ' + emoji.lbl + ' (' + flag + ' flag)';
        window.AA.addNotification(window.AA.auth.currentUser.uid, flag + '_flag', msg);
      }

      statusMsg.textContent = 'Saved! 💛';
      statusMsg.className = 'saved';

      setTimeout(function() {
        hideNudgeAndPanel();
      }, 1000);

    } catch (e) {
      console.error('Quick check-in error:', e);
      statusMsg.textContent = 'Error saving. Try the full check-in.';
      statusMsg.className = '';
    }
  }

  function hideNudgeAndPanel() {
    if (nudgeBanner) nudgeBanner.classList.remove('show');
    if (quickcheckinOverlay) quickcheckinOverlay.classList.remove('show');
    try {
      sessionStorage.setItem('AA_NUDGE_DISMISSED', 'true');
    } catch (e) {}
  }

  function showNudge() {
    if (!nudgeBanner) return;
    if (window.AA_MIRROR_UID) return;
    if (!window.AA || !window.AA.auth || !window.AA.auth.currentUser) return;
    if (location.pathname.indexOf('checkin') !== -1) return;

    try {
      if (sessionStorage.getItem('AA_NUDGE_DISMISSED')) return;
    } catch (e) {}

    var todayKey = getTodayKey();
    try {
      var stored = localStorage.getItem(todayKey);
      if (stored) {
        var checkinsArray = JSON.parse(stored);
        if (checkinsArray && checkinsArray.length > 0) {
          return;
        }
      }
    } catch (e) {}

    nudgeBanner.classList.add('show');
  }

  function checkAndShowNudge() {
    var attempts = 0;
    var maxAttempts = 6;

    var pollInterval = setInterval(function() {
      attempts++;

      if (window.AA && window.AA.auth && window.AA.auth.currentUser) {
        clearInterval(pollInterval);
        setTimeout(showNudge, 3000);
        return;
      }

      if (attempts >= maxAttempts) {
        clearInterval(pollInterval);
      }
    }, 5000);
  }

  if (quickBtn) {
    quickBtn.onclick = function() {
      if (quickcheckinOverlay) {
        quickcheckinOverlay.classList.add('show');
      }
      buildEmojiButtons();
      statusMsg.textContent = '';
    };
  }

  if (dismissBtn) {
    dismissBtn.onclick = hideNudgeAndPanel;
  }

  if (quickcheckinOverlay) {
    quickcheckinOverlay.onclick = function(e) {
      if (e.target === quickcheckinOverlay) {
        hideNudgeAndPanel();
      }
    };
  }

  checkAndShowNudge();
})();
</script>
