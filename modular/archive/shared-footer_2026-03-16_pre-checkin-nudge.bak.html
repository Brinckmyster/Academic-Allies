<!-- shared-footer.html — Academic Allies site footer
     Claude: 2026-03-12 — extracted from shared-header.html.
     Loaded via fetch on every page, same as shared-header.
     Contains: site footer links + attribution credit bar. -->

<style>
/* ── Site footer ──────────────────────────────────────── */
.site-footer {
  margin-top: 60px;
  border-top: 1px solid #e1e5e9;
  padding: 20px 24px;
  background: #f8f9fa;
}
.site-footer-inner {
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  flex-wrap: wrap;
  gap: 10px 20px;
  align-items: center;
  font-size: 14px;
  color: #666;
}
.site-footer-inner a {
  color: #555;
  text-decoration: none;
}
.site-footer-inner a:hover {
  text-decoration: underline;
}

/* ── Attribution credit bar (fixed bottom) ────────────── */
#aa-credit-footer {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: rgba(248,250,252,0.92);
  border-top: 1px solid #e1e5e9;
  padding: 4px 16px;
  font-size: 10px;
  color: #999;
  text-align: center;
  z-index: 500;
  backdrop-filter: blur(4px);
  letter-spacing: 0.3px;
}
#aa-credit-footer a { color: #6CA0A3; text-decoration: none; }
#aa-credit-footer a:hover { text-decoration: underline; }
</style>

<!-- Site footer (links) — only injected if page doesn't already have one -->
<script>
(function() {
  /* Claude: 2026-03-12 — add body padding so fixed credit bar doesn't overlap content.
     Archive: shared-footer_2026-03-12_pre-overlap-fix.bak.html */
  document.body.style.paddingBottom = '32px';

  if (document.querySelector('.site-footer') || document.querySelector('footer.site-footer')) return;
  var f = document.createElement('footer');
  f.className = 'site-footer';
  /* Claude: 2026-03-14 — ARIA contentinfo role for screen reader landmark navigation */
  f.setAttribute('role', 'contentinfo');
  f.innerHTML = '<div class="site-footer-inner">'
    + '<a href="/Academic-Allies/modular/static/sitemap.html">Site Map</a>'
    + '<a href="/Academic-Allies/modular/static/docs/TEAM-PROFILES.html">About the Team</a>'
    + '<a href="/Academic-Allies/modular/privacy.html">Privacy Policy</a>'
    + '<span>&copy; 2026 Academic Allies &mdash; Licensed under <a href="/Academic-Allies/LICENSE">MIT</a></span>'
    + '</div>';
  document.body.appendChild(f);
})();
</script>

<!-- Attribution credit bar -->
<div id="aa-credit-footer">
  Originally scaffolded with <a href="https://www.perplexity.ai" target="_blank" rel="noopener">Perplexity AI</a>
  &nbsp;&middot;&nbsp; Continued development with <a href="https://claude.ai" target="_blank" rel="noopener">Claude</a> &mdash; Anthropic
</div>
