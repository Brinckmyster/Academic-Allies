<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Audio Notes — Academic Allies</title>
  <link rel="icon" href="/Academic-Allies/favicon.ico">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Atkinson Hyperlegible', Arial, sans-serif; background: #FAFAF9; color: #333; }
    .container { max-width: 640px; margin: 0 auto; padding: 16px; }
    h1 { color: #6CA0A3; font-size: 20pt; margin-bottom: 4px; }
    .sub { color: #888; font-size: 11pt; margin-bottom: 20px; }

    /* ── Record button ── */
    .record-wrap { text-align: center; margin: 20px 0; }
    #recordBtn {
      width: 96px; height: 96px; border-radius: 50%; border: 4px solid #ccc;
      background: #fff; cursor: pointer; font-size: 36px; display: inline-flex;
      align-items: center; justify-content: center; transition: all .2s;
      box-shadow: 0 2px 8px rgba(0,0,0,.1);
    }
    #recordBtn:hover { border-color: #6CA0A3; }
    #recordBtn.recording {
      border-color: #f44336; background: #fdecea;
      animation: pulse 1.2s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(244,67,54,.4); } 50% { box-shadow: 0 0 0 14px rgba(244,67,54,0); } }
    #recordStatus { margin-top: 8px; font-size: 11pt; color: #888; min-height: 20px; }
    #recordTimer { font-weight: 600; color: #f44336; }
    #gpsStatus { font-size: 10pt; color: #aaa; margin-top: 4px; }
    #speechWarning { font-size: 10pt; color: #c77600; margin-top: 6px; display: none; }
    #liveTranscript {
      margin: 12px auto; max-width: 560px; min-height: 48px; padding: 10px 14px;
      background: #fff; border: 1px solid #e1e5e9; border-radius: 8px;
      font-size: 12pt; color: #555; white-space: pre-wrap; display: none;
    }
    #liveTranscript .interim { color: #aaa; font-style: italic; }

    /* ── Category modal ── */
    .modal-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,.45);
      z-index: 1000; align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #fff; border-radius: 12px; padding: 24px; width: 90%; max-width: 400px;
      box-shadow: 0 4px 24px rgba(0,0,0,.2);
    }
    .modal h2 { font-size: 14pt; color: #6CA0A3; margin-bottom: 14px; }
    .cat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .cat-btn {
      padding: 12px 8px; border: 2px solid #e1e5e9; border-radius: 8px;
      background: #fff; cursor: pointer; font-size: 12pt; font-family: inherit;
      transition: all .15s;
    }
    .cat-btn:hover { border-color: #6CA0A3; background: #f0f8f8; }
    #cancelCat { margin-top: 12px; width: 100%; padding: 10px; border: none; background: #eee; border-radius: 8px; cursor: pointer; font-size: 11pt; font-family: inherit; }

    /* ── Search / filter bar ── */
    .filter-bar { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
    .filter-bar input {
      flex: 1; min-width: 160px; padding: 8px 12px; border: 1px solid #ddd;
      border-radius: 6px; font-size: 12pt; font-family: inherit;
    }
    .filter-bar select {
      padding: 8px 10px; border: 1px solid #ddd; border-radius: 6px;
      font-size: 12pt; font-family: inherit; background: #fff;
    }

    /* ── Notes list ── */
    .note-card {
      background: #fff; border: 1px solid #e1e5e9; border-radius: 10px;
      padding: 14px 16px; margin-bottom: 10px;
    }
    .note-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 6px; margin-bottom: 6px; }
    .note-time { font-size: 10pt; color: #888; }
    .note-cat {
      display: inline-block; padding: 2px 10px; border-radius: 12px;
      font-size: 9pt; font-weight: 600; color: #fff;
    }
    .cat-genealogy  { background: #8B6F47; }
    .cat-medical    { background: #d32f2f; }
    .cat-ideas      { background: #f9a825; color: #333; }
    .cat-academic   { background: #1a73e8; }
    .cat-personal   { background: #7b5ea7; }
    .cat-other      { background: #888; }
    .note-transcript { font-size: 11pt; color: #555; margin-bottom: 6px; line-height: 1.4; cursor: pointer; }
    .note-transcript.collapsed { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .note-expand { font-size: 9pt; color: #1a73e8; cursor: pointer; margin-bottom: 6px; display: none; }
    .note-footer { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 6px; }
    .note-loc { font-size: 9pt; color: #aaa; }
    .note-delete { background: none; border: none; cursor: pointer; font-size: 14px; color: #ccc; padding: 2px 6px; }
    .note-delete:hover { color: #f44336; }
    #emptyState { text-align: center; color: #aaa; padding: 40px 0; font-size: 12pt; }

    /* ── Mirror banner ── */
    .mirror-banner {
      background: #fff3cd; border: 1px solid #ffc107; border-radius: 8px;
      padding: 8px 14px; margin-bottom: 14px; font-size: 11pt; color: #856404;
      display: none;
    }

    /* ── Toast ── */
    #toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: #333; color: #fff; padding: 10px 20px; border-radius: 8px;
      font-size: 11pt; z-index: 2000; display: none; white-space: nowrap;
    }
  </style>
</head>
<body>
  <div id="site-header"></div>

  <div class="container">
    <div id="signin-notice" style="text-align:center;padding:60px 0;color:#888;">Loading…</div>

    <div id="main-body" style="display:none;">
      <h1>🎙️ Audio Notes</h1>
      <p class="sub">Record, transcribe, and organize voice notes</p>

      <!-- Claude: mirror banner for support users viewing student data -->
      <div id="mirrorBanner" class="mirror-banner"></div>

      <!-- Record section -->
      <div id="recordSection" class="record-wrap">
        <button id="recordBtn" title="Tap to record">🎙️</button>
        <div id="recordStatus">Tap to start recording</div>
        <div id="gpsStatus"></div>
        <div id="speechWarning">⚠️ Live transcription not supported in this browser. Note will save without transcript.</div>
      </div>
      <div id="liveTranscript"></div>

      <!-- Search / filter -->
      <div class="filter-bar">
        <input type="text" id="searchInput" placeholder="Search notes…">
        <select id="categoryFilter">
          <option value="">All categories</option>
          <option value="genealogy">Genealogy</option>
          <option value="medical">Medical</option>
          <option value="ideas">Ideas</option>
          <option value="academic">Academic</option>
          <option value="personal">Personal</option>
          <option value="other">Other</option>
        </select>
      </div>

      <!-- Notes list -->
      <div id="notesList"></div>
      <div id="emptyState" style="display:none;">No audio notes yet. Tap the mic to record your first note.</div>
    </div>
  </div>

  <!-- Category picker modal -->
  <div id="catModal" class="modal-overlay">
    <div class="modal">
      <h2>Tag this note</h2>
      <div class="cat-grid">
        <button class="cat-btn" data-cat="genealogy">🌳 Genealogy</button>
        <button class="cat-btn" data-cat="medical">🏥 Medical</button>
        <button class="cat-btn" data-cat="ideas">💡 Ideas</button>
        <button class="cat-btn" data-cat="academic">📚 Academic</button>
        <button class="cat-btn" data-cat="personal">🔒 Personal</button>
        <button class="cat-btn" data-cat="other">📎 Other</button>
      </div>
      <button id="cancelCat">Cancel (discard recording)</button>
    </div>
  </div>

  <div id="toast"></div>

  <script>
    fetch('/Academic-Allies/modular/shared-header.html?v=20260304b')
      .then(function(r) { return r.text(); })
      .then(function(html) {
        var c = document.getElementById('site-header');
        c.innerHTML = html;
        c.querySelectorAll('script').forEach(function(old) {
          var s = document.createElement('script');
          Array.from(old.attributes).forEach(function(a) { s.setAttribute(a.name, a.value); });
          s.textContent = old.textContent;
          old.replaceWith(s);
        });
      });
  </script>

  <script>
  (function() {
    'use strict';

    // ── Constants ──────────────────────────────────────────────────────────────
    var CAT_LABELS = { genealogy: '🌳 Genealogy', medical: '🏥 Medical', ideas: '💡 Ideas', academic: '📚 Academic', personal: '🔒 Personal', other: '📎 Other' };

    // ── State ──────────────────────────────────────────────────────────────────
    var writeUid = null;        // always the logged-in user
    var readUid = null;         // mirror-aware uid for reading
    var isMirror = false;       // true if viewing another user's data
    var mediaRecorder = null;
    var audioChunks = [];
    var recognition = null;
    var transcript = '';
    var interimText = '';
    var recordingGps = null;
    var recordingAddress = null;
    var recordStartTime = null;
    var timerInterval = null;
    var allNotes = [];          // cached notes from Firestore listener
    var unsubNotes = null;      // Firestore listener unsubscribe

    // ── DOM refs ───────────────────────────────────────────────────────────────
    var recordBtn      = document.getElementById('recordBtn');
    var recordStatus   = document.getElementById('recordStatus');
    var gpsStatusEl    = document.getElementById('gpsStatus');
    var speechWarning  = document.getElementById('speechWarning');
    var liveTranscript = document.getElementById('liveTranscript');
    var catModal       = document.getElementById('catModal');
    var notesList      = document.getElementById('notesList');
    var emptyState     = document.getElementById('emptyState');
    var searchInput    = document.getElementById('searchInput');
    var categoryFilter = document.getElementById('categoryFilter');
    var mirrorBanner   = document.getElementById('mirrorBanner');
    var toastEl        = document.getElementById('toast');

    // ── Helpers ────────────────────────────────────────────────────────────────
    function showToast(msg) {
      toastEl.textContent = msg;
      toastEl.style.display = 'block';
      setTimeout(function() { toastEl.style.display = 'none'; }, 3000);
    }

    function fmtTime(d) {
      if (!d) return '';
      if (d.toDate) d = d.toDate();
      return d.toLocaleString(undefined, { month: 'short', day: 'numeric', year: 'numeric', hour: 'numeric', minute: '2-digit' });
    }

    function fmtDuration(sec) {
      if (!sec) return '';
      var m = Math.floor(sec / 60);
      var s = sec % 60;
      return m + ':' + (s < 10 ? '0' : '') + s;
    }

    function escHtml(str) {
      var d = document.createElement('div');
      d.textContent = str || '';
      return d.innerHTML;
    }

    // ── Speech Recognition ─────────────────────────────────────────────────────
    var SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    function startSpeechRecognition() {
      if (!SpeechRecognition) {
        // Claude: graceful fallback — show warning, recording still works without transcript
        speechWarning.style.display = 'block';
        return;
      }
      speechWarning.style.display = 'none';
      recognition = new SpeechRecognition();
      recognition.continuous = true;
      recognition.interimResults = true;
      recognition.lang = 'en-US';
      transcript = '';
      interimText = '';

      recognition.onresult = function(e) {
        var final = '';
        var interim = '';
        for (var i = 0; i < e.results.length; i++) {
          if (e.results[i].isFinal) {
            final += e.results[i][0].transcript + ' ';
          } else {
            interim += e.results[i][0].transcript;
          }
        }
        transcript = final.trim();
        interimText = interim;
        // Claude: show final text normally, interim text in italic gray
        liveTranscript.innerHTML = escHtml(transcript)
          + (interim ? ' <span class="interim">' + escHtml(interim) + '</span>' : '');
      };

      recognition.onerror = function(e) {
        if (e.error === 'not-allowed') {
          speechWarning.textContent = '⚠️ Microphone permission denied for transcription.';
          speechWarning.style.display = 'block';
        } else if (e.error !== 'no-speech' && e.error !== 'aborted') {
          console.warn('[AudioNotes] Speech error:', e.error);
        }
      };

      // Claude: restart if it stops mid-recording (Chrome kills it after ~60s)
      recognition.onend = function() {
        if (mediaRecorder && mediaRecorder.state === 'recording') {
          try { recognition.start(); } catch(e) {}
        }
      };

      try { recognition.start(); } catch(e) {
        speechWarning.style.display = 'block';
      }
    }

    function stopSpeechRecognition() {
      if (recognition) { try { recognition.stop(); } catch(e) {} recognition = null; }
    }

    // ── GPS + reverse geocode ──────────────────────────────────────────────────
    function captureGps() {
      recordingGps = null;
      recordingAddress = null;
      gpsStatusEl.textContent = '📍 Getting location…';
      navigator.geolocation.getCurrentPosition(
        function(pos) {
          recordingGps = { lat: pos.coords.latitude, lng: pos.coords.longitude };
          gpsStatusEl.textContent = '📍 Location captured';
          // Claude: best-effort reverse geocode via free Nominatim API (no key needed)
          reverseGeocode(recordingGps.lat, recordingGps.lng);
        },
        function() { gpsStatusEl.textContent = '📍 Location unavailable'; },
        { timeout: 8000, maximumAge: 60000 }
      );
    }

    function reverseGeocode(lat, lng) {
      fetch('https://nominatim.openstreetmap.org/reverse?format=json&lat=' + lat + '&lon=' + lng + '&zoom=16')
        .then(function(r) { return r.json(); })
        .then(function(data) {
          if (data && data.display_name) {
            // Claude: keep it short — city, state, country
            var addr = data.address || {};
            recordingAddress = [addr.city || addr.town || addr.village || '', addr.state || '', addr.country || '']
              .filter(Boolean).join(', ');
            if (recordingAddress) gpsStatusEl.textContent = '📍 ' + recordingAddress;
          }
        })
        .catch(function() { /* silent — coords still saved */ });
    }

    // ── Recording timer ────────────────────────────────────────────────────────
    function startTimer() {
      var el = document.createElement('span');
      el.id = 'recordTimer';
      recordStatus.textContent = '';
      recordStatus.appendChild(document.createTextNode('Recording '));
      recordStatus.appendChild(el);
      var start = Date.now();
      timerInterval = setInterval(function() {
        var sec = Math.floor((Date.now() - start) / 1000);
        el.textContent = fmtDuration(sec);
      }, 500);
    }

    function stopTimer() {
      if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
    }

    // ── Recording ──────────────────────────────────────────────────────────────
    function startRecording() {
      navigator.mediaDevices.getUserMedia({ audio: true })
        .then(function(stream) {
          audioChunks = [];
          mediaRecorder = new MediaRecorder(stream);
          mediaRecorder.ondataavailable = function(e) { if (e.data.size > 0) audioChunks.push(e.data); };
          mediaRecorder.onstop = function() {
            stream.getTracks().forEach(function(t) { t.stop(); });
          };
          mediaRecorder.start();
          recordStartTime = Date.now();

          recordBtn.textContent = '⏹️';
          recordBtn.classList.add('recording');
          recordBtn.title = 'Tap to stop';
          liveTranscript.style.display = 'block';
          liveTranscript.innerHTML = '';

          startTimer();
          captureGps();
          startSpeechRecognition();
        })
        .catch(function(err) {
          showToast('Microphone access denied');
          console.error('[AudioNotes] getUserMedia error:', err);
        });
    }

    function stopRecording() {
      if (!mediaRecorder || mediaRecorder.state !== 'recording') return;
      stopSpeechRecognition();
      stopTimer();
      mediaRecorder.stop();

      recordBtn.textContent = '🎙️';
      recordBtn.classList.remove('recording');
      recordBtn.title = 'Tap to record';
      recordStatus.textContent = 'Select a category…';

      catModal.classList.add('open');
    }

    recordBtn.onclick = function() {
      if (mediaRecorder && mediaRecorder.state === 'recording') {
        stopRecording();
      } else {
        startRecording();
      }
    };

    // ── Category selection ─────────────────────────────────────────────────────
    document.querySelectorAll('.cat-btn').forEach(function(btn) {
      btn.onclick = function() {
        var category = btn.getAttribute('data-cat');
        catModal.classList.remove('open');
        saveNote(category);
      };
    });

    document.getElementById('cancelCat').onclick = function() {
      catModal.classList.remove('open');
      audioChunks = [];
      transcript = '';
      interimText = '';
      liveTranscript.style.display = 'none';
      speechWarning.style.display = 'none';
      gpsStatusEl.textContent = '';
      recordStatus.textContent = 'Recording discarded';
      setTimeout(function() { recordStatus.textContent = 'Tap to start recording'; }, 2000);
    };

    // ── Save note ──────────────────────────────────────────────────────────────
    function saveNote(category) {
      var duration = Math.round((Date.now() - (recordStartTime || Date.now())) / 1000);
      var localTime = new Date().toLocaleString();
      var finalTranscript = (transcript + ' ' + interimText).trim() || '';
      var gps = recordingGps ? { lat: recordingGps.lat, lng: recordingGps.lng } : null;

      recordStatus.textContent = 'Saving…';

      // TODO: future — upload audio blob to Google Drive here before saving to Firebase.
      //   Use Google Drive API with scope 'https://www.googleapis.com/auth/drive.file'.
      //   Save driveFileId + driveLink to the note doc.
      //   See archive/audio-notes-pre-mvp-20260303.html for the full Drive upload implementation.

      // TODO: future — integrate Otter.ai or OpenAI Whisper API for higher-quality
      //   transcription as a fallback/upgrade from Web Speech API.
      //   Web Speech API is free but Chrome-only and requires internet.
      //   Whisper API handles offline recordings and non-English languages.

      var noteData = {
        transcript: finalTranscript,
        localTime: localTime,
        gps: gps,
        address: recordingAddress || null,
        category: category,
        duration: duration,
        driveFileId: null,    // TODO: populate when Drive upload is added
        driveLink: null,      // TODO: populate when Drive upload is added
        timestamp: firebase.firestore.FieldValue.serverTimestamp()
      };

      // Claude: timeout guard — if save hangs >10s (offline, permission denied silently), show error
      var saveResolved = false;
      var saveTimer = setTimeout(function() {
        if (!saveResolved) {
          saveResolved = true;
          recordStatus.textContent = 'Save failed — check connection';
          showToast('Save timed out — check your internet connection');
          console.error('[AudioNotes] Firestore save timed out after 10s');
        }
      }, 10000);

      window.AA.db.collection('audioNotes').doc(writeUid)
        .collection('notes').add(noteData)
        .then(function() {
          if (saveResolved) return; // Claude: timeout already fired, don't double-update
          saveResolved = true;
          clearTimeout(saveTimer);
          showToast('Note saved');
          recordStatus.textContent = 'Tap to start recording';
          liveTranscript.style.display = 'none';
          speechWarning.style.display = 'none';
          gpsStatusEl.textContent = '';
          audioChunks = [];
          transcript = '';
          interimText = '';
          recordingAddress = null;
        })
        .catch(function(err) {
          if (saveResolved) return;
          saveResolved = true;
          clearTimeout(saveTimer);
          recordStatus.textContent = 'Save failed — tap mic to try again';
          showToast('Error saving note: ' + (err.code || err.message || 'unknown'));
          console.error('[AudioNotes] Firestore save error:', err);
        });
    }

    // ── Load notes (real-time) ─────────────────────────────────────────────────
    function watchNotes(uid) {
      if (unsubNotes) unsubNotes();
      unsubNotes = window.AA.db.collection('audioNotes').doc(uid)
        .collection('notes').orderBy('timestamp', 'desc')
        .onSnapshot(function(snap) {
          allNotes = snap.docs.map(function(d) {
            var data = d.data();
            data._id = d.id;
            return data;
          });
          renderNotes();
        }, function(err) {
          console.error('[AudioNotes] Watch error:', err);
        });
    }

    // ── Render notes ───────────────────────────────────────────────────────────
    function renderNotes() {
      var query = (searchInput.value || '').toLowerCase().trim();
      var catFilter = categoryFilter.value;

      var filtered = allNotes.filter(function(n) {
        if (catFilter && n.category !== catFilter) return false;
        if (query && (n.transcript || '').toLowerCase().indexOf(query) === -1) return false;
        return true;
      });

      if (filtered.length === 0) {
        notesList.innerHTML = '';
        emptyState.style.display = 'block';
        emptyState.textContent = allNotes.length === 0
          ? 'No audio notes yet. Tap the mic to record your first note.'
          : 'No notes match your search.';
        return;
      }

      emptyState.style.display = 'none';
      notesList.innerHTML = filtered.map(function(n) {
        var timeStr = fmtTime(n.timestamp);
        var catClass = 'cat-' + (n.category || 'other');
        var catLabel = CAT_LABELS[n.category] || n.category || 'Other';
        // Claude: show address if available, else raw coords, else nothing
        var locStr = n.address
          ? '📍 ' + escHtml(n.address)
          : (n.gps ? '📍 ' + n.gps.lat.toFixed(4) + ', ' + n.gps.lng.toFixed(4) : '');
        var transcriptText = n.transcript || '(no transcript)';
        var isLong = transcriptText.length > 120;
        var deleteHtml = !isMirror
          ? '<button class="note-delete" data-id="' + n._id + '" title="Delete note">🗑️</button>'
          : '';

        // TODO: future — add "▶ Play on Drive" link when driveLink is populated
        var driveHtml = n.driveLink
          ? '<a href="' + escHtml(n.driveLink) + '" target="_blank" rel="noopener" style="font-size:10pt;color:#1a73e8;text-decoration:none;">▶ Play on Drive</a>'
          : '';

        return '<div class="note-card">'
          + '<div class="note-header">'
          +   '<span class="note-time">' + timeStr + (n.duration ? ' · ' + fmtDuration(n.duration) : '') + '</span>'
          +   '<span class="note-cat ' + catClass + '">' + catLabel + '</span>'
          + '</div>'
          + '<div class="note-transcript' + (isLong ? ' collapsed' : '') + '" data-nid="' + n._id + '">' + escHtml(transcriptText) + '</div>'
          + (isLong ? '<div class="note-expand" data-nid="' + n._id + '" style="display:block;">Show more</div>' : '')
          + '<div class="note-footer">'
          +   '<span class="note-loc">' + locStr + '</span>'
          +   driveHtml
          +   deleteHtml
          + '</div>'
          + '</div>';
      }).join('');

      // Claude: wire expand/collapse on transcript tap
      notesList.querySelectorAll('.note-transcript.collapsed').forEach(function(el) {
        el.onclick = function() { toggleExpand(el.getAttribute('data-nid')); };
      });
      notesList.querySelectorAll('.note-expand').forEach(function(el) {
        el.onclick = function() { toggleExpand(el.getAttribute('data-nid')); };
      });

      // Claude: wire delete buttons
      notesList.querySelectorAll('.note-delete').forEach(function(btn) {
        btn.onclick = function() {
          var noteId = btn.getAttribute('data-id');
          if (!confirm('Delete this note?')) return;
          window.AA.db.collection('audioNotes').doc(writeUid)
            .collection('notes').doc(noteId).delete()
            .then(function() { showToast('Note deleted'); })
            .catch(function(err) { showToast('Delete failed'); console.error(err); });
        };
      });
    }

    function toggleExpand(nid) {
      var transcript = notesList.querySelector('.note-transcript[data-nid="' + nid + '"]');
      var expand = notesList.querySelector('.note-expand[data-nid="' + nid + '"]');
      if (!transcript) return;
      if (transcript.classList.contains('collapsed')) {
        transcript.classList.remove('collapsed');
        transcript.onclick = function() { toggleExpand(nid); };
        if (expand) expand.textContent = 'Show less';
      } else {
        transcript.classList.add('collapsed');
        if (expand) expand.textContent = 'Show more';
      }
    }

    // Claude: filter listeners
    searchInput.oninput = renderNotes;
    categoryFilter.onchange = renderNotes;

    // ── Auth + Init ────────────────────────────────────────────────────────────
    function waitForAA(cb, n) {
      n = n || 0;
      if (window.AA && window.AA.auth && window.AA.db) { cb(); return; }
      if (n > 40) { document.getElementById('signin-notice').textContent = 'Failed to load. Please refresh.'; return; }
      setTimeout(function() { waitForAA(cb, n + 1); }, 200);
    }

    // Claude: temporary email whitelist for Audio Notes access through RootsTech.
    // TODO: remove whitelist after March 13, 2026 — open to all signed-in users.
    var AUDIO_NOTES_WHITELIST = [
      'brinckmyster@gmail.com',       // backstage-manager
      'karenbrinckfh@gmail.com'          // temporary RootsTech access
    ];

    function isAllowed(email) {
      return AUDIO_NOTES_WHITELIST.indexOf((email || '').toLowerCase()) !== -1;
    }

    waitForAA(function() {
      window.AA.auth.onAuthStateChanged(function(user) {
        if (!user) {
          document.getElementById('signin-notice').textContent = 'Please sign in to use Audio Notes.';
          document.getElementById('main-body').style.display = 'none';
          document.getElementById('signin-notice').style.display = 'block';
          if (unsubNotes) unsubNotes();
          return;
        }

        // Claude: check email whitelist (temporary through RootsTech 2026-03-13)
        if (!isAllowed(user.email)) {
          document.getElementById('signin-notice').textContent = 'Audio Notes is in early testing. Access coming soon.';
          document.getElementById('main-body').style.display = 'none';
          document.getElementById('signin-notice').style.display = 'block';
          return;
        }

        document.getElementById('signin-notice').style.display = 'none';
        document.getElementById('main-body').style.display = 'block';

        // Claude: audio notes are personal to the recorder — always use own UID,
        // ignore AA_MIRROR_UID entirely. No mirror mode for this component.
        writeUid = user.uid;
        readUid = user.uid;

        watchNotes(readUid);
      });
    });

  })();
  </script>
</body>
</html>
