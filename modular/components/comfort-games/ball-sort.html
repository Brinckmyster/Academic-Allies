<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ball Sort - Academic Allies</title>
    <style>
        /* Claude: 2026-04-05 — Ball Sort clean rewrite, mobile-first */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-user-select: none; user-select: none; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #9d4edd, #ff006e);
            min-height: 100vh;
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .top-bar {
            width: 100%;
            max-width: 600px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 14px;
        }

        .back-link {
            background: rgba(255,255,255,0.2);
            color: white;
            padding: 10px 16px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            min-height: 44px;
            display: flex;
            align-items: center;
        }

        h1 { color: white; font-size: 24px; font-weight: 700; text-shadow: 1px 1px 3px rgba(0,0,0,0.3); }

        .diff-row {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }

        .diff-btn {
            padding: 10px 18px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            background: rgba(255,255,255,0.2);
            color: white;
            min-height: 44px;
            touch-action: manipulation;
        }

        .diff-btn.active { background: white; color: #9d4edd; }

        .card {
            background: #f0eaff;
            border-radius: 20px;
            padding: 20px 16px;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.25);
        }

        .instructions {
            text-align: center;
            font-size: 14px;
            color: #555;
            margin-bottom: 14px;
            line-height: 1.5;
        }

        /* Holding area */
        .holding-area {
            text-align: center;
            min-height: 70px;
            margin-bottom: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #e0d4ff;
            border-radius: 12px;
            padding: 10px;
        }

        .holding-label {
            font-size: 13px;
            color: #666;
            margin-bottom: 6px;
        }

        .held-ball {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: 3px solid #ff9500;
            box-shadow: 0 0 14px rgba(255,149,0,0.7);
            animation: bob 0.7s ease-in-out infinite alternate;
        }

        @keyframes bob {
            from { transform: translateY(-5px); }
            to   { transform: translateY(5px); }
        }

        /* Tubes layout — flex wrap so they always show on mobile */
        .tubes-wrap {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin-bottom: 18px;
        }

        .tube {
            width: 64px;
            height: 220px;
            background: #ddd0f8;
            border: 3px solid #bbb;
            border-radius: 12px;
            display: flex;
            flex-direction: column-reverse;  /* bottom = index 0 of array */
            align-items: center;
            justify-content: flex-start;
            padding: 6px 4px;
            gap: 4px;
            cursor: pointer;
            touch-action: manipulation;
            transition: border-color 0.15s, box-shadow 0.15s;
            position: relative;
        }

        .tube.selected {
            border-color: #ff9500;
            box-shadow: 0 0 16px rgba(255,149,0,0.6);
        }

        .tube.locked {
            border-color: #22c55e;
            box-shadow: 0 0 16px rgba(34,197,94,0.5);
            cursor: default;
        }

        .ball {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: 2px solid rgba(0,0,0,0.15);
            box-shadow: 0 3px 6px rgba(0,0,0,0.25), inset -2px -2px 4px rgba(0,0,0,0.15);
            flex-shrink: 0;
        }

        .c-red    { background: radial-gradient(circle at 35% 35%, #ff8a80, #e53935); }
        .c-blue   { background: radial-gradient(circle at 35% 35%, #80d8ff, #0288d1); }
        .c-yellow { background: radial-gradient(circle at 35% 35%, #fff176, #f9a825); }
        .c-green  { background: radial-gradient(circle at 35% 35%, #b9f6ca, #2e7d32); }
        .c-purple { background: radial-gradient(circle at 35% 35%, #e040fb, #6a1b9a); }
        .c-orange { background: radial-gradient(circle at 35% 35%, #ffcc80, #e65100); }

        .stats-row {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-bottom: 14px;
            font-size: 14px;
            color: #555;
        }

        .btn-row { display: flex; justify-content: center; }

        .new-btn {
            padding: 14px 32px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            background: linear-gradient(135deg, #9d4edd, #ff006e);
            color: white;
            min-height: 48px;
            touch-action: manipulation;
            box-shadow: 0 4px 14px rgba(0,0,0,0.2);
        }

        .win-msg {
            text-align: center;
            font-size: 20px;
            font-weight: 700;
            color: #22c55e;
            margin-top: 14px;
            min-height: 28px;
        }
    </style>
</head>
<body>

<div class="top-bar">
    <a class="back-link" href="/Academic-Allies/modular/components/comfort-games/game-center.html">&#8592; Back</a>
    <h1>Ball Sort</h1>
    <div style="width:80px"></div>
</div>

<div class="diff-row">
    <button class="diff-btn active" data-d="easy">Easy</button>
    <button class="diff-btn" data-d="medium">Medium</button>
    <button class="diff-btn" data-d="hard">Hard</button>
</div>

<div class="card">
    <div class="instructions">
        Tap a tube to pick up its top ball.<br>
        Tap another tube to drop it there.<br>
        Sort all balls so each tube has one color.
    </div>

    <div class="holding-area" id="holding-area">
        <div class="holding-label" id="holding-label">Tap a tube to pick up its top ball</div>
    </div>

    <div class="stats-row">
        <span>Sorted: <strong id="sorted-count">0</strong></span>
        <span>Moves: <strong id="moves-count">0</strong></span>
    </div>

    <div class="tubes-wrap" id="tubes-wrap"></div>

    <div class="btn-row">
        <button class="new-btn" id="new-btn">New Game</button>
    </div>

    <div class="win-msg" id="win-msg"></div>
</div>

<script>
/* Claude: 2026-04-05 — Ball Sort clean rewrite */

var COLORS = ['red', 'blue', 'yellow', 'green', 'purple', 'orange'];

var state = {
    tubes: [],
    held: -1,       // index of tube ball was picked from, -1 = none
    moves: 0,
    difficulty: 'easy'
};

var CONFIGS = {
    easy:   { tubeCount: 5, colorCount: 4 },
    medium: { tubeCount: 6, colorCount: 5 },
    hard:   { tubeCount: 7, colorCount: 6 }
};

/* ---- setup ---- */

function shuffle(arr) {
    var a = arr.slice();
    for (var i = a.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        var t = a[i]; a[i] = a[j]; a[j] = t;
    }
    return a;
}

function buildTubes(tubeCount, colorCount) {
    var pool = [];
    for (var c = 0; c < colorCount; c++) {
        for (var b = 0; b < 4; b++) {
            pool.push(COLORS[c]);
        }
    }
    pool = shuffle(pool);

    var tubes = [];
    for (var i = 0; i < tubeCount; i++) { tubes.push([]); }
    for (var j = 0; j < pool.length; j++) {
        tubes[j % tubeCount].push(pool[j]);
    }
    return tubes;
}

function startGame(difficulty) {
    state.difficulty = difficulty || 'easy';
    var cfg = CONFIGS[state.difficulty];
    state.tubes = buildTubes(cfg.tubeCount, cfg.colorCount);
    state.held = -1;
    state.moves = 0;
    clearHeld();
    render();
    document.getElementById('win-msg').textContent = '';
}

/* ---- game logic ---- */

function topBall(tubeIdx) {
    var t = state.tubes[tubeIdx];
    return t.length > 0 ? t[t.length - 1] : null;
}

function isLocked(tubeIdx) {
    var t = state.tubes[tubeIdx];
    if (t.length !== 4) { return false; }
    for (var i = 1; i < 4; i++) {
        if (t[i] !== t[0]) { return false; }
    }
    return true;
}

function lockedCount() {
    var n = 0;
    for (var i = 0; i < state.tubes.length; i++) {
        if (isLocked(i)) { n++; }
    }
    return n;
}

function isWon() {
    return lockedCount() === CONFIGS[state.difficulty].colorCount;
}

function tapTube(idx) {
    if (isLocked(idx)) { return; }

    if (state.held === -1) {
        /* pick up */
        if (topBall(idx) === null) { return; }
        state.held = idx;
        showHeld(topBall(idx));
        render();
    } else if (state.held === idx) {
        /* put back */
        state.held = -1;
        clearHeld();
        render();
    } else {
        /* drop onto another tube */
        var src = state.held;
        var ball = topBall(src);
        var tgt = state.tubes[idx];
        if (tgt.length < 4) {
            state.tubes[src].pop();
            tgt.push(ball);
            state.moves++;
        }
        state.held = -1;
        clearHeld();
        render();
        if (isWon()) {
            document.getElementById('win-msg').textContent = 'You sorted them all! \uD83C\uDF89';
        }
    }
}

/* ---- display ---- */

function showHeld(color) {
    var area = document.getElementById('holding-area');
    document.getElementById('holding-label').textContent = 'Holding \u2014 tap any tube to drop';
    var old = document.getElementById('held-ball-el');
    if (old) { old.parentNode.removeChild(old); }
    var b = document.createElement('div');
    b.className = 'held-ball c-' + color;
    b.id = 'held-ball-el';
    area.appendChild(b);
}

function clearHeld() {
    document.getElementById('holding-label').textContent = 'Tap a tube to pick up its top ball';
    var old = document.getElementById('held-ball-el');
    if (old) { old.parentNode.removeChild(old); }
}

function render() {
    var wrap = document.getElementById('tubes-wrap');
    wrap.innerHTML = '';

    for (var i = 0; i < state.tubes.length; i++) {
        var tube = state.tubes[i];
        var div = document.createElement('div');
        div.className = 'tube';
        if (state.held === i)  { div.className += ' selected'; }
        if (isLocked(i))       { div.className += ' locked'; }

        /* balls — appended bottom-first; flex-direction:column-reverse shows them correctly */
        for (var j = 0; j < tube.length; j++) {
            var b = document.createElement('div');
            b.className = 'ball c-' + tube[j];
            div.appendChild(b);
        }

        (function(idx) {
            div.addEventListener('click',    function() { tapTube(idx); });
            div.addEventListener('touchend', function(e) { e.preventDefault(); tapTube(idx); });
        })(i);

        wrap.appendChild(div);
    }

    document.getElementById('sorted-count').textContent = lockedCount();
    document.getElementById('moves-count').textContent  = state.moves;
}

/* ---- wiring ---- */

document.getElementById('new-btn').addEventListener('click', function() {
    startGame(state.difficulty);
});

var diffBtns = document.querySelectorAll('.diff-btn');
for (var d = 0; d < diffBtns.length; d++) {
    diffBtns[d].addEventListener('click', function(e) {
        for (var k = 0; k < diffBtns.length; k++) { diffBtns[k].classList.remove('active'); }
        e.target.classList.add('active');
        startGame(e.target.getAttribute('data-d'));
    });
}

/* dark mode */
try {
    if (localStorage.getItem('aa-dark-mode') === 'true') {
        document.body.style.background = 'linear-gradient(135deg, #1a1a2e, #0f3460)';
    }
} catch(e) {}

startGame('easy');
</script>
</body>
</html>
