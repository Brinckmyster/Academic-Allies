<script>
  fetch('/Academic-Allies/modular/shared-header.html?v=20260324')
    .then(function(response) { return response.text(); })
    .then(function(html) {
      var container = document.getElementById('site-header');
      container.innerHTML = html;
      var scripts = container.querySelectorAll('script');
      scripts.forEach(function(oldScript) {
        var newScript = document.createElement('script');
        Array.from(oldScript.attributes).forEach(function(attr) { newScript.setAttribute(attr.name, attr.value); });
        newScript.textContent = oldScript.textContent;
        oldScript.replaceWith(newScript);
      });
    })
    .catch(function(err) { console.warn('[AA] shared-header fetch failed:', err); });
</script>

  /* Claude: 2026-03-17 — Fill-in-the-blank quiz with all 5 categories */

  /* Claude: 2026-03-18 — Flower data with spelling hints for each genus.
     hints = 3 visual/pattern tricks for readers who struggle with spelling.
     Focus: word-within-word, letter patterns, chunking, visual tricks. NO pronunciation guides. */
  var flowerData = [
    // Quiz 1: Mass Flowers
    { quiz: 1, common: 'Carnation', genus: 'Dianthus', aliases: [],
      hints: ['Ends with THUS — "and THUS, the carnation bloomed"', 'DI like Princess Diana + AN + THUS', 'Diana THUS gave us carnations'] },
    { quiz: 1, common: 'Daisy Pom', genus: 'Chrysanthemum', aliases: ['Cushion Pom'],
      hints: ['It ends with MUM! Chrysanthe-MUM for your mum', 'CHRYS like Christmas without the "tmas" + ANTHEMUM', 'The MUM at the end is your free anchor — build backward from there'] },
    { quiz: 1, common: 'Rose', genus: 'Rosa', aliases: [],
      hints: ['It is literally just the name Rosa', 'ROSE → swap the E for A → ROSA', 'Only 4 letters. You got this.'] },
    /* Claude: 2026-03-23 — added Peruvian Lily + Lily of the Incas aliases per Mary's spelling sheet */
    { quiz: 1, common: 'Alstro', genus: 'Alstroemeria', aliases: ['Peruvian Lily', 'Lily of the Incas'],
      hints: ['AL goes to the cafeTERIA → AL-stroe-MERIA', 'That sneaky OE in the middle is the trap: alstr-OE-meria', 'A guy named AL + STROE + goes to the cafe-MERIA'] },
    { quiz: 1, common: 'Lisianthus', genus: 'Eustoma', aliases: [],
      hints: ['Shorter than the common name! Only 7 letters', 'EU like EUrope + STOMA (a mouth) — tiny flower mouths', 'A European mouth: EU-STOMA'] },
    { quiz: 1, common: 'Hydrangea', genus: 'Hydrangea', aliases: [],

  /* Fisher-Yates shuffle */
  function shuffle(array) {
    var arr = array.slice();
    for (var i = arr.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var temp = arr[i];
      arr[i] = arr[j];
      arr[j] = temp;
    }
    return arr;
  }

  /* Build deck from selected quiz */
  function buildDeck() {
    var filtered = flowerData.filter(function(flower) {
      if (quizState.selectedQuiz === 'all') return true;
      return flower.quiz === parseInt(quizState.selectedQuiz, 10);
    });
    quizState.currentDeck = shuffle(filtered);
    quizState.currentIndex = 0;
    quizState.correct = 0;
    quizState.total = quizState.currentDeck.length;
    quizState.missed = [];
    quizState.missedSpelling = [];
    quizState.missedWrong = [];
    quizState.retryingMissed = false;
    quizState.retryMode = '';
    updateDisplay();
  }

  /* Build deck from missed items */
  /* Claude: 2026-03-18 — retry supports spelling-only, wrong-only, or all */
  function buildMissedDeck(retryType) {
    var deck = [];
    if (retryType === 'spelling') deck = quizState.missedSpelling;
    else if (retryType === 'wrong') deck = quizState.missedWrong;
    else deck = quizState.missedSpelling.concat(quizState.missedWrong);
    quizState.currentDeck = shuffle(deck);
    quizState.currentIndex = 0;
    quizState.correct = 0;
    quizState.total = quizState.currentDeck.length;
    quizState.missed = [];
    quizState.missedSpelling = [];
    quizState.missedWrong = [];
    quizState.retryingMissed = true;
    quizState.retryMode = retryType || 'all';
    updateDisplay();
  }

  /* Update score and progress */
  function updateDisplay() {
    scoreDisplay.textContent = quizState.correct;
    totalDisplay.textContent = quizState.total;
    var pct = quizState.total > 0 ? Math.round((quizState.correct / quizState.total) * 100) : 0;
    percentageDisplay.textContent = pct;
    var progressPct = quizState.total > 0 ? ((quizState.currentIndex + 1) / quizState.total) * 100 : 0;
    progressFill.style.width = progressPct + '%';
    displayQuestion();
  }

      showEndScreen();

    var flower = quizState.currentDeck[quizState.currentIndex];

  }

  /* Text-to-speech pronunciation */
  function pronounce(text) {
    if ('speechSynthesis' in window) {
      window.speechSynthesis.cancel();
      var utterance = new SpeechSynthesisUtterance(text);
      utterance.rate = 0.9;
      window.speechSynthesis.speak(utterance);
    }
  }

  /* Claude: 2026-03-17 — Levenshtein distance for "close but wrong" feedback */
  function editDistance(a, b) {
    var m = a.length, n = b.length;
    var dp = [];
    for (var i = 0; i <= m; i++) {
      dp[i] = [i];
      for (var j = 1; j <= n; j++) {
        dp[i][j] = i === 0 ? j : 0;
      }
    }
    for (var i = 1; i <= m; i++) {
      for (var j = 1; j <= n; j++) {
        if (a[i - 1] === b[j - 1]) {
          dp[i][j] = dp[i - 1][j - 1];
        } else {
          dp[i][j] = 1 + Math.min(dp[i - 1][j], dp[i][j - 1], dp[i - 1][j - 1]);
        }
      }
    }
    return dp[m][n];
  }

  /* Claude: 2026-03-18 — Three-way answer check:
     1. Exact match (case-insensitive) = CORRECT
     2. Close spelling (edit distance ≤ 3) = KNEW IT but misspelled — shows hints
     3. Totally wrong = WRONG — different flower or blank
     Tracks spelling misses vs knowledge misses separately for retry. */
  function checkAnswer() {
    var flower = quizState.currentDeck[quizState.currentIndex];
    var userAnswer = answerInput.value.trim();
    var correctText = quizState.mode === 'genus' ? flower.genus : flower.common;
    var isExact = false;
    var isClose = false;

    // Check exact match
    if (quizState.mode === 'genus') {
      isExact = userAnswer.toLowerCase() === flower.genus.toLowerCase();
    } else {
      isExact = userAnswer.toLowerCase() === flower.common.toLowerCase();
      if (!isExact) {
        for (var i = 0; i < flower.aliases.length; i++) {
          if (userAnswer.toLowerCase() === flower.aliases[i].toLowerCase()) { isExact = true; break; }
        }
      }
    }

    // If not exact, check if it is close (right answer, wrong spelling)
    if (!isExact && userAnswer.length > 0) {
      var dist = editDistance(userAnswer.toLowerCase(), correctText.toLowerCase());
      // Also check aliases for closeness in common-name mode
      var minDist = dist;
      if (quizState.mode === 'common') {
        for (var j = 0; j < flower.aliases.length; j++) {
          var aDist = editDistance(userAnswer.toLowerCase(), flower.aliases[j].toLowerCase());
          if (aDist < minDist) minDist = aDist;
        }
      }
      // Close = within 3 edits AND at least 40% of the letters match
      var maxLen = Math.max(userAnswer.length, correctText.length);
      if (minDist <= 3 && minDist < maxLen * 0.6) {
        isClose = true;
      }
    }

    if (isExact) {
      // ── CORRECT ──
      quizState.correct++;
      card.classList.add('correct-flash');
      feedback.classList.add('show', 'correct');
      feedback.innerHTML = '✓ Correct!';
      updateMissedCounter(false);
    } else if (isClose) {
      // ── KNEW IT — spelling was off ──
      card.classList.add('incorrect-flash');
      feedback.classList.add('show', 'spelling');
      var hintsHtml = '';
      if (flower.hints && flower.hints.length > 0) {
        hintsHtml = '<div class="hint-box"><div class="hint-title">Spelling helpers:</div>';
        for (var h = 0; h < flower.hints.length; h++) {
          hintsHtml += '<div class="hint-item">' + flower.hints[h] + '</div>';
        }
        hintsHtml += '</div>';
      }
      /* Claude: 2026-03-18 — varied encouragement so it doesn't get annoying */
      var knewItMsgs = [
        'You KNEW it! Just a spelling hiccup.',
        'Right flower, wrong letters! So close.',
        'Your brain got it — your fingers just need to catch up.',
        'That is the right answer with the wrong outfit on.',
        'Knowledge: A+. Spelling: needs work.',
        'You knew this one! Let the spelling helpers sink in.',
        'Correct answer, creative spelling.',
        'The flower knowledge is THERE. Spelling is the last boss.',
        'Almost perfect — just some letters in the wrong order.',
        'You recognized it! Now let\'s lock in that spelling.'
      ];
      var knewItMsg = knewItMsgs[Math.floor(Math.random() * knewItMsgs.length)];
      var testWarnings = [
        'Still counts as a miss — the test won\'t be this nice!',
        'Marked as a miss — your teacher won\'t give partial credit.',
        'Still a miss for scoring — but YOU know that you know it.',
        'The test will want exact spelling. You are so close though.'
      ];
      var testWarn = testWarnings[Math.floor(Math.random() * testWarnings.length)];
      feedback.innerHTML = '<div class="knew-it">' + knewItMsg + '</div>' +
        '<div class="correct-answer">Correct spelling: <strong>' + correctText + '</strong></div>' +
        '<div class="you-wrote">You wrote: <span style="text-decoration:line-through;">' + userAnswer + '</span></div>' +
        hintsHtml +
        '<div style="font-size:0.8rem;color:#888;margin-top:8px;">' + testWarn + '</div>';
      quizState.missedSpelling.push(flower);
      updateMissedCounter(true);
    } else {
      // ── WRONG — didn't know the answer ──
      card.classList.add('incorrect-flash');
      feedback.classList.add('show', 'incorrect');
      feedback.innerHTML = '✗ Incorrect.<div class="correct-answer">Answer: <strong>' + correctText + '</strong></div>';
      quizState.missedWrong.push(flower);
      updateMissedCounter(true);
    }

    checkBtn.style.display = 'none';
    nextBtn.style.display = 'inline-block';
    answerInput.disabled = true;
    /* Claude: 2026-03-18 — show report button after answer is revealed */
    reportArea.style.display = 'block';
    reportForm.style.display = 'none';
    reportConfirm.style.display = 'none';
  }

  /* Claude: 2026-03-20 — migrated from localStorage to Firestore */
  /* Update Firestore missed counter per flower */
  function updateMissedCounter(isMiss) {
    var flower = quizState.currentDeck[quizState.currentIndex];
    if (!flower) return;

    var flowerName = flower.common;
    if (window.AA && window.AA.study) {
      if (isMiss) {
        window.AA.study.addMiss(flowerName).catch(function (err) {
          console.warn('[AA Study] addMiss failed:', err);
          /* Fallback to localStorage */
          try {
            var missedMap = JSON.parse(localStorage.getItem('AA_FLORAL_MISSED') || '{}');
            missedMap[flowerName] = (missedMap[flowerName] || 0) + 1;
            localStorage.setItem('AA_FLORAL_MISSED', JSON.stringify(missedMap));
          } catch (e) {}
        });
      } else {
        window.AA.study.removeMiss(flowerName).catch(function (err) {
          console.warn('[AA Study] removeMiss failed:', err);
          /* Fallback to localStorage */
          try {
            var missedMap = JSON.parse(localStorage.getItem('AA_FLORAL_MISSED') || '{}');
            if (missedMap[flowerName]) {
              missedMap[flowerName]--;
              if (missedMap[flowerName] <= 0) delete missedMap[flowerName];
            }
            localStorage.setItem('AA_FLORAL_MISSED', JSON.stringify(missedMap));
          } catch (e) {}
        });
      }
    } else {
      /* Fallback if AA.study not loaded yet */
      try {
        var missedMap = JSON.parse(localStorage.getItem('AA_FLORAL_MISSED') || '{}');
        if (isMiss) {
          missedMap[flowerName] = (missedMap[flowerName] || 0) + 1;
        } else {
          if (missedMap[flowerName]) {
            missedMap[flowerName]--;
            if (missedMap[flowerName] <= 0) delete missedMap[flowerName];
          }
        }
        localStorage.setItem('AA_FLORAL_MISSED', JSON.stringify(missedMap));
      } catch (e) {}
    }
  }

  /* Claude: 2026-03-18 — End screen with spelling vs knowledge breakdown */
  function showEndScreen() {
    /* Claude: 2026-03-20 — migrated from localStorage to Firestore */
    if (window.AA && window.AA.study) {
      window.AA.study.logSession('fill-blank').catch(function (err) {
        console.warn('[AA Study] logSession failed:', err);

    card.style.display = 'none';
    endScreen.style.display = 'block';
    var pct = quizState.total > 0 ? Math.round((quizState.correct / quizState.total) * 100) : 0;
    finalScore.textContent = pct + '%';
    var nSpell = quizState.missedSpelling.length;
    var nWrong = quizState.missedWrong.length;
    var nTotal = nSpell + nWrong;

    // Hide all retry buttons by default
    retryMissedBtn.style.display = 'none';
    retrySpellingBtn.style.display = 'none';
    retryWrongBtn.style.display = 'none';
    missBreakdown.style.display = 'none';

    if (quizState.retryingMissed) {
      finalMessage.textContent = 'Nice work on the retry!';
      // Show breakdown even on retry
      if (nTotal > 0) {
        missBreakdown.style.display = 'block';
        missBreakdown.innerHTML = buildBreakdownHtml(nSpell, nWrong);
        if (nSpell > 0) retrySpellingBtn.style.display = 'inline-block';
        if (nWrong > 0) retryWrongBtn.style.display = 'inline-block';
        if (nSpell > 0 && nWrong > 0) retryMissedBtn.style.display = 'inline-block';
      }
    } else if (pct === 100) {
      finalMessage.textContent = 'Perfect score! You\'re ready for the exam!';
    } else if (nTotal > 0) {
      finalMessage.textContent = 'You missed ' + nTotal + ' — here\'s the breakdown:';
      missBreakdown.style.display = 'block';
      missBreakdown.innerHTML = buildBreakdownHtml(nSpell, nWrong);
      if (nSpell > 0) retrySpellingBtn.style.display = 'inline-block';
      if (nWrong > 0) retryWrongBtn.style.display = 'inline-block';
      if (nSpell > 0 && nWrong > 0) retryMissedBtn.style.display = 'inline-block';
    } else {
      finalMessage.textContent = 'Great job!';
    }
  }

  function buildBreakdownHtml(nSpell, nWrong) {
    var html = '';
    if (nSpell > 0) {
      html += '<div style="color:#e65100;"><strong>Spelling misses:</strong> ' + nSpell +
        ' — you knew ' + (nSpell === 1 ? 'this one' : 'these') + ', just need the spelling!</div>';
    }
    if (nWrong > 0) {
      html += '<div style="color:#c62828;"><strong>Wrong answers:</strong> ' + nWrong +
        ' — ' + (nWrong === 1 ? 'this one needs' : 'these need') + ' more study</div>';
    }
    if (nSpell > 0 && nWrong === 0) {
      html += '<div style="color:#2e7d32;margin-top:6px;">You knew every answer! Just polish the spelling and you\'re golden.</div>';
    }
    return html;
  }

  /* Event listeners */
  document.querySelectorAll('.mode-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      document.querySelectorAll('.mode-btn').forEach(function(b) {
        b.classList.remove('active');
      });
      btn.classList.add('active');
      quizState.mode = btn.getAttribute('data-mode');
      card.style.display = 'block';
      endScreen.style.display = 'none';
      buildDeck();
    });
  });

  document.querySelectorAll('.filter-pill').forEach(function(btn) {
    btn.addEventListener('click', function() {
      document.querySelectorAll('.filter-pill').forEach(function(b) {
        b.classList.remove('active');
      });
      btn.classList.add('active');
      quizState.selectedQuiz = btn.getAttribute('data-quiz');
      card.style.display = 'block';
      endScreen.style.display = 'none';
      buildDeck();
    });
  });

  checkBtn.addEventListener('click', checkAnswer);
  answerInput.addEventListener('keypress', function(e) {
    if (e.key === 'Enter') {
      checkAnswer();
    }
  });

  nextBtn.addEventListener('click', function() {
    quizState.currentIndex++;
    updateDisplay();
  });

  retryMissedBtn.addEventListener('click', function() {
    buildMissedDeck('all');
    card.style.display = 'block';
    endScreen.style.display = 'none';
  });
  retrySpellingBtn.addEventListener('click', function() {
    buildMissedDeck('spelling');
    card.style.display = 'block';
    endScreen.style.display = 'none';
  });
  retryWrongBtn.addEventListener('click', function() {
    buildMissedDeck('wrong');
    card.style.display = 'block';
    endScreen.style.display = 'none';
  });

  homeBtn.addEventListener('click', function() {
    window.location.href = '/Academic-Allies/';
  });

  /* Claude: 2026-03-18 — Report wrong answer system.
     Saves to Firestore: /quizReports/{auto-id}
     Also sends a message to Bruise's in-app message system so she sees it. */
  reportBtn.addEventListener('click', function() {
    reportForm.style.display = 'block';
    reportBtn.style.display = 'none';
  });

  document.querySelectorAll('.report-option').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var reason = btn.getAttribute('data-reason');
      var flower = quizState.currentDeck[quizState.currentIndex] ||
                   quizState.currentDeck[quizState.currentIndex - 1]; // might have advanced
      if (!flower) { reportConfirm.textContent = 'Could not identify the flower. Try again?'; reportConfirm.style.display = 'block'; return; }

      var report = {
        common: flower.common,
        genus: flower.genus,
        quiz: flower.quiz,
        reason: reason,
        userAnswer: answerInput.value.trim(),
        mode: quizState.mode,
        timestamp: new Date().toISOString(),
        source: 'fill-in-the-blank'
      };

      // Save to localStorage as fallback
      try {
        var reports = JSON.parse(localStorage.getItem('AA_QUIZ_REPORTS') || '[]');
        reports.push(report);
        localStorage.setItem('AA_QUIZ_REPORTS', JSON.stringify(reports));
      } catch(e) {}

      // Save to Firestore + send message to Bruise
      function _saveReport() {
        if (!window.AA || !window.AA.db) return;
        var user = window.AA.auth && window.AA.auth.currentUser;
        report.reportedBy = user ? user.displayName || user.email || user.uid : 'anonymous';
        report.reporterUid = user ? user.uid : null;

        // Save to quizReports collection
        window.AA.db.collection('quizReports').add(report)
          .catch(function(err) { console.warn('[AA] Report save failed:', err); });

        // Send in-app message to Bruise (brinckmyster)
        // Find Bruise's UID by checking admin or using known email
        if (window.AA.db) {
          window.AA.db.collection('users').where('email', '==', 'brinckmyster@gmail.com').get()
            .then(function(snap) {
              if (snap.empty) return;
              var bruiseUid = snap.docs[0].id;
              var reasonLabels = {
                'wrong-genus': 'Wrong genus listed',
                'wrong-spelling': 'Spelling error in answer key',
                'wrong-common': 'Wrong common name',
                'missing-alias': 'Answer should also be accepted',
                'other': 'Other issue'
              };
              var msgText = 'Quiz Report: ' + flower.common + ' (' + flower.genus + ') — ' +
                (reasonLabels[reason] || reason) + '. User typed: "' + report.userAnswer + '"';
              window.AA.db.collection('messages').add({
                to: bruiseUid,
                from: report.reporterUid || 'system',
                fromName: report.reportedBy || 'Quiz Reporter',
                text: msgText,
                timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                read: false,
                type: 'quiz-report'
              }).catch(function(err) { console.warn('[AA] Report message failed:', err); });
            })
            .catch(function(err) { console.warn('[AA] Bruise lookup failed:', err); });
        }
      }

      // Wait for AA if not ready
      if (window.AA && window.AA.db) { _saveReport(); }
      else {
        var tries = 0;
        var poll = setInterval(function() {
          tries++;
          if (window.AA && window.AA.db) { clearInterval(poll); _saveReport(); }
          if (tries > 20) clearInterval(poll);
        }, 300);
      }

      // Show confirmation
      reportForm.style.display = 'none';
      reportConfirm.textContent = 'Reported! Bruise will review this. Thanks for helping!';
      reportConfirm.style.display = 'block';
    });
  });

  /* Initialize */
  buildDeck();
</script>

</body>
</html>
