<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" href="/Academic-Allies/favicon.ico">
<!-- Claude: 2026-03-17 — early dark mode detect to prevent FOUC -->

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Floral ID Study Sheet — Academic Allies</title>
<!-- Claude: 2026-03-17 — Quick-reference study sheet for floral ID final -->
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Atkinson Hyperlegible', Arial, sans-serif;
    background: #FAFAF9;
    min-height: 100vh;
    padding: 0 12px 40px;
    color: #333;
  }
  html.aa-dark body { background: #121212; color: #e0e0e0; }

  .sheet-container {
    max-width: 750px;
    margin: 0 auto;
    padding-top: 12px;
  }
  .back-link {
    display: inline-block;
    color: #6CA0A3;
    text-decoration: none;
    font-size: 11pt;
    margin-bottom: 8px;
  }
  .back-link:hover { text-decoration: underline; }
  html.aa-dark .back-link { color: #8ec5c8; }

  h1 {
    color: #4a7f82;
    font-size: 20pt;
    margin-bottom: 4px;
  }
  html.aa-dark h1 { color: #8ec5c8; }
  .subtitle {
    color: #888;
    font-size: 11pt;
    margin-bottom: 16px;
  }

  /* Controls */
  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 16px;
    align-items: center;
  }
  .controls button {
    padding: 7px 14px;
    border: 2px solid #6CA0A3;
    border-radius: 20px;
    background: #fff;
    color: #4a7f82;
    font-weight: 600;
    font-size: 10pt;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.2s;
  }
  html.aa-dark .controls button {
    background: #1e1e1e;
    color: #8ec5c8;
    border-color: #3a5a5c;
  }
  .controls button:hover, .controls button.active {
    background: #6CA0A3;
    color: #fff;
  }
  html.aa-dark .controls button:hover, html.aa-dark .controls button.active {
    background: #4a7f82;
    color: #fff;
  }
  .controls input[type="text"] {
    padding: 7px 14px;
    border: 2px solid #b2d8db;
    border-radius: 20px;
    font-size: 10pt;
    font-family: inherit;
    outline: none;
    width: 200px;
  }
  html.aa-dark .controls input[type="text"] {
    background: #1e1e1e;
    color: #e0e0e0;
    border-color: #3a5a5c;
  }
  .controls input:focus { border-color: #6CA0A3; }

  /* Quiz sections */
  .quiz-section {
    margin-bottom: 20px;
  }
  .quiz-section h2 {
    color: #4a7f82;
    font-size: 14pt;
    padding: 8px 14px;
    background: #e8f2f3;
    border-radius: 10px;
    margin-bottom: 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    cursor: pointer;
    user-select: none;
  }
  html.aa-dark .quiz-section h2 {
    color: #8ec5c8;
    background: #1a2a2b;
  }
  .quiz-section h2 .count {
    font-size: 10pt;
    color: #888;
    font-weight: 400;
  }
  .quiz-section h2 .toggle { font-size: 10pt; }

  /* Table */
  table {
    width: 100%;
    border-collapse: collapse;
  }
  th {
    background: #6CA0A3;
    color: #fff;
    padding: 8px 14px;
    text-align: left;
    font-size: 10pt;
    font-weight: 700;
  }
  html.aa-dark th { background: #3a6a6d; }
  td {
    padding: 9px 14px;
    border-bottom: 1px solid #e8f2f3;
    font-size: 11pt;
  }
  html.aa-dark td { border-color: #2a3a3a; }
  tr:nth-child(even) td { background: #f8fcfc; }
  html.aa-dark tr:nth-child(even) td { background: #161e1e; }
  .genus-col {
    font-style: italic;
    color: #4a7f82;
    font-weight: 600;
  }
  html.aa-dark .genus-col { color: #8ec5c8; }

  /* Hide/reveal genus for self-testing */
  .genus-hidden .genus-col {
    color: transparent;
    background: #e8f2f3;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.2s;
  }
  html.aa-dark .genus-hidden .genus-col {
    background: #2a3a3a;
  }
  .genus-hidden .genus-col.revealed {
    color: #4a7f82;
    background: transparent;
  }
  html.aa-dark .genus-hidden .genus-col.revealed { color: #8ec5c8; }

  /* Common name hidden mode */
  .common-hidden .common-col {
    color: transparent;
    background: #e8f2f3;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.2s;
  }
  html.aa-dark .common-hidden .common-col {
    background: #2a3a3a;
  }
  .common-hidden .common-col.revealed {
    color: #333;
    background: transparent;
  }
  html.aa-dark .common-hidden .common-col.revealed { color: #e0e0e0; }

  /* Search highlight */
  .highlight {
    background: #fff3cd;
    border-radius: 3px;
    padding: 0 2px;
  }
  html.aa-dark .highlight { background: #4a3d1a; }

  /* No results */
  .no-results {
    text-align: center;
    color: #aaa;
    padding: 20px;
    font-style: italic;
  }

  /* Totals bar */
  .totals {
    text-align: center;
    color: #888;
    font-size: 10pt;
    margin-bottom: 16px;
  }

  .credit {
    text-align: center;
    font-size: 0.7rem;
    color: #aaa;
    margin-top: 20px;
  }

  @media print {
    .controls, .back-link, #site-header, .credit { display: none !important; }
    .quiz-section h2 { background: #eee !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    th { background: #6CA0A3 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  }
</style>
</head>
<body>
<div id="site-header"></div>
<script>
    fetch('/Academic-Allies/modular/shared-header.html?v=20260318b')
      .then(function(response) { return response.text(); })
      .then(function(html) {
        var container = document.getElementById('site-header');
        container.innerHTML = html;
        var scripts = container.querySelectorAll('script');
        scripts.forEach(function(oldScript) {
          var newScript = document.createElement('script');
          Array.from(oldScript.attributes).forEach(function(attr) { newScript.setAttribute(attr.name, attr.value); });
          newScript.textContent = oldScript.textContent;
          oldScript.replaceWith(newScript);
        });
      })
      .catch(function(err) { console.warn('[AA] shared-header fetch failed:', err); });
</script>

<div class="sheet-container">
  <a href="/Academic-Allies/modular/static/study-tools.html" class="back-link">&larr; Back to Study Tools</a>

  <h1>📋 Floral ID Study Sheet</h1>
  <p class="subtitle">All 50 flowers organized by quiz category — tap to reveal for self-testing</p>

  <div class="controls">
    <input type="text" id="searchBox" placeholder="Search flowers..." oninput="filterFlowers()">
    <button id="hideGenusBtn" onclick="toggleHideGenus()">Hide Genus</button>
    <button id="hideCommonBtn" onclick="toggleHideCommon()">Hide Common</button>
    <button onclick="revealAll()">Reveal All</button>
    <button onclick="window.print()">Print</button>
  </div>

  <div class="totals" id="totalsBar">50 flowers across 5 quizzes</div>

  <div id="sheetContent"></div>
</div>

<p class="credit">Built by Claude for Bruise — March 2026</p>

<script>
/* Claude: 2026-03-17 — Floral ID study sheet with search, hide/reveal, and print */

var FLOWERS = {
  "1": { name: "Quiz 1: Mass Flowers", flowers: [
    { common: "Carnation", genus: "Dianthus" },
    { common: "Daisy Pom/Cushion Pom", genus: "Chrysanthemum" },
    { common: "Rose", genus: "Rosa" },
    { common: "Alstro", genus: "Alstroemeria" },
    { common: "Lisianthus", genus: "Eustoma" },
    { common: "Hydrangea", genus: "Hydrangea" },
    { common: "Peony", genus: "Paeonia" },
    { common: "Ranunculus", genus: "Ranunculus" },
    { common: "Safari Sunset", genus: "Leucadendron" },
    { common: "China Aster", genus: "Callistephus" }
  ]},
  "2": { name: "Quiz 2: Line Flowers", flowers: [
    { common: "Snapdragon", genus: "Antirrhinum" },
    { common: "Larkspur", genus: "Consolida" },
    { common: "Delphinium", genus: "Delphinium" },
    { common: "Liatris", genus: "Liatris" },
    { common: "Gladiola", genus: "Gladiolus" },
    { common: "Stock", genus: "Matthiola" },
    { common: "Bells of Ireland", genus: "Moluccella" },
    { common: "Baby Blue Eucalyptus", genus: "Eucalyptus" },
    { common: "Curly Willow", genus: "Salix" },
    { common: "Dendrobium Orchid", genus: "Dendrobium" }
  ]},
  "3": { name: "Quiz 3: Filler Flowers", flowers: [
    { common: "Solidago", genus: "Solidago" },
    { common: "Misty Blue", genus: "Limonium" },
    { common: "Statice", genus: "Limonium" },
    { common: "Queen Anne's Lace", genus: "Ammi" },
    { common: "Babies Breath", genus: "Gypsophila" },
    { common: "Waxflower", genus: "Chamelaucium" },
    { common: "Pixie Carnation", genus: "Dianthus" },
    { common: "Aster", genus: "Aster" },
    { common: "Hypericum Berries", genus: "Hypericum" },
    { common: "Sea Holly", genus: "Eryngium" }
  ]},
  "4": { name: "Quiz 4: Form/Focal Flowers", flowers: [
    { common: "Sunflower", genus: "Helianthus" },
    { common: "Calla Lily", genus: "Zantedeschia" },
    { common: "Tulip", genus: "Tulipa" },
    { common: "Bird of Paradise", genus: "Strelitzia" },
    { common: "Disbud Mum", genus: "Chrysanthemum" },
    { common: "Lily", genus: "Lilium" },
    { common: "Billy Balls", genus: "Craspedia" },
    { common: "Anthurium", genus: "Anthurium" },
    { common: "Iris", genus: "Iris" },
    { common: "Gerber Daisy", genus: "Gerbera" }
  ]},
  "5": { name: "Quiz 5: Foliage", flowers: [
    { common: "Leather Leaf", genus: "Rumohra" },
    { common: "Bear Grass", genus: "Xerophyllum" },
    { common: "Lily Grass", genus: "Liriope" },
    { common: "Seeded Eucalyptus", genus: "Eucalyptus" },
    { common: "Israeli Ruscus", genus: "Ruscus" },
    { common: "Italian Ruscus", genus: "Ruscus" },
    { common: "Salal/Lemon Leaf", genus: "Gaultheria" },
    { common: "Grevillea", genus: "Grevillea" },
    { common: "Pitt", genus: "Pittosporum" },
    { common: "Myrtle", genus: "Myrtus" }
  ]}
};

var hideGenus = false;
var hideCommon = false;

function buildSheet(filter) {
  var html = '';
  var totalShown = 0;
  var keys = ["1","2","3","4","5"];
  var filterLower = (filter || '').toLowerCase();

  keys.forEach(function(k) {
    var quiz = FLOWERS[k];
    var filtered = quiz.flowers.filter(function(f) {
      if (!filterLower) return true;
      return f.common.toLowerCase().indexOf(filterLower) !== -1 ||
             f.genus.toLowerCase().indexOf(filterLower) !== -1;
    });

    if (filtered.length === 0) return;
    totalShown += filtered.length;

    html += '<div class="quiz-section' +
      (hideGenus ? ' genus-hidden' : '') +
      (hideCommon ? ' common-hidden' : '') + '">';
    html += '<h2 onclick="toggleSection(this)">' + quiz.name +
      ' <span class="count">' + filtered.length + ' flower' + (filtered.length !== 1 ? 's' : '') + '</span>' +
      '<span class="toggle">▼</span></h2>';
    html += '<table><tr><th>Common Name</th><th>Genus (Botanical)</th></tr>';

    filtered.forEach(function(f) {
      var commonText = f.common;
      var genusText = f.genus;

      if (filterLower) {
        commonText = highlightMatch(commonText, filterLower);
        genusText = highlightMatch(genusText, filterLower);
      }

      html += '<tr><td class="common-col" onclick="revealCell(this)">' + commonText + '</td>' +
              '<td class="genus-col" onclick="revealCell(this)"><em>' + genusText + '</em></td></tr>';
    });

    html += '</table></div>';
  });

  if (totalShown === 0) {
    html = '<div class="no-results">No flowers match your search</div>';
  }

  document.getElementById('sheetContent').innerHTML = html;
  document.getElementById('totalsBar').textContent = totalShown + ' flower' + (totalShown !== 1 ? 's' : '') + ' shown';
}

function highlightMatch(text, term) {
  var idx = text.toLowerCase().indexOf(term);
  if (idx === -1) return text;
  return text.substring(0, idx) + '<span class="highlight">' + text.substring(idx, idx + term.length) + '</span>' + text.substring(idx + term.length);
}

function filterFlowers() {
  var val = document.getElementById('searchBox').value;
  buildSheet(val);
}

function toggleSection(h2) {
  var table = h2.nextElementSibling;
  var toggle = h2.querySelector('.toggle');
  if (table.style.display === 'none') {
    table.style.display = '';
    toggle.textContent = '▼';
  } else {
    table.style.display = 'none';
    toggle.textContent = '▶';
  }
}

function toggleHideGenus() {
  hideGenus = !hideGenus;
  if (hideGenus) hideCommon = false;
  updateHideButtons();
  buildSheet(document.getElementById('searchBox').value);
}

function toggleHideCommon() {
  hideCommon = !hideCommon;
  if (hideCommon) hideGenus = false;
  updateHideButtons();
  buildSheet(document.getElementById('searchBox').value);
}

function updateHideButtons() {
  var gBtn = document.getElementById('hideGenusBtn');
  var cBtn = document.getElementById('hideCommonBtn');
  gBtn.className = hideGenus ? 'active' : '';
  cBtn.className = hideCommon ? 'active' : '';
}

function revealCell(td) {
  td.classList.add('revealed');
}

function revealAll() {
  var cells = document.querySelectorAll('.genus-col, .common-col');
  for (var i = 0; i < cells.length; i++) {
    cells[i].classList.add('revealed');
  }
}

/* Build on load */
buildSheet();
</script>
</body>
</html>
