function getCurrentSemesterId() {
  var now = new Date();
  for (var i = 0; i < TRIMESTERS.length; i++) {
    var s = TRIMESTERS[i];
    if (now >= new Date(s.start) && now <= new Date(s.end + "T23:59:59")) {
      return s.id;
    }
  }
  /* If between semesters, show the most recent one as current */
  var latest = null;
  for (var j = TRIMESTERS.length - 1; j >= 0; j--) {
    if (now > new Date(TRIMESTERS[j].end + "T23:59:59")) {
      return null; /* All semesters are past */
    }
    latest = TRIMESTERS[j].id;
  }
  return latest;
}

function isSemesterPast(sem) {
  return new Date() > new Date(sem.end + "T23:59:59");
}

function buildCountdown(tool) {
  var examDate = new Date(tool.examDate + "T00:00:00");
  var now = new Date();
  var diff = examDate - now;
  var days = Math.ceil(diff / (1000 * 60 * 60 * 24));

  if (days < -7) return ""; /* Hide countdown more than a week after exam */

  var html = '<div class="exam-countdown">';
  if (days > 0) {
    html += '<div class="days">' + days + '</div>';
  } else if (days === 0) {
    html += '<div class="days" style="color:#c62828;">TODAY</div>';
  } else {
    html += '<div class="days" style="color:#888;font-size:16pt;">Exam passed</div>';
  }
  html += '<div class="label">' + tool.label + '</div>';
  html += '</div>';
  return html;
}

function buildCard(tool) {
  var html = '<div class="tool-card">';
  html += '<h3>' + tool.icon + ' ' + tool.title + '</h3>';
  html += '<p>' + tool.desc + '</p>';
  html += '<div class="tags">';
  tool.tags.forEach(function(t) {
    html += '<span class="tag">' + t + '</span>';
  });
  html += '</div>';
  html += '<a href="' + tool.href + '" class="play-btn">' + tool.btnText + '</a>';
  html += '</div>';
  return html;
}

/* Claude: 2026-03-25 — added aria-expanded toggle for a11y */
function toggleSemester(id) {
  var body = document.getElementById('sem-body-' + id);
  var arrow = document.getElementById('sem-arrow-' + id);
  var heading = body ? body.previousElementSibling : null;
  if (body.classList.contains('collapsed')) {
    body.classList.remove('collapsed');
    body.style.maxHeight = body.scrollHeight + 'px';
    arrow.classList.remove('collapsed');
    if (heading) heading.setAttribute('aria-expanded', 'true');
  } else {
    body.classList.add('collapsed');
    body.style.maxHeight = '0';
    arrow.classList.add('collapsed');
    if (heading) heading.setAttribute('aria-expanded', 'false');
  }
}

/* Claude: 2026-03-24 — Toggle collapsible tool groups within a semester */
/* Claude: 2026-03-25 — added aria-expanded toggle for a11y */
function toggleToolGroup(gId) {
  var body = document.getElementById('tg-body-' + gId);
  var arrow = document.getElementById('tg-arrow-' + gId);
  var heading = body ? body.previousElementSibling : null;
  if (!body) return;
  if (body.classList.contains('collapsed')) {
    body.classList.remove('collapsed');
    body.style.maxHeight = body.scrollHeight + 'px';
    if (arrow) arrow.classList.remove('collapsed');
    if (heading) heading.setAttribute('aria-expanded', 'true');
    /* Also recalc parent semester body max-height */
    var parent = body.closest('.semester-body');
    if (parent && !parent.classList.contains('collapsed')) {
      parent.style.maxHeight = parent.scrollHeight + body.scrollHeight + 'px';
    }
  } else {
    body.classList.add('collapsed');
    body.style.maxHeight = '0';
    if (arrow) arrow.classList.add('collapsed');
    if (heading) heading.setAttribute('aria-expanded', 'false');
  }
}

/* Claude: 2026-03-18 — hiddenTools from student config. Network leads can hide built-in tools. */
var _hiddenTools = [];
var _configLoaded = false;

function buildPage() {
  var currentId = getCurrentSemesterId();
  var html = '';

  TRIMESTERS.forEach(function(sem) {
    var past = isSemesterPast(sem);
    var isCurrent = (sem.id === currentId);
    var startCollapsed = past && !isCurrent;

    /* Semester heading */
    /* Claude: 2026-03-25 — added role, tabindex, aria-expanded, keyboard handler for a11y */
    html += '<div class="semester-heading" role="button" tabindex="0" aria-expanded="' + (startCollapsed ? 'false' : 'true') + '" onclick="toggleSemester(\'' + sem.id + '\')" onkeydown="if(event.key===\'Enter\'||event.key===\' \'){event.preventDefault();toggleSemester(\'' + sem.id + '\');}">';
    html += '<h2>' + sem.label + '</h2>';
    html += '<div class="sem-meta">';
    if (sem.bonus) {
      html += '<span class="sem-badge" style="background:#e8a838;">Bonus</span>';
    }
    if (isCurrent) {
      html += '<span class="sem-badge">Current Trimester</span>';
    } else if (past) {
      html += '<span class="sem-badge past">Past</span>';
    }
    html += '<span class="toggle-arrow' + (startCollapsed ? ' collapsed' : '') + '" id="sem-arrow-' + sem.id + '">▼</span>';
    html += '</div></div>';

    /* Semester body */
    html += '<div class="semester-body' + (startCollapsed ? ' collapsed' : '') + '" id="sem-body-' + sem.id + '"' +
            (startCollapsed ? ' style="max-height:0;"' : '') + '>';

    /* Claude: 2026-03-24 — Group tools by group property; ungrouped render first */
    var ungrouped = [];
    var groups = {};     /* groupName → [tool, ...] */
    var groupOrder = []; /* preserve first-seen order */
    sem.tools.forEach(function(tool) {
      if (tool.id && _hiddenTools.indexOf(tool.id) !== -1) return;
      if (tool.group) {
        if (!groups[tool.group]) { groups[tool.group] = []; groupOrder.push(tool.group); }
        groups[tool.group].push(tool);
      } else {
        ungrouped.push(tool);
      }
    });

    /* Render ungrouped tools first (e.g. Study Notes) */
    ungrouped.forEach(function(tool) {
      if (tool.type === "countdown") html += buildCountdown(tool);
      else if (tool.type === "card") html += buildCard(tool);
    });

    /* Render each group as a collapsible section */
    groupOrder.forEach(function(groupName) {
      var gTools = groups[groupName];
      var gId = 'tg-' + sem.id + '-' + groupName.replace(/[^a-zA-Z0-9]/g, '-').toLowerCase();
      var toolCount = gTools.filter(function(t) { return t.type === 'card'; }).length;

      /* Claude: 2026-03-25 — added role, tabindex, aria-expanded, keyboard handler for a11y */
      html += '<div class="tool-group-heading" role="button" tabindex="0" aria-expanded="true" onclick="toggleToolGroup(\'' + gId + '\')" onkeydown="if(event.key===\'Enter\'||event.key===\' \'){event.preventDefault();toggleToolGroup(\'' + gId + '\');}">';
      html += '<strong>🌸 ' + groupName + '</strong>';
      html += '<div class="tool-group-meta">';
      html += '<span class="tool-group-badge">' + toolCount + ' tool' + (toolCount !== 1 ? 's' : '') + '</span>';
      html += '<span class="tool-group-arrow" id="tg-arrow-' + gId + '">▼</span>';
      html += '</div></div>';
      html += '<div class="tool-group-body" id="tg-body-' + gId + '">';

      gTools.forEach(function(tool) {
        if (tool.type === "countdown") html += buildCountdown(tool);
        else if (tool.type === "card") html += buildCard(tool);
      });

      html += '</div>';
    });

    html += '</div>';
  });

  if (TRIMESTERS.length === 0) {
    html = '<div class="empty-past">No study tools yet — they\'ll appear here as you add classes!</div>';
  }

  document.getElementById('semesterContent').innerHTML = html;

  /* Set proper max-height for expanded sections and tool groups */
  TRIMESTERS.forEach(function(sem) {
    var body = document.getElementById('sem-body-' + sem.id);
    if (body && !body.classList.contains('collapsed')) {
      /* First set tool group bodies so parent can measure correctly */
      body.querySelectorAll('.tool-group-body').forEach(function(gb) {
        if (!gb.classList.contains('collapsed')) {
          gb.style.maxHeight = gb.scrollHeight + 'px';
        }
      });
      body.style.maxHeight = body.scrollHeight + 'px';
    }
  });

}

buildPage();

/* Claude: 2026-03-20 — Wait for Firebase auth, THEN load student config.
   buildPage() runs before shared-header finishes loading Firebase,
   so we poll until AA.auth is ready, then load config + custom quizzes. */
var _cfgPoll = setInterval(function() {
  if (!window.AA || !window.AA.auth || !window.AA.auth.currentUser) return;
  clearInterval(_cfgPoll);

  var _cfgUid = window.AA_MIRROR_UID || window.AA.auth.currentUser.uid;
  window.AA_CONFIG.load(_cfgUid).then(function(config) {
    /* Check for hidden tools — rebuild page if any are hidden */
    var hidden = window.AA_CONFIG.get('hiddenTools', []);
    if (hidden && hidden.length > 0) {
      _hiddenTools = hidden;
      buildPage();
    }
    /* Claude: 2026-03-20 — Render custom quizzes INSIDE their trimester sections.
       Quizzes with a trimester field go into the matching semester body.
       Quizzes without a trimester go into a fallback "Custom Quizzes" section.
       Within each location, quizzes are grouped by class (text before the colon). */
    var customQuizzes = window.AA_CONFIG.get('quizzes', []);
    if (customQuizzes && customQuizzes.length > 0) {

      /* Claude: 2026-03-21 — Load quiz progress for score indicators */
      var _progressData = {};
      var _progressUid = window.AA_MIRROR_UID || window.AA.auth.currentUser.uid;
      firebase.firestore().collection('quizProgress').doc(_progressUid).get().then(function(doc) {
        if (doc.exists) _progressData = doc.data();
        renderScoreIndicators(_progressData);
      }).catch(function() { /* ignore — indicators just won't show */ });

      function renderScoreIndicators(pdata) {
        document.querySelectorAll('[data-quiz-idx]').forEach(function(card) {
          var qi = card.getAttribute('data-quiz-idx');
          var key = 'quiz_' + qi;
          var p = pdata[key];
          if (!p) return;
          var dot = card.querySelector('.score-dot');
          if (!dot) return;
          var pct = p.bestPct || 0;
          var color = pct >= 80 ? '#4caf50' : pct >= 50 ? '#ff9800' : '#f44336';
          var label = pct >= 80 ? 'Mastered' : pct >= 50 ? 'Learning' : 'Needs Work';
          dot.style.display = 'inline-block';
          dot.style.background = color;
          dot.title = label + ' — Best: ' + pct + '%';
          var scoreText = card.querySelector('.score-text');
          if (scoreText) {
            scoreText.textContent = 'Best: ' + pct + '%';
            scoreText.style.color = color;
          }
        });
      }

      /* Sort quizzes by trimester, then group by class within each */
      var byTrimester = {};  /* trimesterId → [{quiz, idx, shortTitle}] */
      /* Claude: 2026-03-23 — escape helper for Firestore quiz data */
      function esc(s) { return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
      var orphans = [];       /* quizzes without a trimester field */

      customQuizzes.forEach(function(quiz, idx) {
        var title = quiz.title || 'Custom Quiz';
        var colonIdx = title.indexOf(':');
        var shortTitle = colonIdx > -1 ? title.substring(colonIdx + 1).trim() : title;
        var entry = { quiz: quiz, idx: idx, shortTitle: shortTitle };

        if (quiz.trimester) {
          if (!byTrimester[quiz.trimester]) byTrimester[quiz.trimester] = [];
          byTrimester[quiz.trimester].push(entry);
        } else {
          orphans.push(entry);
        }
      });

      /* Helper: build quiz cards grouped by class prefix */
      function buildQuizGroup(entries) {
        var groups = {};
        var groupOrder = [];
        entries.forEach(function(entry) {
          var title = entry.quiz.title || '';
          var colonIdx = title.indexOf(':');
          var groupName = colonIdx > -1 ? title.substring(0, colonIdx).trim() : 'Other';
          if (!groups[groupName]) { groups[groupName] = []; groupOrder.push(groupName); }
          groups[groupName].push(entry);
        });

        var html = '';
        groupOrder.forEach(function(groupName) {
          var groupId = 'quiz-group-' + groupName.replace(/[^a-zA-Z0-9]/g, '-').toLowerCase() + '-' + Date.now();
          var quizCount = groups[groupName].length;

          html += '<div style="margin: 16px 0 8px; padding: 8px 12px; background: rgba(108,160,163,0.1); border-radius: 8px;">';
          /* Claude: 2026-03-25 — added role, tabindex, aria-expanded, keyboard handler for a11y */
          html += '<div style="display:flex; justify-content:space-between; align-items:center; cursor:pointer;" role="button" tabindex="0" aria-expanded="true" onclick="var b=document.getElementById(\'' + groupId + '\');var exp=b.style.display===\'none\';b.style.display=exp?\'block\':\'none\';this.setAttribute(\'aria-expanded\',exp?\'true\':\'false\');" onkeydown="if(event.key===\'Enter\'||event.key===\' \'){event.preventDefault();this.click();}">';
          html += '<strong style="color: #4a7f82;">' + groupName + '</strong>';
          html += '<span style="color:#888; font-size:0.85rem;">' + quizCount + ' quiz' + (quizCount !== 1 ? 'zes' : '') + ' ▼</span>';
          html += '</div>';
          html += '<div id="' + groupId + '">';

          groups[groupName].forEach(function(entry) {
            var quiz = entry.quiz;
            var typeIcon = quiz.type === 'fill-blank' ? '✏️ ' : quiz.type === 'match' ? '🎯 ' : '🃏 ';
            var typeLabel = quiz.type === 'fill-blank' ? 'Fill-in-the-Blank' : quiz.type === 'match' ? 'Match Game' : 'Flashcards';
            var itemCount = quiz.data ? quiz.data.length : 0;

            html += '<div class="tool-card" data-quiz-idx="' + entry.idx + '">';
            /* Claude: 2026-03-23 — escape Firestore quiz data to prevent XSS */
            html += '<h3>' + typeIcon + esc(entry.shortTitle);
            html += ' <span class="score-dot" style="display:none;width:12px;height:12px;border-radius:50%;vertical-align:middle;margin-left:6px;"></span>';
            html += '</h3>';
            html += '<p>' + esc(quiz.description || '') + '</p>';
            html += '<div class="tags">';
            html += '<span class="tag">' + typeLabel + '</span>';
            if (itemCount > 0) html += '<span class="tag">' + itemCount + ' items</span>';
            html += '<span class="tag score-text" style="font-weight:600;"></span>';
            html += '</div>';
            html += '<a href="/Academic-Allies/modular/static/custom-quiz.html?quiz=' + entry.idx + '" class="play-btn">Start Quiz</a>';
            html += '</div>';
          });

          html += '</div></div>';
        });
        return html;
      }

      /* Inject quizzes into their trimester sections */
      for (var trimId in byTrimester) {
        var semBody = document.getElementById('sem-body-' + trimId);
        if (semBody) {
          var quizHtml = '<div style="margin-top: 16px; border-top: 2px solid #e8f2f3; padding-top: 12px;">';
          quizHtml += '<h3 style="color: #6CA0A3; font-size: 13pt; margin-bottom: 4px;">Custom Quizzes</h3>';
          quizHtml += buildQuizGroup(byTrimester[trimId]);
          quizHtml += '</div>';
          semBody.innerHTML += quizHtml;

          /* Recalculate max-height if section is expanded */
          if (!semBody.classList.contains('collapsed')) {
            semBody.style.maxHeight = semBody.scrollHeight + 'px';
          }
        } else {
          /* Trimester ID doesn't match any section — treat as orphans */
          orphans = orphans.concat(byTrimester[trimId]);
        }
      }

      /* Fallback section for quizzes without a trimester */
      if (orphans.length > 0) {
        var fallbackHtml = '<div style="margin-top: 24px;">';
        /* Claude: 2026-03-25 — added role, tabindex, aria-expanded, keyboard handler for a11y */
        fallbackHtml += '<div class="semester-heading" role="button" tabindex="0" aria-expanded="true" onclick="toggleSemester(\'orphan-quizzes\')" onkeydown="if(event.key===\'Enter\'||event.key===\' \'){event.preventDefault();toggleSemester(\'orphan-quizzes\');}">';
        fallbackHtml += '<h2>Custom Quizzes</h2>';
        fallbackHtml += '<div class="sem-meta">';
        fallbackHtml += '<span class="sem-badge">' + orphans.length + ' quiz' + (orphans.length !== 1 ? 'zes' : '') + '</span>';
        fallbackHtml += '<span class="toggle-arrow" id="sem-arrow-orphan-quizzes">▼</span>';
        fallbackHtml += '</div></div>';
        fallbackHtml += '<div class="semester-body" id="sem-body-orphan-quizzes">';
        fallbackHtml += buildQuizGroup(orphans);
        fallbackHtml += '</div></div>';
        document.getElementById('semesterContent').innerHTML += fallbackHtml;
        /* Set max-height for orphan section */
        var orphanBody = document.getElementById('sem-body-orphan-quizzes');
        if (orphanBody) orphanBody.style.maxHeight = orphanBody.scrollHeight + 'px';
      }
    }
  }).catch(function(err) {
    console.warn('[Study Tools] Custom quiz load failed:', err);
  });
}, 250);
</script>
</body>
</html>
