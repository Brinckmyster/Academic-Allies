<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" href="/Academic-Allies/favicon.ico">
<!-- Claude: 2026-03-23 — early dark mode detect to prevent FOUC -->
<script>try{if(localStorage.getItem("AA_DARK_MODE")==="true"){document.documentElement.classList.add("aa-dark");document.write('<style id="aa-dark-early">html.aa-dark{color-scheme:dark}html.aa-dark body{background:#121212!important;color:#e0e0e0!important}</style>')}}catch(e){}</script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spelling Sheet — Academic Allies</title>
<!-- Claude: 2026-03-23 — Spelling reference sheet created from Mary's spelling sheet photo.
     Lists all flower common names, genus names, and alternate names for spelling practice.
     Organized by quiz category. Includes self-test mode (hide columns) and print support. -->
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Atkinson Hyperlegible', Arial, sans-serif;
    background: #FAFAF9;
    min-height: 100vh;
    padding: 0 12px 40px;
    color: #333;
  }
  html.aa-dark body { background: #121212; color: #e0e0e0; }

  .sheet-container {
    max-width: 800px;
    margin: 0 auto;
    padding-top: 12px;
  }
  .back-link {
    display: inline-block;
    color: #6CA0A3;
    text-decoration: none;
    font-size: 11pt;
    margin-bottom: 8px;
  }
  .back-link:hover { text-decoration: underline; }
  html.aa-dark .back-link { color: #8ec5c8; }

  h1 {
    color: #4a7f82;
    font-size: 20pt;
    margin-bottom: 4px;
  }
  html.aa-dark h1 { color: #8ec5c8; }
  .subtitle {
    color: #888;
    font-size: 11pt;
    margin-bottom: 16px;
  }

  /* Controls */
  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 16px;
    align-items: center;
  }
  .controls button {
    padding: 7px 14px;
    border: 2px solid #6CA0A3;
    border-radius: 20px;
    background: #fff;
    color: #4a7f82;
    font-weight: 600;
    font-size: 10pt;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.2s;
  }
  html.aa-dark .controls button {
    background: #1e1e1e;
    color: #8ec5c8;
    border-color: #3a5a5c;
  }
  .controls button:hover, .controls button.active {
    background: #6CA0A3;
    color: #fff;
  }
  html.aa-dark .controls button:hover, html.aa-dark .controls button.active {
    background: #4a7f82;
    color: #fff;
  }
  .controls input[type="text"] {
    padding: 7px 14px;
    border: 2px solid #d0d0d0;
    border-radius: 20px;
    font-size: 10pt;
    font-family: inherit;
    outline: none;
    width: 180px;
  }
  html.aa-dark .controls input[type="text"] {
    background: #1e1e1e;
    border-color: #3a3f40;
    color: #e0e0e0;
  }
  .controls input:focus { border-color: #6CA0A3; }

  /* Totals */
  .totals {
    font-size: 10pt;
    color: #888;
    margin-bottom: 12px;
  }

  /* Quiz section */
  .quiz-section {
    margin-bottom: 20px;
  }
  .quiz-header {
    background: #6CA0A3;
    color: #fff;
    padding: 10px 16px;
    border-radius: 10px 10px 0 0;
    font-weight: 700;
    font-size: 12pt;
  }
  html.aa-dark .quiz-header { background: #3a6a6d; }

  /* Table */
  .spell-table {
    width: 100%;
    border-collapse: collapse;
    border: 1px solid #e1e5e9;
    border-top: none;
    border-radius: 0 0 10px 10px;
    overflow: hidden;
    margin-bottom: 0;
  }
  html.aa-dark .spell-table { border-color: #3a3f40; }

  .spell-table th {
    background: #f0f7f7;
    color: #4a7f82;
    font-size: 10pt;
    font-weight: 700;
    padding: 8px 12px;
    text-align: left;
    border-bottom: 2px solid #d0e0e0;
  }
  html.aa-dark .spell-table th {
    background: #1a2a2b;
    color: #8ec5c8;
    border-bottom-color: #3a5a5c;
  }

  .spell-table td {
    padding: 7px 12px;
    font-size: 11pt;
    border-bottom: 1px solid #f0f4f4;
    vertical-align: top;
  }
  html.aa-dark .spell-table td { border-bottom-color: #2a2a2a; }

  .spell-table tr:last-child td { border-bottom: none; }

  .spell-table tr:hover td {
    background: #f5fafa;
  }
  html.aa-dark .spell-table tr:hover td {
    background: #1a2a2b;
  }

  /* Column styles */
  .col-common { font-weight: 600; color: #333; }
  html.aa-dark .col-common { color: #e0e0e0; }
  .col-genus { font-style: italic; color: #4a7f82; }
  html.aa-dark .col-genus { color: #8ec5c8; }
  .col-alt { color: #888; font-size: 10pt; }
  html.aa-dark .col-alt { color: #999; }

  /* Hidden mode for self-testing */
  .hidden-col {
    color: transparent !important;
    background: repeating-linear-gradient(
      90deg, #e8f0f0 0px, #e8f0f0 8px, transparent 8px, transparent 10px
    );
    border-radius: 4px;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
  }
  html.aa-dark .hidden-col {
    background: repeating-linear-gradient(
      90deg, #2a3a3b 0px, #2a3a3b 8px, transparent 8px, transparent 10px
    );
  }
  .hidden-col:hover {
    opacity: 0.7;
  }
  .hidden-col.revealed {
    color: inherit !important;
    background: #e8ffe8 !important;
  }
  html.aa-dark .hidden-col.revealed {
    background: #1a2a1a !important;
  }

  /* Freebie highlight */
  .freebie {
    position: relative;
  }
  .freebie::after {
    content: '✓';
    color: #28a745;
    font-weight: 700;
    margin-left: 6px;
    font-size: 9pt;
  }

  /* Shared genus indicator */
  .shared-genus {
    font-size: 8pt;
    background: #e8f0f0;
    color: #4a7f82;
    padding: 1px 6px;
    border-radius: 8px;
    margin-left: 6px;
    white-space: nowrap;
  }
  html.aa-dark .shared-genus {
    background: #1a2a2b;
    color: #8ec5c8;
  }

  /* Credit */
  .credit {
    text-align: center;
    color: #bbb;
    font-size: 9pt;
    margin-top: 20px;
    padding: 12px;
  }

  /* Print styles */
  @media print {
    body { background: #fff !important; color: #000 !important; padding: 0; }
    .controls, .back-link, .credit, #site-header { display: none !important; }
    .sheet-container { max-width: 100%; padding: 0; }
    h1 { font-size: 16pt; color: #333 !important; }
    .subtitle { color: #666 !important; }
    .quiz-header { background: #6CA0A3 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .spell-table { page-break-inside: avoid; }
    .spell-table th { background: #f0f7f7 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .hidden-col { color: inherit !important; background: none !important; }
    .col-genus { color: #4a7f82 !important; }
    .shared-genus { background: #e8f0f0 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  }

  /* Mobile */
  @media (max-width: 600px) {
    .spell-table td, .spell-table th { padding: 6px 8px; font-size: 10pt; }
    .col-alt { font-size: 9pt; }
    .controls input[type="text"] { width: 140px; }
    h1 { font-size: 17pt; }
  }
</style>
</head>
<body>
<script>var AA_MODE_GATE = 'flowerQuiz';</script>
<script src="/Academic-Allies/modular/js/mode-gate.js"></script>
<div id="site-header"></div>
<script>
    fetch('/Academic-Allies/modular/shared-header.html?v=20260402')
      .then(function(response) { return response.text(); })
      .then(function(html) {
        var container = document.getElementById('site-header');
        container.innerHTML = html;
        var scripts = container.querySelectorAll('script');
        scripts.forEach(function(oldScript) {
          var newScript = document.createElement('script');
          /* Claude: 2026-03-25 — replaced Array.from() (ES2015) with [].slice.call() for ES5 compat */
          [].slice.call(oldScript.attributes).forEach(function(attr) { newScript.setAttribute(attr.name, attr.value); });
          newScript.textContent = oldScript.textContent;
          oldScript.parentNode.replaceChild(newScript, oldScript);
        });
      })
      .catch(function(err) { console.warn('[AA] shared-header fetch failed:', err); /* Claude: 2026-03-30 — W9 fix: show fallback nav if header load fails */ var _h = document.getElementById('site-header'); if (_h && !_h.innerHTML.trim()) _h.innerHTML = '<nav style="padding:8px 16px;background:#333;color:#fff;font-size:13px;">Navigation unavailable — please refresh the page</nav>'; });
</script>

<div class="sheet-container">
  <a href="/Academic-Allies/modular/static/study-tools.html" class="back-link">&larr; Back to Study Tools</a>

  <h1>🔤 Spelling Sheet</h1>
  <p class="subtitle">All flower names — common, genus, and alternate — for spelling practice. From Mary's master list.</p>

  <div class="controls">
    <input type="text" id="searchBox" placeholder="Search flowers..." oninput="filterFlowers()">
    <button id="hideGenusBtn" onclick="toggleHideGenus()">Hide Genus</button>
    <button id="hideCommonBtn" onclick="toggleHideCommon()">Hide Common</button>
    <button onclick="revealAll()">Reveal All</button>
    <button onclick="window.print()">🖨️ Print</button>
  </div>

  <div class="totals" id="totalsBar"></div>

  <div id="sheetContent"></div>
</div>

<p class="credit">Built by Claude for Bruise — March 2026 · Source: Mary's Spelling Sheet</p>

<script>
/* Claude: 2026-03-23 — Spelling reference sheet with all flowers, genus, and alternate names.
   Supports hide/reveal for self-testing, search filter, and print mode.
   Data sourced from Mary's handwritten spelling sheet + existing quiz bank. */

var SPELLING_DATA = {
  "1": { name: "Quiz 1 — Mass Flowers", flowers: [
    { common: "Carnation", genus: "Dianthus", alts: [] },
    { common: "Daisy Pom", genus: "Chrysanthemum", alts: ["Cushion Pom"] },
    { common: "Rose", genus: "Rosa", alts: [] },
    { common: "Alstro", genus: "Alstroemeria", alts: ["Peruvian Lily", "Lily of the Incas"] },
    { common: "Lisianthus", genus: "Eustoma", alts: [] },
    { common: "Hydrangea", genus: "Hydrangea", alts: [] },
    { common: "Peony", genus: "Paeonia", alts: [] },
    { common: "Ranunculus", genus: "Ranunculus", alts: [] },
    { common: "Safari Sunset", genus: "Leucadendron", alts: [] },
    { common: "China Aster", genus: "Callistephus", alts: ["Crown Aster", "Matsumoto Aster"] }
  ]},
  "2": { name: "Quiz 2 — Line Flowers", flowers: [
    { common: "Snapdragon", genus: "Antirrhinum", alts: [] },
    { common: "Larkspur", genus: "Consolida", alts: [] },
    { common: "Delphinium", genus: "Delphinium", alts: [] },
    { common: "Liatris", genus: "Liatris", alts: [] },
    { common: "Gladiola", genus: "Gladiolus", alts: [] },
    { common: "Stock", genus: "Matthiola", alts: [] },
    { common: "Bells of Ireland", genus: "Moluccella", alts: [] },
    { common: "Baby Blue Eucalyptus", genus: "Eucalyptus", alts: [] },
    { common: "Curly Willow", genus: "Salix", alts: [] },
    { common: "Dendrobium Orchid", genus: "Dendrobium", alts: [] }
  ]},
  "3": { name: "Quiz 3 — Filler Flowers", flowers: [
    { common: "Solidago", genus: "Solidago", alts: [] },
    { common: "Misty Blue", genus: "Limonium", alts: [] },
    { common: "Statice", genus: "Limonium", alts: ["Caspia"] },
    { common: "Queen Anne's Lace", genus: "Ammi", alts: [] },
    { common: "Babies Breath", genus: "Gypsophila", alts: [] },
    { common: "Waxflower", genus: "Chamelaucium", alts: [] },
    { common: "Pixie Carnation", genus: "Dianthus", alts: ["Spray Carnation", "Mini Carnation"] },
    { common: "Aster", genus: "Aster", alts: [] },
    { common: "Hypericum Berries", genus: "Hypericum", alts: [] },
    { common: "Sea Holly", genus: "Eryngium", alts: [] }
  ]},
  "4": { name: "Quiz 4 — Form / Focal Flowers", flowers: [
    { common: "Sunflower", genus: "Helianthus", alts: [] },
    { common: "Calla Lily", genus: "Zantedeschia", alts: [] },
    { common: "Tulip", genus: "Tulipa", alts: [] },
    { common: "Bird of Paradise", genus: "Strelitzia", alts: [] },
    { common: "Disbud Mum", genus: "Chrysanthemum", alts: [] },
    { common: "Lily", genus: "Lilium", alts: [] },
    { common: "Billy Balls", genus: "Craspedia", alts: [] },
    { common: "Anthurium", genus: "Anthurium", alts: [] },
    { common: "Iris", genus: "Iris", alts: [] },
    { common: "Gerber Daisy", genus: "Gerbera", alts: [] }
  ]},
  "5": { name: "Quiz 5 — Foliage / Greens", flowers: [
    { common: "Leather Leaf", genus: "Rumohra", alts: [] },
    { common: "Bear Grass", genus: "Xerophyllum", alts: [] },
    { common: "Lily Grass", genus: "Liriope", alts: [] },
    { common: "Seeded Eucalyptus", genus: "Eucalyptus", alts: [] },
    { common: "Israeli Ruscus", genus: "Ruscus", alts: [] },
    { common: "Italian Ruscus", genus: "Ruscus", alts: [] },
    { common: "Salal", genus: "Gaultheria", alts: ["Lemon Leaf"] },
    { common: "Grevillea", genus: "Grevillea", alts: [] },
    { common: "Pitt", genus: "Pittosporum", alts: [] },
    { common: "Myrtle", genus: "Myrtus", alts: [] }
  ]}
};

/* Track shared genus names for indicator badges */
var _genusCount = {};
for (var q in SPELLING_DATA) {
  SPELLING_DATA[q].flowers.forEach(function(f) {
    _genusCount[f.genus] = (_genusCount[f.genus] || 0) + 1;
  });
}

var _hideGenus = false;
var _hideCommon = false;
var _searchTerm = '';

function isFreebie(f) {
  return f.common.toLowerCase() === f.genus.toLowerCase();
}

function renderSheet() {
  var container = document.getElementById('sheetContent');
  var html = '';
  var totalFlowers = 0;
  var totalAlts = 0;

  for (var q in SPELLING_DATA) {
    var quiz = SPELLING_DATA[q];
    var visibleFlowers = quiz.flowers.filter(function(f) {
      if (!_searchTerm) return true;
      var term = _searchTerm.toLowerCase();
      return f.common.toLowerCase().indexOf(term) !== -1 ||
             f.genus.toLowerCase().indexOf(term) !== -1 ||
             f.alts.some(function(a) { return a.toLowerCase().indexOf(term) !== -1; });
    });

    if (visibleFlowers.length === 0) continue;

    html += '<div class="quiz-section">';
    html += '<div class="quiz-header">' + quiz.name + '</div>';
    html += '<table class="spell-table">';
    html += '<tr><th style="width:30%">Common Name</th><th style="width:30%">Genus</th><th style="width:40%">Also Known As</th></tr>';

    visibleFlowers.forEach(function(f) {
      var free = isFreebie(f);
      var commonClass = 'col-common' + (_hideCommon ? ' hidden-col' : '') + (free ? ' freebie' : '');
      var genusClass = 'col-genus' + (_hideGenus ? ' hidden-col' : '') + (free ? ' freebie' : '');

      /* Shared genus badge */
      var sharedBadge = '';
      if (_genusCount[f.genus] > 1) {
        sharedBadge = '<span class="shared-genus">shared</span>';
      }

      /* Alt names */
      var altText = f.alts.length > 0 ? f.alts.join(', ') : '<span style="color:#ccc">—</span>';

      html += '<tr>';
      html += '<td class="' + commonClass + '" onclick="revealCell(this)">' + f.common + '</td>';
      html += '<td class="' + genusClass + '" onclick="revealCell(this)">' + f.genus + sharedBadge + '</td>';
      html += '<td class="col-alt">' + altText + '</td>';
      html += '</tr>';

      totalFlowers++;
      totalAlts += f.alts.length;
    });

    html += '</table></div>';
  }

  container.innerHTML = html;

  var totals = document.getElementById('totalsBar');
  totals.textContent = totalFlowers + ' flowers · ' + totalAlts + ' alternate names · ' +
    Object.keys(_genusCount).filter(function(g) { return _genusCount[g] > 1; }).length + ' shared genera';
}

function revealCell(el) {
  if (el.classList.contains('hidden-col')) {
    el.classList.add('revealed');
  }
}

function toggleHideGenus() {
  _hideGenus = !_hideGenus;
  var btn = document.getElementById('hideGenusBtn');
  btn.textContent = _hideGenus ? 'Show Genus' : 'Hide Genus';
  if (_hideGenus) btn.classList.add('active'); else btn.classList.remove('active');
  renderSheet();
}

function toggleHideCommon() {
  _hideCommon = !_hideCommon;
  var btn = document.getElementById('hideCommonBtn');
  btn.textContent = _hideCommon ? 'Show Common' : 'Hide Common';
  if (_hideCommon) btn.classList.add('active'); else btn.classList.remove('active');
  renderSheet();
}

function revealAll() {
  _hideGenus = false;
  _hideCommon = false;
  document.getElementById('hideGenusBtn').textContent = 'Hide Genus';
  document.getElementById('hideCommonBtn').textContent = 'Hide Common';
  document.getElementById('hideGenusBtn').classList.remove('active');
  document.getElementById('hideCommonBtn').classList.remove('active');
  renderSheet();
}

function filterFlowers() {
  _searchTerm = document.getElementById('searchBox').value.trim();
  renderSheet();
}

/* Init */
renderSheet();
</script>
</body>
</html>
