<script>

var FLOWERS = {

    { common: "Statice", genus: "Limonium" },
    { common: "Queen Anne's Lace", genus: "Ammi" },
    { common: "Babies Breath", genus: "Gypsophila" },
    { common: "Waxflower", genus: "Chamelaucium" },
    { common: "Pixie Carnation", genus: "Dianthus" },
    { common: "Aster", genus: "Aster" },
    { common: "Hypericum Berries", genus: "Hypericum" },
    { common: "Sea Holly", genus: "Eryngium" }
  ],
  "4": [
    { common: "Sunflower", genus: "Helianthus" },
    { common: "Calla Lily", genus: "Zantedeschia" },
    { common: "Tulip", genus: "Tulipa" },
    { common: "Bird of Paradise", genus: "Strelitzia" },
    { common: "Disbud Mum", genus: "Chrysanthemum" },
    { common: "Lily", genus: "Lilium" },
    { common: "Billy Balls", genus: "Craspedia" },
    { common: "Anthurium", genus: "Anthurium" },
    { common: "Iris", genus: "Iris" },
    { common: "Gerber Daisy", genus: "Gerbera" }
  ],
  /* Claude: 2026-03-17 — Quiz 5 updated from Mary's study guide screenshot */
  "5": [
    { common: "Leather Leaf", genus: "Rumohra" },
    { common: "Bear Grass", genus: "Xerophyllum" },
    { common: "Lily Grass", genus: "Liriope" },
    { common: "Seeded Eucalyptus", genus: "Eucalyptus" },
    { common: "Israeli Ruscus", genus: "Ruscus" },
    { common: "Italian Ruscus", genus: "Ruscus" },
    { common: "Salal/Lemon Leaf", genus: "Gaultheria" },
    { common: "Grevillea", genus: "Grevillea" },
    { common: "Pitt", genus: "Pittosporum" },
    { common: "Myrtle", genus: "Myrtus" }
  ]
};

var QUIZ_NAMES = {
  "1": "Quiz 1: Mass Flowers",
  "2": "Quiz 2: Line Flowers",
  "3": "Quiz 3: Filler Flowers",
  "4": "Quiz 4: Form/Focal Flowers",
  "5": "Quiz 5: Foliage"
};

var state = {
  flowers: [],
  selectedCommon: null,
  selectedGenus: null,
  correct: 0,
  misses: 0,
  total: 0,
  matched: 0
};

/* Claude: 2026-03-17 — Reverse mode: genus on left, common on right */
var reverseMode = false;

function toggleReverse() {
  reverseMode = !reverseMode;
  var btn = document.getElementById('reverseToggle');
  if (reverseMode) {
    btn.textContent = 'Mode: Genus → Common';
    btn.classList.add('active-mode');
  } else {
    btn.textContent = 'Mode: Common → Genus';
    btn.classList.remove('active-mode');
  }
  loadQuiz();
}

/* Timer */
var timerEnabled = false;
var timerInterval = null;
var timerSeconds = 0;

function toggleTimer() {
  timerEnabled = !timerEnabled;
  var btn = document.getElementById('timerToggle');
  btn.textContent = timerEnabled ? 'Timer: On' : 'Timer: Off';
  if (timerEnabled) {
    btn.classList.add('active-mode');
  } else {
    btn.classList.remove('active-mode');
  }
  document.getElementById('timerBar').className = timerEnabled ? 'timer-bar active' : 'timer-bar';
  if (!timerEnabled) stopTimer();
}

function startTimer() {
  timerSeconds = 0;
  updateTimerDisplay();
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(function() {
    timerSeconds++;
    updateTimerDisplay();
  }, 1000);
}

function stopTimer() {
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
}

function updateTimerDisplay() {
  var m = Math.floor(timerSeconds / 60);
  var s = timerSeconds % 60;
  document.getElementById('timerDisplay').textContent = m + ':' + (s < 10 ? '0' : '') + s;
}

/* Best scores — localStorage */
function getBestKey() {
  /* Claude: 2026-03-17 — separate best scores for normal vs reverse mode */
  return 'AA_MATCH_BEST_' + document.getElementById('quizPicker').value + (reverseMode ? '_REV' : '');
}

function loadBestScore() {
  try {
    var key = getBestKey();
    var best = JSON.parse(localStorage.getItem(key));
    if (best) {
      var parts = [];
      parts.push(best.accuracy + '% accuracy');
      if (best.time) parts.push(best.time + 's');
      document.getElementById('bestScoreDisplay').textContent = 'Best: ' + parts.join(' in ');
    } else {
      document.getElementById('bestScoreDisplay').textContent = '';
    }
  } catch(e) {
    document.getElementById('bestScoreDisplay').textContent = '';
  }
}

function saveBestScore(accuracy, time) {
  try {
    var key = getBestKey();
    var best = JSON.parse(localStorage.getItem(key));
    var isNew = false;
    if (!best || accuracy > best.accuracy || (accuracy === best.accuracy && time && best.time && time < best.time)) {
      localStorage.setItem(key, JSON.stringify({ accuracy: accuracy, time: time || null }));
      isNew = true;
    }
    return isNew;
  } catch(e) { return false; }
}

/* Study Sheet */
function toggleStudySheet() {
  var sheet = document.getElementById('studySheet');
  var game = document.getElementById('gameArea');
  var scoreBar = document.getElementById('scoreBarArea');
  var btn = document.getElementById('sheetToggle');
  var banner = document.getElementById('completeBanner');

  if (sheet.classList.contains('active')) {
    sheet.classList.remove('active');
    game.style.display = '';
    scoreBar.style.display = '';
    btn.classList.remove('active-mode');
    btn.textContent = 'Study Sheet';
  } else {
    buildStudySheet();
    sheet.classList.add('active');
    game.style.display = 'none';
    scoreBar.style.display = 'none';
    banner.style.display = 'none';
    btn.classList.add('active-mode');
    btn.textContent = 'Back to Game';
    stopTimer();
  }
}

function buildStudySheet() {
  var html = '';
  var keys = ["1","2","3","4","5"];
  keys.forEach(function(k) {
    html += '<h2>' + QUIZ_NAMES[k] + '</h2>';
    html += '<table><tr><th>Common Name</th><th>Genus (Botanical)</th></tr>';
    FLOWERS[k].forEach(function(f) {
      html += '<tr><td>' + f.common + '</td><td class="genus-col"><em>' + f.genus + '</em></td></tr>';
    });
    html += '</table>';
  });
  document.getElementById('studySheet').innerHTML = html;
}

/* Shuffle */
function shuffle(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
  }
  return a;
}

/* Load quiz */
function loadQuiz() {
  /* Close study sheet if open */
  var sheet = document.getElementById('studySheet');
  if (sheet.classList.contains('active')) {
    sheet.classList.remove('active');
    document.getElementById('gameArea').style.display = '';
    document.getElementById('scoreBarArea').style.display = '';
    document.getElementById('sheetToggle').classList.remove('active-mode');
    document.getElementById('sheetToggle').textContent = 'Study Sheet';
  }

  var pick = document.getElementById("quizPicker").value;
  var pool = [];

  if (pick === "all") {
    pool = FLOWERS["1"].concat(FLOWERS["2"]).concat(FLOWERS["3"]).concat(FLOWERS["4"]).concat(FLOWERS["5"]);
  } else if (pick === "random10") {
    var all = FLOWERS["1"].concat(FLOWERS["2"]).concat(FLOWERS["3"]).concat(FLOWERS["4"]).concat(FLOWERS["5"]);
    pool = shuffle(all).slice(0, 10);
  } else {
    pool = (FLOWERS[pick] || []).slice();
  }

  /* Handle duplicate genus names — add common name hint for disambiguation */
  var genusCounts = {};
  pool.forEach(function(f) {
    genusCounts[f.genus] = (genusCounts[f.genus] || 0) + 1;
  });

  state.flowers = pool;
  state.selectedCommon = null;
  state.selectedGenus = null;
  state.correct = 0;
  state.misses = 0;
  state.total = pool.length;
  state.matched = 0;

  var colLeft = document.getElementById("colLeft");
  var colRight = document.getElementById("colRight");

  /* Claude: 2026-03-17 — reverse mode swaps columns */
  var leftLabel = reverseMode ? "Genus Name" : "Common Name";
  var rightLabel = reverseMode ? "Common Name" : "Genus Name";
  colLeft.innerHTML = '<div class="col-header">' + leftLabel + '</div>';
  colRight.innerHTML = '<div class="col-header">' + rightLabel + '</div>';

  /* Update instruction text */
  document.getElementById("instrText").textContent = reverseMode
    ? "Tap a genus name, then tap its common name to match!"
    : "Tap a common name, then tap its genus to match!";

  /* Build left-side cards (draggable / first-pick) */
  var leftData = shuffle(pool.map(function(f, i) {
    return { text: reverseMode ? f.genus : f.common, idx: i, genus: f.genus, common: f.common, isDup: reverseMode && genusCounts[f.genus] > 1 };
  }));
  /* Build right-side cards (drop targets / second-pick) */
  var rightData = shuffle(pool.map(function(f, i) {
    return { text: reverseMode ? f.common : f.genus, idx: i, genus: f.genus, common: f.common, isDup: !reverseMode && genusCounts[f.genus] > 1 };
  }));

  leftData.forEach(function(item) {
    var card = document.createElement("div");
    card.className = reverseMode ? "card card-genus" : "card card-common";
    card.textContent = item.text;
    if (item.isDup) {
      var hint = document.createElement("div");
      hint.className = "genus-reveal";
      hint.textContent = "(" + item.common + ")";
      card.appendChild(hint);
    }
    card.setAttribute("data-idx", item.idx);
    card.setAttribute("draggable", "true");
    card.onclick = function() { selectCommon(card); };
    card.ondragstart = function(e) {
      card.classList.add("dragging");
      e.dataTransfer.setData("text/plain", item.idx);
    };
    card.ondragend = function() { card.classList.remove("dragging"); };
    colLeft.appendChild(card);
  });

  rightData.forEach(function(item) {
    var card = document.createElement("div");
    card.className = reverseMode ? "card card-common" : "card card-genus";
    card.textContent = item.text;
    if (item.isDup) {
      var hint = document.createElement("div");
      hint.className = "genus-reveal";
      hint.textContent = "(" + item.common + ")";
      card.appendChild(hint);
    }
    card.setAttribute("data-idx", item.idx);
    card.onclick = function() { selectGenus(card); };
    card.ondragover = function(e) { e.preventDefault(); card.classList.add("drag-over"); };
    card.ondragleave = function() { card.classList.remove("drag-over"); };
    card.ondrop = function(e) {
      e.preventDefault();
      card.classList.remove("drag-over");
      var dragIdx = parseInt(e.dataTransfer.getData("text/plain"));
      var dropIdx = parseInt(card.getAttribute("data-idx"));
      handleMatch(dragIdx, dropIdx);
    };
    colRight.appendChild(card);
  });

  document.getElementById("completeBanner").style.display = "none";
  updateScore();
  loadBestScore();

  /* Start timer if enabled */
  if (timerEnabled) startTimer();
}

function selectCommon(card) {
  if (card.classList.contains("matched")) return;
  clearSelections("card-common");
  card.classList.add("selected");
  state.selectedCommon = parseInt(card.getAttribute("data-idx"));
  tryMatch();
}

function selectGenus(card) {
  if (card.classList.contains("matched")) return;
  clearSelections("card-genus");
  card.classList.add("selected");
  state.selectedGenus = parseInt(card.getAttribute("data-idx"));
  tryMatch();
}

function clearSelections(cls) {
  var cards = document.querySelectorAll("." + cls + ".selected");
  for (var i = 0; i < cards.length; i++) {
    cards[i].classList.remove("selected");
  }
}

function tryMatch() {
  if (state.selectedCommon === null || state.selectedGenus === null) return;
  handleMatch(state.selectedCommon, state.selectedGenus);
}

function handleMatch(commonIdx, genusIdx) {
  var commonCard = document.querySelector('.card-common[data-idx="' + commonIdx + '"]');
  var genusCard = document.querySelector('.card-genus[data-idx="' + genusIdx + '"]');
  if (!commonCard || !genusCard) return;
  if (commonCard.classList.contains("matched") || genusCard.classList.contains("matched")) return;

  if (commonIdx === genusIdx) {
    /* Correct match */
    state.correct++;
    state.matched++;
    commonCard.classList.remove("selected");
    genusCard.classList.remove("selected");
    commonCard.classList.add("matched", "correct-flash");
    genusCard.classList.add("matched", "correct-flash");

    /* Claude: 2026-03-17 — Show match info on the left card (direction-aware) */
    var reveal = document.createElement("div");
    reveal.className = "genus-reveal";
    reveal.style.display = "block";
    reveal.textContent = reverseMode
      ? "= " + state.flowers[commonIdx].common
      : "= " + state.flowers[commonIdx].genus;
    commonCard.appendChild(reveal);
  } else {
    /* Wrong match */
    state.misses++;
    commonCard.classList.add("wrong-flash");
    genusCard.classList.add("wrong-flash");
    setTimeout(function() {
      commonCard.classList.remove("wrong-flash", "selected");
      genusCard.classList.remove("wrong-flash", "selected");
    }, 500);
  }

  state.selectedCommon = null;
  state.selectedGenus = null;
  updateScore();

  if (state.matched >= state.total) {
    setTimeout(showComplete, 600);
  }
}

function updateScore() {
  document.getElementById("scoreCorrect").textContent = state.correct;
  document.getElementById("scoreMisses").textContent = state.misses;
  document.getElementById("scoreLeft").textContent = (state.total - state.matched);
}

function showComplete() {
  stopTimer();
  var pct = state.total > 0 ? Math.round((state.correct / (state.correct + state.misses)) * 100) : 0;
  var msg = "";
  if (state.misses === 0) {
    msg = "PERFECT! " + state.correct + "/" + state.correct + " — 100%!";
  } else {
    msg = state.correct + " correct, " + state.misses + " misses — " + pct + "% accuracy";
  }
  document.getElementById("completeStats").textContent = msg;

  /* Timer result */
  var timeEl = document.getElementById("completeTime");
  if (timerEnabled && timerSeconds > 0) {
    var m = Math.floor(timerSeconds / 60);
    var s = timerSeconds % 60;
    timeEl.textContent = "Time: " + m + ":" + (s < 10 ? "0" : "") + s;
    timeEl.style.display = "";
  } else {
    timeEl.style.display = "none";
  }

  /* Best score check */
  var isNewBest = saveBestScore(pct, timerEnabled ? timerSeconds : null);
  var bestEl = document.getElementById("completeBest");
  if (isNewBest) {
    bestEl.textContent = "New personal best!";
    bestEl.style.display = "";
  } else {
    bestEl.style.display = "none";
  }

  /* Fun title based on score */
  var title = document.getElementById("completeTitle");
  if (pct === 100) {
    title.textContent = "You nailed it!";
  } else if (pct >= 80) {
    title.textContent = "Almost there!";
  } else {
    title.textContent = "Keep practicing!";
  }

  document.getElementById("completeBanner").style.display = "block";
}

/* Start on load */
loadQuiz();
</script>
</body>
</html>
