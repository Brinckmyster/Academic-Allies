<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!-- Claude: 2026-03-25 — added early dark mode detect to prevent FOUC -->
  <script>try{if(localStorage.getItem("AA_DARK_MODE")==="true"){document.documentElement.classList.add("aa-dark");document.write('<style id="aa-dark-early">html.aa-dark{color-scheme:dark}html.aa-dark body{background:#121212!important;color:#e0e0e0!important}</style>')}}catch(e){}</script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Academic Allies — Offline</title>
  <!-- Claude: 2026-03-25 — added favicon -->
  <link rel="icon" type="image/x-icon" href="/Academic-Allies/favicon.ico">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #0f1117;
      color: #e0e0e0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    .offline-container {
      text-align: center;
      max-width: 400px;
    }
    .icon {
      font-size: 64px;
      margin-bottom: 20px;
    }
    h1 {
      font-size: 28px;
      margin-bottom: 12px;
      color: #e0e0e0;
    }
    p {
      font-size: 16px;
      line-height: 1.6;
      margin-bottom: 16px;
      color: #b0b0b0;
    }
    .highlight {
      color: #4a7f82;
      font-weight: 500;
    }
    button {
      background: #4a7f82;
      color: #fff;
      border: none;
      padding: 12px 32px;
      font-size: 16px;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 16px;
    }
    button:hover {
      background: #3d666a;
    }
    button:active {
      background: #2f4f52;
    }
    .note {
      font-size: 12px;
      color: #707070;
      margin-top: 24px;
      font-style: italic;
    }
  </style>
</head>
<body>
  <div class="offline-container">
    <div class="icon">⚡</div>
    <h1>You're Offline</h1>
    <p>You're currently offline. Your data is safe — we'll sync when you're back online.</p>
    <button onclick="location.reload()">Try Again</button>
    <p class="note">If this keeps happening, check your internet connection.</p>
  </div>
</body>
</html>
